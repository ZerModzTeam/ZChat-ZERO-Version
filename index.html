<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat ZERO Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --blur: blur(20px); }
        body {
            background: #020205; color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; overflow: hidden; margin: 0;
        }
        .nebula-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 20% 30%, #1e1b4b 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #4c1d95 0%, transparent 40%);
            filter: blur(60px); opacity: 0.6; animation: drift 20s infinite alternate;
        }
        @keyframes drift { from { transform: scale(1); } to { transform: scale(1.1) rotate(2deg); } }
        
        /* UI Kapsul & Glass */
        .capsule { border-radius: 35px; }
        .glass { background: var(--glass); backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Animasi Klik */
        .btn-click:active { transform: scale(0.92); transition: 0.1s; }
        .btn-trans { background: rgba(255,255,255,0.05); transition: 0.3s; }
        .btn-trans:hover { background: rgba(255,255,255,0.15); }

        /* Notifikasi Custom */
        #custom-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            z-index: 9999; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #custom-alert.show { top: 30px; }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; height: 100%; }
        .active-tab-btn { color: #60a5fa; border-bottom: 2px solid #60a5fa; }
    </style>
</head>
<body>
    <div class="nebula-bg"></div>

    <div id="custom-alert" class="glass capsule px-8 py-4 flex items-center gap-4 border-l-4 border-l-red-500 shadow-2xl">
        <i class="fas fa-exclamation-triangle text-red-500"></i>
        <div>
            <h4 class="font-bold text-sm" id="alert-title">Sistem Peringatan</h4>
            <p class="text-xs text-gray-300" id="alert-msg">Pesan error di sini</p>
        </div>
        <button onclick="hideAlert()" class="ml-4 opacity-50"><i class="fas fa-times"></i></button>
    </div>

    <div id="login-screen" class="h-screen flex items-center justify-center p-6">
        <div class="glass capsule p-10 w-full max-w-md text-center border-white/20">
            <h1 class="text-4xl font-black tracking-tighter mb-1">ZChat <span class="text-blue-500">ZERO</span></h1>
            <p class="text-[10px] tracking-[4px] text-gray-500 mb-8 uppercase">Nebula Protocol v2.5</p>
            
            <div class="space-y-4">
                <input type="text" id="login-usn" placeholder="USERNAME" class="w-full p-4 capsule bg-black/40 border border-white/10 outline-none focus:border-blue-500 transition text-center">
                <input type="password" id="login-pw" placeholder="PASSWORD" class="w-full p-4 capsule bg-black/40 border border-white/10 outline-none focus:border-blue-500 transition text-center">
                
                <div class="flex items-center justify-center gap-2 text-xs text-gray-400">
                    <input type="checkbox" id="keep-login" class="accent-blue-500">
                    <label for="keep-login">KEEP LOGIN (Save Identity)</label>
                </div>

                <button onclick="handleLogin()" class="btn-click w-full p-4 bg-blue-600 capsule font-bold shadow-lg shadow-blue-500/20">ACCESS TERMINAL</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="h-screen flex hidden p-4 gap-4">
        <div class="w-full md:w-[400px] flex flex-col gap-4">
            <div class="glass capsule p-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-blue-600 to-fuchsia-600 shadow-inner"></div>
                    <h2 id="my-name" class="font-bold">User</h2>
                </div>
                <button onclick="showAddModal()" class="btn-click btn-trans w-12 h-12 rounded-full"><i class="fas fa-plus"></i></button>
            </div>

            <div class="glass capsule flex-1 flex flex-col overflow-hidden">
                <div class="flex justify-around p-4 text-[10px] font-bold border-b border-white/5">
                    <button onclick="switchTab('chats')" class="tab-btn active-tab-btn px-4 py-2">CHATS</button>
                    <button onclick="switchTab('groups')" class="tab-btn px-4 py-2">GROUPS</button>
                    <button onclick="switchTab('status')" class="tab-btn px-4 py-2">STATUS</button>
                    <button onclick="switchTab('channels')" class="tab-btn px-4 py-2">CHANNELS</button>
                </div>

                <div id="req-box" class="p-4 bg-blue-500/10 hidden">
                    <p class="text-[9px] font-bold text-blue-400 mb-2 tracking-widest">PERMINTAAN BARU:</p>
                    <div id="req-list" class="space-y-2"></div>
                </div>

                <div id="chats" class="tab-content active p-2 overflow-y-auto"></div>
                <div id="groups" class="tab-content p-8 text-center text-gray-500 italic">Grup belum tersedia di versi ini.</div>
                <div id="status" class="tab-content p-8 text-center text-gray-500 italic">Fitur Status segera hadir.</div>
                <div id="channels" class="tab-content p-8 text-center text-gray-500 italic">Saluran belum dibuat.</div>
            </div>
        </div>

        <div class="flex-1 glass capsule flex flex-col overflow-hidden relative">
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-600">
                <i class="fas fa-satellite-dish text-6xl mb-4 animate-pulse"></i>
                <p>Menunggu Koneksi...</p>
            </div>

            <div id="chat-active" class="hidden flex flex-col h-full">
                <div class="p-4 border-b border-white/5 flex items-center justify-between glass">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-white/10 border border-white/20"></div>
                        <span id="chat-with" class="font-bold">Username</span>
                    </div>
                    <div class="flex gap-4">
                        <button class="btn-click opacity-50 hover:opacity-100"><i class="fas fa-phone"></i></button>
                        <button class="btn-click opacity-50 hover:opacity-100"><i class="fas fa-video"></i></button>
                    </div>
                </div>
                <div id="msg-flow" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4"></div>
                <div class="p-4 glass flex gap-3">
                    <input type="text" id="msg-input" placeholder="Ketik pesan..." class="flex-1 bg-black/20 p-4 capsule outline-none border border-white/5">
                    <button onclick="send()" class="btn-click w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-add" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-6 z-[999]">
        <div class="glass capsule p-8 w-full max-w-sm text-center">
            <h3 class="text-xl font-bold mb-6">Connect New User</h3>
            <input type="text" id="target-usn" placeholder="Target Username" class="w-full p-4 capsule bg-white/5 border border-white/10 outline-none text-center mb-4">
            <div class="flex gap-2">
                <button onclick="closeAddModal()" class="flex-1 p-4 btn-trans capsule">BATAL</button>
                <button onclick="addUser()" class="btn-click flex-1 p-4 bg-blue-600 capsule font-bold">TAMBAH</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myUsn = "";
        let currentChat = "";

        // -- AUTO LOGIN --
        const saved = localStorage.getItem('zchat_zero_usn');
        if(saved) {
            myUsn = saved;
            launchApp();
        }

        function handleLogin() {
            const u = document.getElementById('login-usn').value.trim();
            if(!u) return showAlert("Error", "Isi Username!");
            
            myUsn = u;
            if(document.getElementById('keep-login').checked) localStorage.setItem('zchat_zero_usn', u);
            
            // PENTING: Daftarkan diri ke node 'users' biar temen lo bisa nemuin lo!
            db.ref('users/' + u).set({ username: u, online: true });
            launchApp();
        }

        function launchApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('my-name').innerText = "@" + myUsn;
            loadRequests();
            loadContacts();
        }

        // -- SYNC LOGIC (NYAMBUNG KE TEMEN) --
        function addUser() {
            const target = document.getElementById('target-usn').value.trim();
            if(!target || target === myUsn) return;

            // Cek path 'users/' (Path standar web temen lo)
            db.ref('users/' + target).once('value', snap => {
                if(snap.exists()) {
                    db.ref(`requests/${target}/${myUsn}`).set({ from: myUsn, time: Date.now() });
                    showAlert("Sukses", "Permintaan terkirim ke " + target);
                    closeAddModal();
                } else {
                    showAlert("USER TIDAK ADA!", "Username '" + target + "' tidak ditemukan di database ZChat.");
                }
            });
        }

        function loadRequests() {
            db.ref(`requests/${myUsn}`).on('value', snap => {
                const box = document.getElementById('req-box');
                const list = document.getElementById('req-list');
                list.innerHTML = "";
                if(snap.exists()) {
                    box.classList.remove('hidden');
                    snap.forEach(c => {
                        const from = c.key;
                        list.innerHTML += `<div class="flex items-center justify-between glass p-2 capsule">
                            <span class="text-xs ml-2">${from}</span>
                            <div class="flex gap-1">
                                <button onclick="confirmChat('${from}', true)" class="w-8 h-8 bg-green-600 rounded-full text-[10px]"><i class="fas fa-check"></i></button>
                                <button onclick="confirmChat('${from}', false)" class="w-8 h-8 bg-red-600 rounded-full text-[10px]"><i class="fas fa-times"></i></button>
                            </div>
                        </div>`;
                    });
                } else box.classList.add('hidden');
            });
        }

        function confirmChat(user, accept) {
            if(accept) {
                db.ref(`contacts/${myUsn}/${user}`).set(true);
                db.ref(`contacts/${user}/${myUsn}`).set(true);
            }
            db.ref(`requests/${myUsn}/${user}`).remove();
        }

        function loadContacts() {
            db.ref(`contacts/${myUsn}`).on('value', snap => {
                const container = document.getElementById('chats');
                container.innerHTML = "";
                snap.forEach(c => {
                    const name = c.key;
                    container.innerHTML += `<div onclick="openChat('${name}')" class="btn-click glass capsule p-4 mb-2 flex items-center gap-4 btn-trans cursor-pointer">
                        <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center font-bold">${name[0]}</div>
                        <div class="flex-1"><h4 class="font-bold text-sm">${name}</h4><p class="text-[10px] opacity-40">Tap to encrypted chat</p></div>
                    </div>`;
                });
            });
        }

        function openChat(target) {
            currentChat = target;
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('chat-active').classList.remove('hidden');
            document.getElementById('chat-with').innerText = target;
            
            const chatID = [myUsn, target].sort().join("_");
            db.ref(`chats/${chatID}`).on('value', snap => {
                const flow = document.getElementById('msg-flow');
                flow.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    const isMe = m.sender === myUsn;
                    flow.innerHTML += `<div class="max-w-[75%] p-3 px-5 capsule text-sm ${isMe ? 'self-end bg-blue-600 shadow-lg' : 'self-start glass'}">
                        ${m.text}
                        <span class="text-[8px] opacity-40 block text-right mt-1">${new Date(m.time).toLocaleTimeString()}</span>
                    </div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });
        }

        function send() {
            const input = document.getElementById('msg-input');
            if(!input.value || !currentChat) return;
            const chatID = [myUsn, currentChat].sort().join("_");
            db.ref(`chats/${chatID}`).push({ sender: myUsn, text: input.value, time: Date.now() });
            input.value = "";
        }

        // -- UI HELPERS --
        function showAlert(title, msg) {
            const a = document.getElementById('custom-alert');
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            a.classList.add('show');
            setTimeout(hideAlert, 4000);
        }
        function hideAlert() { document.getElementById('custom-alert').classList.remove('show'); }
        
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab-btn'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active-tab-btn');
        }

        function showAddModal() { document.getElementById('modal-add').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('modal-add').classList.add('hidden'); }
    </script>
</body>
</html>
