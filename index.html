<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat ZERO - God Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --blur: blur(20px); }
        body { background: #020205; color: white; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .nebula-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 30%, #1e1b4b 0%, transparent 40%), radial-gradient(circle at 80% 70%, #4c1d95 0%, transparent 40%); filter: blur(60px); opacity: 0.7; }
        .capsule { border-radius: 25px; }
        .glass { background: var(--glass); backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1); }
        .btn-click { transition: transform 0.1s; cursor: pointer; }
        .btn-click:active { transform: scale(0.92); }
        .tab-content { display: none; height: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        .active-tab-btn { color: #06b6d4; border-bottom: 3px solid #06b6d4; opacity: 1 !important; }
        .img-chat { max-width: 250px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); margin-top: 5px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        #custom-alert { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); z-index: 9999; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #custom-alert.show { top: 20px; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="nebula-bg"></div>

    <div id="custom-alert" class="glass capsule px-6 py-3 flex items-center gap-3 border-l-4 border-l-cyan-500 shadow-2xl">
        <i class="fas fa-atom text-cyan-400 animate-spin"></i>
        <span id="alert-msg" class="text-xs font-bold uppercase tracking-widest"></span>
    </div>

    <div id="login-screen" class="h-screen flex items-center justify-center p-6">
        <div class="glass capsule p-10 w-full max-w-md text-center border-white/20 shadow-2xl">
            <h1 class="text-4xl font-black mb-2 italic">ZChat <span class="text-cyan-500">ZERO</span></h1>
            <p class="text-[9px] tracking-[5px] text-gray-500 mb-8">SECURE ENCRYPTION SYSTEM</p>
            <input type="text" id="login-usn" placeholder="USERNAME" class="w-full p-4 capsule bg-black/40 border border-white/10 mb-4 outline-none text-center font-bold uppercase text-sm tracking-widest focus:border-cyan-500 transition">
            <button onclick="handleLogin()" class="btn-click w-full p-4 bg-cyan-600 capsule font-black shadow-lg shadow-cyan-500/20 uppercase tracking-widest text-sm">Initialize Terminal</button>
        </div>
    </div>

    <div id="main-app" class="h-screen flex hidden p-4 gap-4 transition-all duration-700">
        <div class="w-full md:w-[380px] flex flex-col gap-4" id="sidebar">
            <div class="glass capsule p-4 flex items-center justify-between border-white/20">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 rounded-full bg-gradient-to-tr from-cyan-600 to-fuchsia-600 border border-white/20"></div>
                    <div><h2 id="my-name" class="font-bold text-sm">@USER</h2><p class="text-[8px] text-cyan-500 animate-pulse">TERMINAL ACTIVE</p></div>
                </div>
                <button onclick="showAddModal()" class="btn-click w-11 h-11 bg-white/5 rounded-full text-cyan-400 border border-white/10"><i class="fas fa-plus"></i></button>
            </div>

            <div class="glass capsule flex-1 flex flex-col overflow-hidden border-white/10">
                <div class="flex justify-around p-3 text-[9px] font-black border-b border-white/5 bg-white/5">
                    <button onclick="switchTab('chats', this)" class="tab-btn active-tab-btn py-2 px-3">CHATS</button>
                    <button onclick="switchTab('groups', this)" class="tab-btn py-2 px-3 opacity-50">GROUPS</button>
                    <button onclick="switchTab('status', this)" class="tab-btn py-2 px-3 opacity-50">STATUS</button>
                    <button onclick="switchTab('channels', this)" class="tab-btn py-2 px-3 opacity-50">CHANNELS</button>
                </div>
                
                <div id="req-box" class="p-3 bg-cyan-500/10 hidden border-b border-cyan-500/20"><div id="req-list" class="space-y-2"></div></div>

                <div id="chats" class="tab-content active p-2 space-y-2"></div>
                <div id="groups" class="tab-content p-2 space-y-2"></div>
                <div id="status" class="tab-content p-2 space-y-2"></div>
                <div id="channels" class="tab-content p-2 space-y-2"></div>
            </div>
        </div>

        <div class="hidden md:flex flex-1 glass capsule flex flex-col overflow-hidden relative border-white/10" id="chat-container">
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center opacity-20">
                <i class="fas fa-satellite-dish text-6xl mb-4 animate-pulse"></i>
                <p class="tracking-[10px] text-[10px] font-bold">Z-LEVEL CONNECTION</p>
            </div>

            <div id="chat-active" class="hidden flex flex-col h-full z-10">
                <div class="p-4 border-b border-white/10 flex items-center justify-between glass">
                    <div class="flex items-center gap-4">
                        <button onclick="backToSidebar()" class="md:hidden text-gray-400 mr-2"><i class="fas fa-arrow-left"></i></button>
                        <div>
                            <span id="chat-with" class="font-bold uppercase tracking-widest text-cyan-400">User</span>
                            <p class="text-[8px] opacity-40">E2E ENCRYPTED NEBULA</p>
                        </div>
                    </div>
                    <button onclick="clearChat()" class="btn-click text-[9px] font-bold text-red-500 opacity-50 hover:opacity-100 uppercase border border-red-500/20 px-3 py-1 capsule">Clear</button>
                </div>
                
                <div id="msg-flow" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4"></div>

                <div class="p-4 glass flex gap-3 items-center border-t border-white/5">
                    <input type="file" id="image-input" class="hidden" accept="image/*" onchange="handleImageUpload(this)">
                    <button onclick="document.getElementById('image-input').click()" class="btn-click w-12 h-12 bg-white/5 rounded-full text-cyan-400 border border-white/10 flex items-center justify-center shadow-lg"><i class="fas fa-camera"></i></button>
                    <input type="text" id="msg-input" placeholder="Type a message..." class="flex-1 bg-black/40 p-4 capsule outline-none border border-white/5 text-sm focus:border-cyan-500/50 transition">
                    <button onclick="send()" class="btn-click w-12 h-12 bg-cyan-600 rounded-full flex items-center justify-center shadow-lg shadow-cyan-500/30 text-white"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-add" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden flex items-center justify-center p-6 z-[1000]">
        <div class="glass capsule p-8 w-full max-w-sm text-center border-white/20">
            <h3 class="font-black mb-6 uppercase tracking-[4px] text-cyan-400">Connect Node</h3>
            <input type="text" id="target-usn" placeholder="@username" class="w-full p-4 capsule bg-white/5 border border-white/10 mb-6 text-center uppercase font-bold text-sm outline-none focus:border-cyan-500">
            <div class="flex gap-3">
                <button onclick="closeAddModal()" class="flex-1 p-4 bg-white/5 capsule text-[10px] font-bold uppercase hover:bg-white/10 transition">Cancel</button>
                <button onclick="addUser()" class="btn-click flex-1 p-4 bg-cyan-600 capsule text-[10px] font-bold uppercase shadow-lg shadow-cyan-500/20">Connect</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myUsn = localStorage.getItem('zchat_zero_god') || "";
        let currentChat = "";

        if(myUsn) launchApp();

        function handleLogin() {
            const u = document.getElementById('login-usn').value.trim().toLowerCase();
            if(!u) return;
            myUsn = u;
            localStorage.setItem('zchat_zero_god', u);
            db.ref('users/' + u).set({ username: u, lastSeen: Date.now() });
            launchApp();
        }

        function launchApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('my-name').innerText = "@" + myUsn.toUpperCase();
            loadContacts(); loadRequests(); loadStatus(); loadGroups();
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab-btn'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active-tab-btn');
        }

        // --- IMAGE SYSTEM (WA STYLE) ---
        function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 2000000) return showNotif("File too large! (Max 2MB)");
            const reader = new FileReader();
            reader.onload = (e) => sendFinalMsg(e.target.result, 'image');
            reader.readAsDataURL(file);
        }

        function send() {
            const text = document.getElementById('msg-input').value.trim();
            if(text) sendFinalMsg(text, 'text');
            document.getElementById('msg-input').value = "";
        }

        function sendFinalMsg(content, type) {
            if(!currentChat) return;
            const chatID = currentChat.startsWith("GRP_") ? currentChat : [myUsn, currentChat].sort().join("_");
            const path = currentChat.startsWith("GRP_") ? `group_messages/${currentChat}` : `chats/${chatID}`;
            db.ref(path).push({ sender: myUsn, type: type, content: content, time: Date.now() });
        }

        function openChat(target, isGroup = false) {
            currentChat = target;
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden');
                document.getElementById('chat-container').classList.remove('hidden').classList.add('flex');
            }
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('chat-active').classList.remove('hidden');
            document.getElementById('chat-with').innerText = isGroup ? "[GROUP] " + target : target;
            
            const chatID = isGroup ? target : [myUsn, target].sort().join("_");
            const path = isGroup ? `group_messages/${target}` : `chats/${chatID}`;
            
            db.ref(path).off();
            db.ref(path).on('value', snap => {
                const flow = document.getElementById('msg-flow');
                flow.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    const isMe = m.sender === myUsn;
                    const content = m.type === 'image' ? `<img src="${m.content}" class="img-chat">` : `<p class="break-words">${m.content}</p>`;
                    flow.innerHTML += `
                        <div class="max-w-[85%] p-3 px-5 capsule text-sm ${isMe ? 'self-end bg-cyan-600 shadow-xl' : 'self-start glass border-white/10'}">
                            ${isGroup && !isMe ? `<p class="text-[8px] font-black text-cyan-400 mb-1 uppercase">${m.sender}</p>` : ''}
                            ${content}
                            <span class="text-[7px] opacity-40 block text-right mt-1 font-bold">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });
        }

        // --- CONTACTS, GROUPS, STATUS ---
        function loadContacts() {
            db.ref(`contacts/${myUsn}`).on('value', snap => {
                const c = document.getElementById('chats'); c.innerHTML = "";
                if(!snap.exists()) c.innerHTML = "<p class='text-center opacity-20 text-[10px] mt-10 uppercase tracking-widest'>No Connections</p>";
                snap.forEach(child => {
                    const name = child.key;
                    c.innerHTML += `<div onclick="openChat('${name}')" class="btn-click glass capsule p-4 flex items-center gap-4 btn-trans border-white/5 mb-2">
                        <div class="w-10 h-10 rounded-full bg-cyan-600/20 flex items-center justify-center font-bold text-xs uppercase border border-cyan-500/30">${name[0]}</div>
                        <div class="flex-1"><h4 class="font-bold text-xs uppercase tracking-tight">${name}</h4><p class="text-[8px] text-cyan-500 font-bold opacity-60">SECURE LINK</p></div>
                    </div>`;
                });
            });
        }

        function loadGroups() {
            db.ref('groups').on('value', snap => {
                const g = document.getElementById('groups');
                g.innerHTML = `<button onclick="createGroup()" class="w-full p-4 glass capsule mb-3 border-cyan-500/30 text-cyan-400 font-bold text-[10px] uppercase tracking-widest">+ Create Group Node</button>`;
                snap.forEach(child => {
                    const data = child.val();
                    g.innerHTML += `<div onclick="openChat('${child.key}', true)" class="btn-click glass capsule p-4 flex items-center gap-4 btn-trans border-white/5 mb-2">
                        <div class="w-10 h-10 rounded-full bg-fuchsia-600/20 flex items-center justify-center text-xs border border-fuchsia-500/30"><i class="fas fa-users"></i></div>
                        <h4 class="font-bold text-xs uppercase tracking-tight">${data.name}</h4>
                    </div>`;
                });
            });
        }

        function createGroup() {
            const n = prompt("Node Name:");
            if(n) db.ref('groups/GRP_' + Date.now()).set({ name: n, creator: myUsn });
        }

        function loadStatus() {
            db.ref('status').on('value', snap => {
                const s = document.getElementById('status');
                s.innerHTML = `<button onclick="postStatus()" class="w-full p-4 glass capsule mb-3 border-fuchsia-500/30 text-fuchsia-400 font-bold text-[10px] uppercase tracking-widest">+ Upload Pulse</button>`;
                snap.forEach(child => {
                    const data = child.val();
                    s.innerHTML += `<div class="glass capsule p-4 flex items-center gap-4 border-white/5 mb-2">
                        <div class="w-10 h-10 rounded-full border-2 border-cyan-500 p-0.5"><div class="w-full h-full bg-gray-900 rounded-full flex items-center justify-center text-[10px] font-bold uppercase text-cyan-400">${data.user[0]}</div></div>
                        <div><h4 class="font-bold text-[10px] uppercase tracking-widest">${data.user}</h4><p class="text-xs text-gray-300 font-medium">${data.text}</p></div>
                    </div>`;
                });
            });
        }

        function postStatus() {
            const t = prompt("Broadcast message:");
            if(t) db.ref('status/' + myUsn).set({ user: myUsn, text: t, time: Date.now() });
        }

        // --- NOTIF & REQUESTS ---
        function showAddModal() { document.getElementById('modal-add').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('modal-add').classList.add('hidden'); }
        function addUser() {
            const t = document.getElementById('target-usn').value.trim().toLowerCase();
            if(t && t !== myUsn) {
                db.ref('users/' + t).once('value', s => {
                    if(s.exists()) {
                        db.ref(`requests/${t}/${myUsn}`).set(true);
                        showNotif("Link Request Sent!"); closeAddModal();
                    } else showNotif("Node Not Found!");
                });
            }
        }

        function loadRequests() {
            db.ref(`requests/${myUsn}`).on('value', snap => {
                const b = document.getElementById('req-box'); const l = document.getElementById('req-list'); l.innerHTML = "";
                if(snap.exists()) {
                    b.classList.remove('hidden');
                    snap.forEach(c => {
                        l.innerHTML += `<div class="flex items-center justify-between glass p-2 px-4 capsule border-white/20"><span class="text-[9px] font-black uppercase tracking-widest text-cyan-400">${c.key}</span>
                        <div class="flex gap-2"><button onclick="acc('${c.key}',true)" class="bg-cyan-600 w-8 h-8 rounded-full text-[10px] btn-click"><i class="fas fa-check"></i></button>
                        <button onclick="acc('${c.key}',false)" class="bg-red-600 w-8 h-8 rounded-full text-[10px] btn-click"><i class="fas fa-times"></i></button></div></div>`;
                    });
                } else b.classList.add('hidden');
            });
        }

        function acc(u, a) {
            if(a) { db.ref(`contacts/${myUsn}/${u}`).set(true); db.ref(`contacts/${u}/${myUsn}`).set(true); }
            db.ref(`requests/${myUsn}/${u}`).remove();
        }

        function showNotif(m) { const a = document.getElementById('custom-alert'); document.getElementById('alert-msg').innerText = m; a.classList.add('show'); setTimeout(()=>a.classList.remove('show'),3000); }
        function backToSidebar() { document.getElementById('sidebar').classList.remove('hidden'); document.getElementById('chat-container').classList.add('hidden'); }
        function clearChat() { if(confirm("Clear history?")) db.ref(currentChat.startsWith("GRP_") ? `group_messages/${currentChat}` : `chats/${[myUsn, currentChat].sort().join("_")}`).remove(); }
    </script>
</body>
</html>
