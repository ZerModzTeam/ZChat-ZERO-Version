<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Zero Edition - iPhone Style</title>
    <!-- Font IPhone (SF Pro) dan Emoji Apple -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', 'Android Emoji', 'EmojiOne Color', 'Twemoji Mozilla', 'Twemoji', 'Segoe UI Symbol';
        }
        body {
            min-height: 100vh;
            background: #000;
            color: #fff;
            transition: background 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }
        body.white-mode {
            background: #f2f2f7;
            color: #1c1c1e;
        }
        /* Grid ungu bergerak */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(180, 0, 255, 0.25) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180, 0, 255, 0.25) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: moveGrid 16s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 48px 48px; }
        }
        /* Black hole background */
        .blackhole-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, #3a0066, #000 80%);
            filter: blur(45px) brightness(0.6);
            opacity: 0.8;
            z-index: 0;
        }
        body.white-mode .blackhole-bg {
            opacity: 0.2;
            background: radial-gradient(circle at 30% 40%, #c7a4ff, #ccc);
        }
        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s;
            flex-direction: column;
            gap: 24px;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(180, 0, 255, 0.3);
            border-top: 4px solid #b300ff;
            border-radius: 50%;
            animation: rotasi 1s linear infinite;
        }
        @keyframes rotasi {
            0% { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }
        /* ========== UI KAPSUL SERAGAM ========== */
        .capsule, button, .input, .card, .chat-bubble, .contact-item, .role-item, select, textarea {
            border-radius: 40px !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(20, 20, 30, 0.2) !important;
            padding: 16px 24px;
            color: inherit;
            transition: all 0.2s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            width: 100%;
            font-size: 18px;
        }
        body.white-mode .capsule, body.white-mode button, body.white-mode .input,
        body.white-mode .card, body.white-mode .chat-bubble, body.white-mode .contact-item {
            background: rgba(255, 255, 255, 0.3) !important;
            border-color: rgba(0, 0, 0, 0.1);
            color: #000;
        }
        button {
            cursor: pointer;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transform: scale(1);
            width: auto;
            display: inline-block;
            padding: 16px 28px;
        }
        button:active {
            transform: scale(0.96);
            background: rgba(180, 0, 255, 0.4) !important;
        }
        input, select, textarea {
            border: 1px solid rgba(255,255,255,0.2) !important;
            outline: none;
            background: rgba(0,0,0,0.3) !important;
            color: #fff;
            padding: 18px 24px;
        }
        input::placeholder {
            color: rgba(255,255,255,0.8);
            font-weight: 400;
        }
        body.white-mode input::placeholder {
            color: rgba(0,0,0,0.6);
        }
        select option {
            background: #1c1c1e;
            color: white;
        }
        .app-container {
            position: relative;
            z-index: 5;
            min-height: 100vh;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .flex-col {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .card {
            padding: 24px;
        }
        .link-text {
            color: #b266ff;
            cursor: pointer;
            border-bottom: 1px dashed rgba(255,255,255,0.3);
            padding-bottom: 2px;
        }
        .link-text:hover {
            border-bottom-color: #b266ff;
        }
        .datetime {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            padding: 16px 22px;
        }
        .datetime span {
            font-size: 1rem;
            opacity: 0.8;
            font-weight: 400;
        }
        /* chat area */
        .chat-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 320px;
            overflow-y: auto;
            padding: 18px;
            border-radius: 40px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        .chat-bubble {
            max-width: 80%;
            padding: 14px 20px;
            align-self: flex-start;
            background: rgba(50, 50, 70, 0.3) !important;
            word-break: break-word;
        }
        .chat-bubble.own {
            align-self: flex-end;
            background: rgba(140, 0, 255, 0.35) !important;
        }
        .contact-item {
            display: flex;
            justify-content: space-between;
            padding: 16px 24px;
            cursor: pointer;
            background: rgba(30,30,40,0.2) !important;
            margin-bottom: 5px;
        }
        .online { color: #32cd32; }
        .offline { color: #8e8e93; }
        .hidden { display: none !important; }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        /* admin opening */
        .admin-opening {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeOut 4s forwards;
            pointer-events: none;
        }
        .video-capsule {
            width: 300px;
            height: 600px;
            border-radius: 150px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(180,0,255,0.8);
            border: 2px solid rgba(255,255,255,0.3);
        }
        .video-capsule video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .capsule-opening {
            width: 280px;
            height: 560px;
            background: linear-gradient(145deg, #9f4dff, #4b0082, #ff1a75);
            border-radius: 140px;
            filter: blur(50px);
            animation: pulseCapsule 1.8s infinite alternate;
        }
        @keyframes pulseCapsule {
            0% { transform: scale(0.7) rotate(-2deg); opacity: 0.5; }
            100% { transform: scale(1.3) rotate(3deg); opacity: 1; }
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            75% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .role-badge {
            background: rgba(140,0,255,0.3);
            border-radius: 40px;
            padding: 5px 16px;
            backdrop-filter: blur(5px);
            font-size: 16px;
        }
        /* keep login toggle */
        .keep-active {
            background: rgba(48, 209, 88, 0.4) !important;
            border-color: #32cd32 !important;
        }
        .keep-inactive {
            background: rgba(255, 69, 58, 0.4) !important;
            border-color: #ff3b30 !important;
        }
        /* developer card */
        .dev-card {
            border: 2px solid rgba(255,215,0,0.5);
        }
        /* admin float button */
        .admin-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 100;
        }
        .admin-float button {
            background: rgba(140,0,255,0.6) !important;
            padding: 16px 28px;
            box-shadow: 0 10px 25px rgba(140,0,255,0.5);
            width: auto;
        }
        /* admin panel full */
        .admin-panel-full {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97);
            backdrop-filter: blur(30px);
            z-index: 1000;
            overflow-y: auto;
            padding: 25px;
        }
        .close-btn {
            background: rgba(255,59,48,0.3) !important;
            border-radius: 40px;
            padding: 12px 25px;
            width: auto;
        }
        .grid-2 button {
            width: 100%;
            text-align: center;
        }
        .fas, .far {
            font-family: 'Font Awesome 5 Free', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
        }
        .refresh-role {
            background: transparent !important;
            border: none;
            font-size: 22px;
            padding: 5px 10px;
            margin-left: 10px;
            box-shadow: none;
            width: auto;
        }
        .refresh-role:active {
            background: rgba(255,255,255,0.2) !important;
        }
        /* notifikasi realtime */
        .realtime-notif {
            background: rgba(255, 0, 0, 0.3);
            border-radius: 40px;
            padding: 10px 20px;
            margin-bottom: 10px;
            text-align: center;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        /* wrapper untuk input kontak */
        .cari-kontak-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .cari-kontak-wrapper input {
            flex: 1;
            min-width: 0;
        }
    </style>
    <!-- Font Awesome untuk ikon (opsional) -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
</head>
<body>
    <!-- LOADING -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader"></div>
        <div style="font-size: 30px; font-weight: 600;">ZChat Zero</div>
    </div>

    <!-- BACKGROUND -->
    <div class="grid-bg" id="gridBg"></div>
    <div class="blackhole-bg" id="blackholeBg"></div>

    <!-- MAIN APP -->
    <div class="app-container" id="appContainer"></div>

    <!-- ADMIN BUTTON -->
    <div class="admin-float" id="adminFloat">
        <button id="adminFloatBtn"><i class="fas fa-user-shield"></i> Admin</button>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanelContainer" class="hidden"></div>

    <script>
        // ==================== DATABASE SIMULATION (localStorage) ====================
        const db = {
            ref: (path) => ({
                once: async (event) => {
                    const data = JSON.parse(localStorage.getItem('zchat_db') || '{}');
                    const keys = path.split('/').filter(k => k);
                    let current = data;
                    for (let k of keys) {
                        if (k.includes(',')) k = k.replace(/,/g, '.');
                        if (current) current = current[k];
                        else break;
                    }
                    return {
                        exists: () => current !== undefined && current !== null,
                        val: () => current
                    };
                },
                set: async (value) => {
                    const data = JSON.parse(localStorage.getItem('zchat_db') || '{}');
                    const keys = path.split('/').filter(k => k);
                    let current = data;
                    for (let i = 0; i < keys.length - 1; i++) {
                        let k = keys[i];
                        if (k.includes(',')) k = k.replace(/,/g, '.');
                        if (!current[k]) current[k] = {};
                        current = current[k];
                    }
                    let lastKey = keys[keys.length - 1];
                    if (lastKey.includes(',')) lastKey = lastKey.replace(/,/g, '.');
                    current[lastKey] = value;
                    localStorage.setItem('zchat_db', JSON.stringify(data));
                },
                update: async (value) => {
                    const data = JSON.parse(localStorage.getItem('zchat_db') || '{}');
                    const keys = path.split('/').filter(k => k);
                    let current = data;
                    for (let i = 0; i < keys.length - 1; i++) {
                        let k = keys[i];
                        if (k.includes(',')) k = k.replace(/,/g, '.');
                        if (!current[k]) current[k] = {};
                        current = current[k];
                    }
                    let lastKey = keys[keys.length - 1];
                    if (lastKey.includes(',')) lastKey = lastKey.replace(/,/g, '.');
                    if (!current[lastKey]) current[lastKey] = {};
                    Object.assign(current[lastKey], value);
                    localStorage.setItem('zchat_db', JSON.stringify(data));
                },
                remove: async () => {
                    const data = JSON.parse(localStorage.getItem('zchat_db') || '{}');
                    const keys = path.split('/').filter(k => k);
                    let current = data;
                    for (let i = 0; i < keys.length - 1; i++) {
                        let k = keys[i];
                        if (k.includes(',')) k = k.replace(/,/g, '.');
                        if (!current[k]) return;
                        current = current[k];
                    }
                    let lastKey = keys[keys.length - 1];
                    if (lastKey.includes(',')) lastKey = lastKey.replace(/,/g, '.');
                    delete current[lastKey];
                    localStorage.setItem('zchat_db', JSON.stringify(data));
                }
            })
        };

        // STATE GLOBAL
        let currentUser = null;
        let keepLogin = false;
        let adminMode = false;
        let adminAuthed = false;
        let kontakTarget = null;
        let realtimeInterval = null;

        // LOADING HIDE
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }, 500);
            }, 1500);
            renderApp();
        });

        async function getIP() {
            return '192.168.1.' + Math.floor(Math.random() * 255);
        }

        function updateDateTime() {
            const el = document.getElementById('liveDateTime');
            if (!el) return;
            const now = new Date();
            const jam = now.toLocaleTimeString('id-ID', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const hari = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            el.innerHTML = `${jam} <br><span>${hari}</span>`;
        }
        setInterval(updateDateTime, 1000);

        async function checkForUpdates() {
            if (!currentUser || adminMode) return;

            const snap = await db.ref('users/' + currentUser.username.replace(/\./g, ',')).once('value');
            const fresh = snap.val();

            if (!fresh) {
                alert('Akun Anda telah dihapus oleh admin.');
                clearInterval(realtimeInterval);
                currentUser = null;
                localStorage.removeItem('zchat_keep');
                renderLogin();
                return;
            }

            if (fresh.ban && fresh.banUntil > Date.now()) {
                alert(`Anda telah dibanned sampai ${new Date(fresh.banUntil).toLocaleString()}`);
                clearInterval(realtimeInterval);
                currentUser = null;
                localStorage.removeItem('zchat_keep');
                renderLogin();
                return;
            }

            if (JSON.stringify(fresh) !== JSON.stringify(currentUser)) {
                currentUser = { ...fresh, username: currentUser.username };
                showNotification('Data akun Anda telah diperbarui!');
                renderMain();
            }
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.className = 'realtime-notif capsule';
            notif.innerText = msg;
            document.getElementById('appContainer').prepend(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        function renderApp() {
            if (adminMode) {
                renderAdminPanel();
            } else {
                if (!currentUser) renderLogin();
                else renderMain();
            }
        }

        async function refreshUserData() {
            if (!currentUser) return;
            const snap = await db.ref('users/' + currentUser.username.replace(/\./g, ',')).once('value');
            const fresh = snap.val();
            if (fresh) {
                if (fresh.ban && fresh.banUntil > Date.now()) {
                    alert(`Akun dibanned sampai ${new Date(fresh.banUntil).toLocaleString()}`);
                    currentUser = null;
                    localStorage.removeItem('zchat_keep');
                    renderLogin();
                    return;
                }
                currentUser = { ...fresh, username: currentUser.username };
                renderMain();
            } else {
                alert('Akun Anda telah dihapus.');
                currentUser = null;
                localStorage.removeItem('zchat_keep');
                renderLogin();
            }
        }

        // ==================== LOGIN ====================
        function renderLogin() {
            if (realtimeInterval) {
                clearInterval(realtimeInterval);
                realtimeInterval = null;
            }
            const container = document.getElementById('appContainer');
            document.getElementById('gridBg').style.display = 'block';
            document.getElementById('blackholeBg').style.display = 'none';
            const html = `
            <div class="flex-col">
                <div class="datetime capsule" id="liveDateTime"></div>
                <div class="card">
                    <h2 style="margin-bottom: 24px; font-size: 32px;"><i class="fas fa-comment"></i> ZChat Zero</h2>
                    <input type="text" id="loginUser" class="input" placeholder="Username">
                    <input type="password" id="loginPass" class="input" placeholder="Password" style="margin-top: 15px;">
                    <div style="display: flex; gap: 12px; margin: 25px 0;">
                        <button id="loginBtn" class="capsule" style="flex:2;">MASUK</button>
                        <button id="keepLoginToggle" class="capsule" style="flex:1;">🔒 Keep</button>
                    </div>
                    <div style="text-align: center; margin-bottom: 8px;"><span class="link-text" id="goDaftar">Belum punya akun? Ayo daftar</span></div>
                    <div style="text-align: center; margin-bottom: 8px;"><span class="link-text" id="beliRole">Beli role? Klik disini untuk membeli</span></div>
                    <div style="text-align: center;"><span class="link-text" id="lihatListRole">LIHAT LIST ROLE</span></div>
                    <div id="roleListContainer" class="hidden role-list" style="margin-top: 20px;"></div>
                </div>
                <div class="card dev-card">
                    <h4>ZChat Zero Edition</h4>
                    <p>Version: 1.0<br>Developer: Zero, Zerr4F<br>Social media: COMING SOON</p>
                </div>
            </div>
            `;
            container.innerHTML = html;
            updateDateTime();

            document.getElementById('lihatListRole').addEventListener('click', () => {
                const c = document.getElementById('roleListContainer');
                if (c.classList.contains('hidden')) {
                    c.innerHTML = `
                        <div class="role-item"><strong>Vip 120K</strong><br>- Crash/Un Crash</div>
                        <div class="role-item"><strong>VVip 170K</strong><br>- Crash/Un Crash<br>- Mute</div>
                        <div class="role-item"><strong>ZVip 200K</strong><br>- Crash/Un Crash<br>- Sadap<br>- Mute</div>
                    `;
                    c.classList.remove('hidden');
                } else c.classList.add('hidden');
            });

            document.getElementById('beliRole').addEventListener('click', () => {
                window.open('https://t.me/ZMTzermodzteam', '_blank');
            });

            document.getElementById('goDaftar').addEventListener('click', renderDaftar);

            document.getElementById('loginBtn').addEventListener('click', async () => {
                const user = document.getElementById('loginUser').value.trim();
                const pass = document.getElementById('loginPass').value.trim();
                if (!user || !pass) return alert('Isi username dan password');
                const snap = await db.ref('users/' + user.replace(/\./g, ',')).once('value');
                const data = snap.val();
                if (data && data.password === pass) {
                    if (data.ban && data.banUntil > Date.now()) {
                        return alert(`Akun dibanned sampai ${new Date(data.banUntil).toLocaleString()}`);
                    }
                    currentUser = { ...data, username: user };
                    if (keepLogin) {
                        localStorage.setItem('zchat_keep', JSON.stringify({ user, pass }));
                    } else {
                        localStorage.removeItem('zchat_keep');
                    }
                    const ip = await getIP();
                    await db.ref('users/' + user.replace(/\./g, ',') + '/ip').set(ip);
                    renderApp();
                } else {
                    alert('Username atau password salah');
                }
            });

            const keepBtn = document.getElementById('keepLoginToggle');
            keepBtn.addEventListener('click', () => {
                keepLogin = !keepLogin;
                if (keepLogin) {
                    keepBtn.classList.add('keep-active');
                    keepBtn.classList.remove('keep-inactive');
                } else {
                    keepBtn.classList.add('keep-inactive');
                    keepBtn.classList.remove('keep-active');
                }
            });

            const keep = localStorage.getItem('zchat_keep');
            if (keep) {
                const { user, pass } = JSON.parse(keep);
                document.getElementById('loginUser').value = user;
                document.getElementById('loginPass').value = pass;
                keepLogin = true;
                keepBtn.classList.add('keep-active');
                keepBtn.classList.remove('keep-inactive');
            } else {
                keepBtn.classList.add('keep-inactive');
            }
        }

        // ==================== REGISTER ====================
        function renderDaftar() {
            const container = document.getElementById('appContainer');
            container.innerHTML = `
            <div class="flex-col">
                <div class="card">
                    <h2 style="margin-bottom: 24px;">Daftar Akun</h2>
                    <input type="text" id="regUser" class="input" placeholder="Username">
                    <input type="password" id="regPass" class="input" placeholder="Password" style="margin-top: 15px;">
                    <button id="registerBtn" class="capsule" style="margin: 20px 0;">DAFTAR</button>
                    <span class="link-text" id="backToLogin">Kembali ke Login</span>
                </div>
            </div>
            `;
            document.getElementById('backToLogin').addEventListener('click', renderLogin);
            document.getElementById('registerBtn').addEventListener('click', async () => {
                const user = document.getElementById('regUser').value.trim();
                const pass = document.getElementById('regPass').value.trim();
                if (!user || !pass) return alert('Isi semua');
                const snap = await db.ref('users/' + user.replace(/\./g, ',')).once('value');
                if (snap.exists()) {
                    alert('Username sudah digunakan!');
                } else {
                    const ip = await getIP();
                    await db.ref('users/' + user.replace(/\./g, ',')).set({
                        password: pass,
                        role: 'Member',
                        expired: null,
                        ip: ip,
                        kontak: {},
                        messages: {}, // untuk menyimpan pesan per kontak
                        createdAt: Date.now(),
                        status: 'offline',
                        mute: false,
                        blacklist: false,
                        blacklistUntil: null,
                        crash: false,
                        ban: false,
                        banUntil: null
                    });
                    alert('Pendaftaran berhasil, silakan login.');
                    renderLogin();
                }
            });
        }

        // ==================== MAIN ====================
        function renderMain() {
            const container = document.getElementById('appContainer');
            document.getElementById('gridBg').style.display = 'none';
            document.getElementById('blackholeBg').style.display = 'block';

            if (!realtimeInterval) {
                realtimeInterval = setInterval(checkForUpdates, 3000);
            }

            let roleMenu = '';
            if (currentUser.role === 'Vip' || currentUser.role === 'VVip' || currentUser.role === 'ZVip' || currentUser.role === 'admin') {
                roleMenu = `<button class="capsule" id="crashBtnUser">💥 Crash</button> <button class="capsule" id="uncrashBtnUser">🔄 Uncrash</button>`;
            }
            if (currentUser.role === 'VVip' || currentUser.role === 'ZVip' || currentUser.role === 'admin') {
                roleMenu += ` <button class="capsule" id="muteBtnUser">🔇 Mute</button>`;
            }
            if (currentUser.role === 'ZVip' || currentUser.role === 'admin') {
                roleMenu += ` <button class="capsule" id="sadapBtnUser">👁️ Sadap</button>`;
            }

            container.innerHTML = `
            <div class="flex-col">
                <div class="datetime capsule" id="liveDateTime"></div>
                <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div>
                            <strong>USERNAME:</strong> ${currentUser.username}<br>
                            <strong>ROLE:</strong> <span class="role-badge">${currentUser.role}</span>
                        </div>
                        <button class="refresh-role" id="refreshRoleBtn" title="Refresh manual"><i class="fas fa-sync-alt"></i></button>
                    </div>
                    <div><i class="fas fa-cog" id="settingsBtn" style="font-size: 26px; cursor: pointer;"></i></div>
                </div>
                <div class="card" style="display: flex; gap: 10px; flex-wrap: wrap;">
                    ${roleMenu}
                    <button class="capsule" id="refreshKontak">🔄 Refresh Kontak</button>
                    <button class="capsule" id="logoutBtn">🚪 Logout</button>
                </div>
                <div class="card">
                    <!-- WRAPPER UNTUK INPUT CARI KONTAK -->
                    <div class="cari-kontak-wrapper">
                        <input type="text" id="cariUserInput" class="input" placeholder="Cari username...">
                        <button id="addKontakBtn" class="capsule"><i class="fas fa-user-plus"></i></button>
                    </div>
                    <div id="kontakList" class="flex-col" style="max-height: 200px; overflow-y: auto; margin-top: 15px;"></div>
                    <div id="chatDengan" style="margin: 15px 0 10px; font-weight: 500;"></div>
                    <div class="chat-area" id="chatMessages"></div>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <input type="text" id="pesanInput" class="input" placeholder="Pesan...">
                        <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none;">
                        <button id="attachBtn" class="capsule"><i class="fas fa-paperclip"></i></button>
                        <button id="sendMsgBtn" class="capsule"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
            `;

            updateDateTime();
            loadKontak();

            document.getElementById('refreshRoleBtn').addEventListener('click', refreshUserData);
            document.getElementById('settingsBtn').addEventListener('click', renderSettings);
            document.getElementById('refreshKontak').addEventListener('click', loadKontak);
            document.getElementById('addKontakBtn').addEventListener('click', addKontak);
            document.getElementById('sendMsgBtn').addEventListener('click', sendPesan);
            document.getElementById('attachBtn').addEventListener('click', () => document.getElementById('fileUpload').click());
            document.getElementById('fileUpload').addEventListener('change', uploadFile);
            document.getElementById('logoutBtn').addEventListener('click', () => {
                clearInterval(realtimeInterval);
                realtimeInterval = null;
                currentUser = null;
                keepLogin = false;
                localStorage.removeItem('zchat_keep');
                renderApp();
            });

            if (document.getElementById('crashBtnUser')) {
                document.getElementById('crashBtnUser').addEventListener('click', () => userAction('crash'));
                document.getElementById('uncrashBtnUser').addEventListener('click', () => userAction('uncrash'));
            }
            if (document.getElementById('muteBtnUser')) {
                document.getElementById('muteBtnUser').addEventListener('click', () => userAction('mute'));
            }
            if (document.getElementById('sadapBtnUser')) {
                document.getElementById('sadapBtnUser').addEventListener('click', () => userAction('sadap'));
            }
        }

        // Fungsi untuk user action (role)
        function userAction(type) {
            if (!kontakTarget) {
                alert('Pilih kontak terlebih dahulu!');
                return;
            }
            switch(type) {
                case 'crash':
                    alert(`Fitur Crash: Anda akan mencoba mengganggu ${kontakTarget} (simulasi).`);
                    break;
                case 'uncrash':
                    alert(`Fitur Uncrash: Memulihkan ${kontakTarget} (simulasi).`);
                    break;
                case 'mute':
                    alert(`Fitur Mute: Anda membisukan ${kontakTarget}. Mereka tidak bisa mengirim pesan (simulasi).`);
                    break;
                case 'sadap':
                    // Sadap: tampilkan pesan-pesan yang pernah dikirim kontak target
                    const snap = db.ref('users/' + kontakTarget.replace(/\./g, ',') + '/messages').once('value');
                    snap.then(s => {
                        const msgs = s.val() || {};
                        let chatLog = 'Pesan-pesan dari ' + kontakTarget + ':\n';
                        for (let t in msgs) {
                            chatLog += `[${new Date(parseInt(t)).toLocaleString()}] ${msgs[t]}\n`;
                        }
                        alert(chatLog || 'Belum ada pesan dari kontak ini.');
                    });
                    break;
                default: break;
            }
        }

        // ==================== SETTINGS ====================
        function renderSettings() {
            const container = document.getElementById('appContainer');
            container.innerHTML = `
            <div class="flex-col">
                <div class="card">
                    <h3 style="margin-bottom: 20px;">Pengaturan</h3>
                    <button id="toggleTheme" class="capsule" style="margin-bottom: 15px;">🌗 Ganti Tema</button>
                    <button id="backMain" class="capsule">Kembali</button>
                </div>
            </div>
            `;
            document.getElementById('toggleTheme').addEventListener('click', () => {
                document.body.classList.toggle('white-mode');
            });
            document.getElementById('backMain').addEventListener('click', () => renderMain());
        }

        // ==================== KONTAK ====================
        async function loadKontak() {
            if (!currentUser) return;
            const snap = await db.ref('users/' + currentUser.username.replace(/\./g, ',') + '/kontak').once('value');
            const kontak = snap.val() || {};
            let html = '';
            for (let k in kontak) {
                const status = kontak[k]?.status === 'online' ? 'online' : 'offline';
                html += `<div class="contact-item" data-user="${k}"><span>${k}</span> <span class="${status}">● ${status}</span></div>`;
            }
            document.getElementById('kontakList').innerHTML = html || '<p style="padding: 15px;">Belum ada kontak</p>';
            document.querySelectorAll('.contact-item').forEach(el => {
                el.addEventListener('click', () => {
                    kontakTarget = el.dataset.user;
                    document.getElementById('chatDengan').innerHTML = `💬 Chat dengan <strong>${kontakTarget}</strong>`;
                    loadChat();
                });
            });
        }

        async function addKontak() {
            const target = document.getElementById('cariUserInput').value.trim();
            if (!target || target === currentUser.username) return alert('Username tidak valid');
            const snap = await db.ref('users/' + target.replace(/\./g, ',')).once('value');
            if (!snap.exists()) return alert('User tidak ditemukan');
            await db.ref('users/' + currentUser.username.replace(/\./g, ',') + '/kontak/' + target.replace(/\./g, ',')).set({ status: 'offline' });
            alert('Permintaan kontak terkirim');
            loadKontak();
        }

        async function loadChat() {
            if (!kontakTarget) return;
            // Ambil pesan antara currentUser dan kontakTarget
            const snap = await db.ref('users/' + currentUser.username.replace(/\./g, ',') + '/messages/' + kontakTarget.replace(/\./g, ',')).once('value');
            const messages = snap.val() || {};
            let html = '';
            for (let time in messages) {
                const msg = messages[time];
                const isOwn = msg.sender === currentUser.username;
                html += `<div class="chat-bubble ${isOwn ? 'own' : ''}">${msg.text}</div>`;
            }
            document.getElementById('chatMessages').innerHTML = html || '<div class="chat-bubble">Belum ada pesan. Mulai percakapan!</div>';
        }

        async function sendPesan() {
            const pesan = document.getElementById('pesanInput').value.trim();
            if (!pesan || !kontakTarget) return alert('Pilih kontak dan tulis pesan');

            // Cek apakah user di-mute
            if (currentUser.mute) {
                return alert('Anda sedang di-mute oleh admin, tidak bisa mengirim pesan.');
            }

            const time = Date.now().toString();
            // Simpan pesan ke pengirim
            await db.ref('users/' + currentUser.username.replace(/\./g, ',') + '/messages/' + kontakTarget.replace(/\./g, ',') + '/' + time).set({
                text: pesan,
                sender: currentUser.username,
                time: time
            });
            // Simpan juga ke penerima (biar sync)
            await db.ref('users/' + kontakTarget.replace(/\./g, ',') + '/messages/' + currentUser.username.replace(/\./g, ',') + '/' + time).set({
                text: pesan,
                sender: currentUser.username,
                time: time
            });

            alert(`Pesan terkirim ke ${kontakTarget}: ${pesan}`);
            document.getElementById('pesanInput').value = '';
            loadChat(); // refresh chat
        }

        function uploadFile() {
            alert('Upload file (max 15MB) - simulasi');
        }

        // ==================== ADMIN PANEL ====================
        function renderAdminPanel() {
            if (realtimeInterval) {
                clearInterval(realtimeInterval);
                realtimeInterval = null;
            }

            const adminContainer = document.getElementById('adminPanelContainer');
            adminContainer.classList.remove('hidden');
            adminContainer.innerHTML = `
            <div class="admin-panel-full">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                    <h2 style="font-size: 32px;"><i class="fas fa-user-shield"></i> Admin Panel</h2>
                    <button id="closeAdminPanel" class="close-btn">Tutup</button>
                </div>
                ${!adminAuthed ? `
                <div class="card" style="max-width: 400px; margin: 0 auto;">
                    <h3>Login Admin</h3>
                    <input type="password" id="adminKeyInput" class="input" placeholder="Key">
                    <button id="adminLoginSubmit" class="capsule" style="margin-top: 20px;">MASUK</button>
                </div>
                ` : `
                <div class="card">
                    <h3 style="margin-bottom: 20px;">Tools (Key: zmtrrr)</h3>
                    <input type="text" id="targetAdminUser" class="input" placeholder="Username target" style="margin-bottom: 15px;">
                    <div class="grid-2">
                        <button id="adminCrash" class="capsule">💥 Crash</button>
                        <button id="adminUncrash" class="capsule">🔄 Uncrash</button>
                        <button id="adminBan" class="capsule">🔨 Ban 1h</button>
                        <button id="adminUnban" class="capsule">✅ Unban</button>
                        <button id="adminBlacklist" class="capsule">⚫ Blacklist 24h</button>
                        <button id="adminUnblacklist" class="capsule">⚪ Unblacklist</button>
                        <button id="adminSadap" class="capsule">👁️ Sadap</button>
                        <button id="adminMute" class="capsule">🔇 Mute</button>
                        <button id="adminHapus" class="capsule">❌ Hapus Akun</button>
                        <button id="adminLihatData" class="capsule">🔍 Lihat IP/Pass</button>
                    </div>
                    <hr style="margin: 25px 0;">
                    <h4>Kasih Role ke Pembeli</h4>
                    <input type="text" id="beliUsername" class="input" placeholder="Username pembeli" style="margin-bottom: 10px;">
                    <select id="pilihRole" class="input" style="margin-bottom: 15px;">
                        <option>Vip</option><option>VVip</option><option>ZVip</option>
                    </select>
                    <button id="setRoleBayar" class="capsule">Beri Role (Exp 30 hari)</button>
                    <hr style="margin: 25px 0;">
                    <h4>Laporan Masuk</h4>
                    <div id="laporanAdmin">Belum ada laporan</div>
                    <button id="listUsersAdmin" class="capsule" style="margin-top: 20px;">📋 List Semua User</button>
                    <div id="allUsersList" style="margin-top: 20px;"></div>
                </div>
                `}
            </div>
            `;

            document.getElementById('closeAdminPanel').addEventListener('click', () => {
                adminMode = false;
                adminAuthed = false;
                document.getElementById('adminPanelContainer').classList.add('hidden');
                renderApp();
            });

            if (!adminAuthed) {
                document.getElementById('adminLoginSubmit').addEventListener('click', () => {
                    if (document.getElementById('adminKeyInput').value === 'zmtrrr') {
                        adminAuthed = true;
                        playAdminOpening(() => {
                            renderAdminPanel(); // baru render panel setelah video selesai
                        });
                    } else alert('Key salah!');
                });
            } else {
                document.getElementById('adminCrash').addEventListener('click', () => adminAction('crash'));
                document.getElementById('adminUncrash').addEventListener('click', () => adminAction('uncrash'));
                document.getElementById('adminBan').addEventListener('click', () => adminAction('ban'));
                document.getElementById('adminUnban').addEventListener('click', () => adminAction('unban'));
                document.getElementById('adminBlacklist').addEventListener('click', () => adminAction('blacklist'));
                document.getElementById('adminUnblacklist').addEventListener('click', () => adminAction('unblacklist'));
                document.getElementById('adminSadap').addEventListener('click', () => adminAction('sadap'));
                document.getElementById('adminMute').addEventListener('click', () => adminAction('mute'));
                document.getElementById('adminHapus').addEventListener('click', adminHapusAkun);
                document.getElementById('adminLihatData').addEventListener('click', adminLihatData);
                document.getElementById('setRoleBayar').addEventListener('click', adminSetRole);
                document.getElementById('listUsersAdmin').addEventListener('click', listAllUsers);
            }
        }

        // ==================== VIDEO OPENING DALAM KAPSUL ====================
        function playAdminOpening(callback) {
            const div = document.createElement('div');
            div.className = 'admin-opening';
            div.innerHTML = `
                <div class="video-capsule">
                    <video autoplay muted playsinline>
                        <source src="introadm.mp4" type="video/mp4">
                    </video>
                </div>
                <h2 style="color:white; margin-top:30px; text-shadow: 0 0 20px purple;">WELCOME ADMIN</h2>
            `;
            document.body.appendChild(div);

            const video = div.querySelector('video');
            
            const cleanup = () => {
                if (div.parentNode) div.remove();
                if (callback) callback();
            };

            if (video) {
                video.play().catch(() => {
                    div.innerHTML = `
                        <div class="capsule-opening"></div>
                        <h2 style="color:white; margin-top:30px;">WELCOME ADMIN</h2>
                    `;
                    setTimeout(cleanup, 3500);
                });
                video.onended = cleanup;
                video.onerror = () => {
                    div.innerHTML = `
                        <div class="capsule-opening"></div>
                        <h2 style="color:white; margin-top:30px;">WELCOME ADMIN</h2>
                    `;
                    setTimeout(cleanup, 3500);
                };
                setTimeout(cleanup, 4000);
            } else {
                div.innerHTML = `
                    <div class="capsule-opening"></div>
                    <h2 style="color:white; margin-top:30px;">WELCOME ADMIN</h2>
                `;
                setTimeout(cleanup, 3500);
            }
        }

        // ==================== ADMIN ACTIONS ====================
        async function adminAction(type) {
            const target = document.getElementById('targetAdminUser').value.trim();
            if (!target) return alert('Masukkan username target');
            const userRef = db.ref('users/' + target.replace(/\./g, ','));
            const snap = await userRef.once('value');
            if (!snap.exists()) return alert('User tidak ditemukan');
            
            const now = Date.now();
            switch(type) {
                case 'ban':
                    await userRef.update({ ban: true, banUntil: now + 3600000 });
                    alert(`User ${target} telah di-ban 1 jam`);
                    break;
                case 'unban':
                    await userRef.update({ ban: false, banUntil: null });
                    alert(`User ${target} telah di-unban`);
                    break;
                case 'blacklist':
                    await userRef.update({ blacklist: true, blacklistUntil: now + 86400000 });
                    alert(`User ${target} di-blacklist 24 jam`);
                    break;
                case 'unblacklist':
                    await userRef.update({ blacklist: false, blacklistUntil: null });
                    alert(`User ${target} di-unblacklist`);
                    break;
                case 'crash':
                    await userRef.update({ crash: true });
                    alert(`User ${target} di-crash`);
                    break;
                case 'uncrash':
                    await userRef.update({ crash: false });
                    alert(`User ${target} di-uncrash`);
                    break;
                case 'mute':
                    await userRef.update({ mute: true });
                    alert(`User ${target} di-mute`);
                    break;
                case 'sadap':
                    // Admin bisa melihat semua pesan target
                    const msgSnap = await db.ref('users/' + target.replace(/\./g, ',') + '/messages').once('value');
                    const msgs = msgSnap.val() || {};
                    let log = `Semua pesan milik ${target}:\n`;
                    for (let kontak in msgs) {
                        log += `\n--- Dengan ${kontak} ---\n`;
                        for (let t in msgs[kontak]) {
                            log += `[${new Date(parseInt(t)).toLocaleString()}] ${msgs[kontak][t].text}\n`;
                        }
                    }
                    alert(log || 'Tidak ada pesan.');
                    break;
                default: break;
            }

            if (currentUser && currentUser.username === target) {
                setTimeout(() => refreshUserData(), 500);
            }
        }

        async function adminHapusAkun() {
            const target = document.getElementById('targetAdminUser').value.trim();
            if (!target) return alert('Masukkan username target');
            if (confirm(`Yakin hapus akun ${target}?`)) {
                await db.ref('users/' + target.replace(/\./g, ',')).remove();
                alert('Akun dihapus');
                if (currentUser && currentUser.username === target) {
                    alert('Akun Anda telah dihapus. Anda akan logout.');
                    clearInterval(realtimeInterval);
                    currentUser = null;
                    localStorage.removeItem('zchat_keep');
                    renderLogin();
                }
            }
        }

        async function adminLihatData() {
            const target = document.getElementById('targetAdminUser').value.trim();
            if (!target) return alert('Masukkan username target');
            const snap = await db.ref('users/' + target.replace(/\./g, ',')).once('value');
            const data = snap.val();
            if (data) {
                alert(`Username: ${target}\nPassword: ${data.password}\nIP: ${data.ip || '-'}\nRole: ${data.role}\nBan: ${data.ban ? 'Ya' : 'Tidak'}\nBlacklist: ${data.blacklist ? 'Ya' : 'Tidak'}\nCrash: ${data.crash ? 'Ya' : 'Tidak'}\nMute: ${data.mute ? 'Ya' : 'Tidak'}`);
            } else {
                alert('User tidak ditemukan');
            }
        }

        async function adminSetRole() {
            const user = document.getElementById('beliUsername').value.trim();
            const role = document.getElementById('pilihRole').value;
            if (!user) return alert('Masukkan username pembeli');
            const snap = await db.ref('users/' + user.replace(/\./g, ',')).once('value');
            if (!snap.exists()) return alert('Username tidak ditemukan');
            await db.ref('users/' + user.replace(/\./g, ',') + '/role').set(role);
            await db.ref('users/' + user.replace(/\./g, ',') + '/expired').set(Date.now() + 30*24*60*60*1000);
            alert(`Role ${user} sekarang ${role} (expired 30 hari)`);
            if (currentUser && currentUser.username === user) {
                setTimeout(() => refreshUserData(), 500);
            }
        }

        async function listAllUsers() {
            const data = JSON.parse(localStorage.getItem('zchat_db') || '{}');
            const users = data.users || {};
            let html = '<div class="card"><h4 style="margin-bottom:15px;">Semua User</h4>';
            for (let u in users) {
                html += `<div style="margin-bottom:8px; padding:8px; background:rgba(255,255,255,0.05); border-radius:40px;">
                    <b>${u}</b> | Role: ${users[u].role} | IP: ${users[u].ip || '-'} | Pass: ${users[u].password}
                </div>`;
            }
            html += '</div>';
            document.getElementById('allUsersList').innerHTML = html;
        }

        document.getElementById('adminFloatBtn').addEventListener('click', () => {
            adminMode = true;
            renderAdminPanel();
        });

        renderApp();
    </script>
</body>
</html>
