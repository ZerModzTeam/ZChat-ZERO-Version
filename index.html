<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZCHAT ZERO - ABSOLUTE</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root { --p: #a855f7; --bg: #000; --text: #fff; --glass: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; width: 100vw; overflow: hidden; }
        .page { display: none; height: 100vh; width: 100%; flex-direction: column; animation: f 0.3s; }
        @keyframes f { from { opacity: 0; } to { opacity: 1; } }
        .cap { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; }
        .in { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #111; color: #fff; margin-bottom: 10px; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--p); color: #fff; font-weight: 900; cursor: pointer; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-red { background: #ef4444; } .btn-green { background: #22c55e; } .btn-blue { background: #3b82f6; } .btn-gray { background: #444; }
        #toast { position: fixed; top: -50px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 30px; border-radius: 50px; font-weight: bold; transition: 0.4s; z-index: 9999; }
        .app-grid { display: grid; grid-template-columns: 300px 1fr; gap: 15px; height: 100vh; padding: 15px; }
        .msg-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; position: relative; }
        .me { align-self: flex-end; background: var(--p); border-bottom-right-radius: 2px; }
        .him { align-self: flex-start; background: var(--glass); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        .u-card { background: #111; border: 1px solid var(--border); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .adm-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="toast">SYSTEM READY</div>

<div id="p-auth" class="page" style="display:flex; align-items:center; justify-content:center">
    <div class="cap" style="width:350px; padding:35px; text-align:center">
        <h1 style="letter-spacing:10px; margin-bottom:20px">ZERO</h1>
        <input type="text" id="au-u" class="in" placeholder="Username">
        <input type="password" id="au-p" class="in" placeholder="Password">
        <button class="btn" onclick="auth('login')">LOGIN</button>
        <button class="btn" style="background:transparent; border:1px solid var(--border); margin-top:10px" onclick="auth('reg')">REGISTER</button>
        <div style="margin-top:30px; opacity:0.1; cursor:pointer; font-size: 10px;" onclick="openAdmin()">MASTER_ACCESS_PROMPT</div>
    </div>
</div>

<div id="p-app" class="page">
    <div class="app-grid">
        <aside class="cap" style="padding:15px; display:flex; flex-direction:column">
            <h3 style="margin-bottom: 15px;">Z-VOICE</h3>
            <div id="list-user" style="flex:1; overflow-y:auto; margin-top:5px"></div>
            <button class="btn btn-red" style="padding:10px; font-size: 12px;" onclick="logout()">LOGOUT</button>
        </aside>
        <main class="cap" style="display:flex; flex-direction:column; overflow:hidden">
            <div style="padding:15px 25px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.02)">
                <b id="chat-with">ZChat Terminal</b>
            </div>
            <div id="msg-render" class="msg-box"></div>
            <div style="padding:20px; display:flex; gap:10px">
                <input type="text" id="m-text" class="in" style="margin:0" placeholder="Type message...">
                <button class="btn" style="width:80px" onclick="send()">></button>
            </div>
        </main>
    </div>
</div>

<div id="p-admin" class="page" style="padding:30px; overflow-y:auto; background:#050505">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
        <h1>GOD CONTROL</h1>
        <button class="btn btn-gray" style="width:auto; padding:10px 30px" onclick="location.reload()">EXIT</button>
    </div>

    <div class="u-card">
        <h3>GLOBAL SPY (SADAP)</h3>
        <p style="font-size: 12px; opacity: 0.6; margin-bottom: 10px;">Cukup masukkan 1 username untuk melihat semua riwayat chatnya.</p>
        <input type="text" id="spy-target" class="in" placeholder="Username Target">
        <button class="btn btn-blue" onclick="spyUser()">SADAP CHAT</button>
    </div>

    <div class="u-card">
        <h3>ROLE & PERMISSION</h3>
        <p style="font-size: 12px; opacity: 0.6; margin-bottom: 10px;">Ganti role user (Member, VIP, Admin, Owner) dengan USN.</p>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="role-target" class="in" placeholder="Username Target">
            <input type="text" id="role-name" class="in" placeholder="Nama Role Baru">
        </div>
        <button class="btn btn-green" onclick="setRole()">UPDATE ROLE</button>
    </div>

    <div id="admin-user-list"></div>
</div>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyDZMFlfu8ObuuEpicbbkUyKWn_gUFnY_SQ",
    databaseURL: "https://project-aaa14b70-7347-4232-8a0-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "project-aaa14b70-7347-4232-8a0"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let me = localStorage.getItem('z_usn');
let cur = null;

function toast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.top='20px'; setTimeout(()=>t.style.top='-50px',2500); }
function logout() { localStorage.clear(); location.reload(); }

// --- AUTH ---
async function auth(t) {
    const u = document.getElementById('au-u').value.trim().toLowerCase();
    const p = document.getElementById('au-p').value.trim();
    if(!u || !p) return toast("Isi data!");
    const s = await db.ref('users/'+u).get();
    if(t==='reg') {
        if(s.exists()) return toast("Username ada!");
        await db.ref('users/'+u).set({p, role:'Member', status:'active'}); toast("Sukses!");
    } else {
        if(s.exists() && s.val().p === p) { localStorage.setItem('z_usn', u); location.reload(); }
        else toast("Salah data!");
    }
}

window.onload = () => {
    if(me) {
        db.ref('users/'+me).once('value', s => {
            if(!s.exists()) return logout();
            document.getElementById('p-app').style.display = 'flex';
            loadContacts();
            listenStatus();
        });
    } else { document.getElementById('p-auth').style.display = 'flex'; }
};

// --- APP LOGIC ---
function loadContacts() {
    db.ref('users').on('value', s => {
        const b = document.getElementById('list-user'); b.innerHTML = '';
        s.forEach(u => {
            if(u.key === me) return;
            const d = document.createElement('div'); d.className='cap'; d.style='padding:12px; margin-bottom:8px; cursor:pointer';
            d.innerHTML = `<b>${u.key.toUpperCase()}</b><br><small style="opacity:0.5">${u.val().role}</small>`;
            d.onclick = () => openChat(u.key); b.appendChild(d);
        });
    });
}

function openChat(id) {
    cur = id; document.getElementById('chat-with').innerText = id.toUpperCase();
    const cid = me < id ? me+'_'+id : id+'_'+me;
    db.ref('chats/'+cid).off();
    db.ref('chats/'+cid).on('value', s => {
        const b = document.getElementById('msg-render'); b.innerHTML = '';
        s.forEach(m => {
            const d = m.val(); const div = document.createElement('div');
            div.className = `bubble ${d.f===me?'me':'him'}`; div.innerText = atob(d.m); b.appendChild(div);
        });
        b.scrollTop = b.scrollHeight;
    });
}

async function send() {
    const m = document.getElementById('m-text').value; if(!m || !cur) return;
    const cid = me < cur ? me+'_'+cur : cur+'_'+me;
    await db.ref('chats/'+cid).push({f:me, m:btoa(m), t:Date.now()}); 
    document.getElementById('m-text').value='';
}

// --- ADMIN GOD MODE ---
function openAdmin() {
    const k = prompt("Master Key:");
    if(k === 'zmtrrr') {
        document.getElementById('p-auth').style.display = 'none';
        document.getElementById('p-app').style.display = 'none';
        document.getElementById('p-admin').style.display = 'flex';
        renderAdmin();
    }
}

function renderAdmin() {
    db.ref('users').on('value', s => {
        const b = document.getElementById('admin-user-list'); b.innerHTML = '<h3 style="margin-bottom:15px">DATABASE USER</h3>';
        s.forEach(u => {
            const d = u.val(); const div = document.createElement('div'); div.className='u-card';
            div.innerHTML = `<b>${u.key}</b> | Role: ${d.role} | Status: ${d.status}
            <div class="adm-btn-group">
                <button class="btn btn-red" onclick="upStat('${u.key}', 'ban')">BAN</button>
                <button class="btn btn-green" onclick="upStat('${u.key}', 'active')">UNBAN</button>
                <button class="btn btn-red" onclick="upStat('${u.key}', 'crash')">CRASH</button>
                <button class="btn btn-green" onclick="upStat('${u.key}', 'active')">UNCRASH</button>
            </div>`;
            b.appendChild(div);
        });
    });
}

async function upStat(u, s) { await db.ref('users/'+u+'/status').set(s); toast(u + " -> " + s); }

// GANTI ROLE CUKUP PAKAI USN
async function setRole() {
    const target = document.getElementById('role-target').value.trim().toLowerCase();
    const newRole = document.getElementById('role-name').value.trim();
    if(!target || !newRole) return toast("Isi USN & Role!");
    const s = await db.ref('users/'+target).get();
    if(!s.exists()) return toast("User tidak ditemukan!");
    await db.ref('users/'+target+'/role').set(newRole);
    toast("Role " + target + " diperbarui!");
}

// SADAP CUKUP 1 USERNAME
async function spyUser() {
    const target = document.getElementById('spy-target').value.trim().toLowerCase();
    if(!target) return toast("Masukkan Username!");
    const snap = await db.ref('chats').get();
    let logs = "RIWAYAT SADAP [" + target + "]:\n\n";
    let found = false;
    snap.forEach(room => {
        if(room.key.includes(target)) {
            found = true;
            logs += ">>> ROOM: " + room.key + "\n";
            room.forEach(msg => { logs += "[" + msg.val().f + "]: " + atob(msg.val().m) + "\n"; });
            logs += "\n";
        }
    });
    alert(found ? logs : "Tidak ada riwayat chat untuk user ini.");
}

function listenStatus() {
    db.ref('users/'+me+'/status').on('value', s => {
        const v = s.val();
        if(v === 'ban') { alert("DIBANNED ADMIN!"); logout(); }
        if(v === 'crash') { document.body.innerHTML = `<div style="background:red;height:100vh;display:flex;align-items:center;justify-content:center;color:white;text-align:center"><h1>CRASHED BY GOD</h1><p>Aplikasi Anda dihentikan paksa.</p></div>`; }
    });
}
</script>
</body>
</html>
