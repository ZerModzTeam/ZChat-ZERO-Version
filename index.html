<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Zero Edition - Official</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>

    <style>
        :root { 
            --p: #a855f7; --g: #bf00ff; --bg: #000; --text: #fff; 
            --glass: rgba(255, 255, 255, 0.08); --border: rgba(255,255,255,0.1);
        }
        [data-theme="light"] {
            --bg: #f5f5f7; --text: #1d1d1f; --glass: rgba(0, 0, 0, 0.05); --border: rgba(0,0,0,0.1);
        }

        * { font-family: 'SF Pro Display', sans-serif; box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; transition: 0.4s; }

        /* LOADING ANIMATION */
        #loader { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spin { width: 40px; height: 40px; border: 4px solid var(--glass); border-top-color: var(--p); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* BACKGROUND EFFECTS */
        #bg-grid { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(var(--p) 1px, transparent 1px), linear-gradient(90deg, var(--p) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.15; animation: mv 10s linear infinite; }
        #bg-bh { position: fixed; inset: 0; z-index: -2; display: none; align-items: center; justify-content: center; }
        .bh { width: 280px; height: 280px; background: #000; border-radius: 50%; box-shadow: 0 0 100px 20px var(--g), inset 0 0 50px #000; animation: pulse 3s infinite alternate; }
        @keyframes mv { from { transform: translateY(0); } to { transform: translateY(40px); } }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); box-shadow: 0 0 140px 40px var(--g); } }

        /* UI COMPONENTS */
        .cap { background: var(--glass); backdrop-filter: blur(30px); border-radius: 30px; border: 1px solid var(--border); padding: 20px; }
        .in { width: 100%; border-radius: 50px; padding: 14px 22px; border: 1px solid var(--border); background: rgba(0,0,0,0.2); color: var(--text); margin-bottom: 12px; font-size: 15px; }
        .btn { width: 100%; border-radius: 50px; padding: 14px; border: none; background: var(--p); color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); }
        .btn-t { background: var(--glass); border: 1px solid var(--border); color: var(--text); }

        /* PAGES */
        .page { display: none; height: 100vh; animation: up 0.5s ease-out; position: relative; z-index: 10; }
        @keyframes up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* INTRO ADMIN KAPSUL */
        #z-intro { position: fixed; inset: 0; z-index: 99999; background: #000; display: none; align-items: center; justify-content: center; }
        .vid-kapsul { width: 85%; height: 80%; border-radius: 60px; border: 4px solid var(--p); overflow: hidden; transform: scale(0.2); opacity: 0; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .vid-kapsul.active { transform: scale(1); opacity: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* CHAT BUBBLES & LAYOUT */
        .chat-container { display: grid; grid-template-columns: 320px 1fr; gap: 15px; height: calc(100vh - 120px); }
        .list-user { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 20px; background: var(--glass); cursor: pointer; transition: 0.3s; position: relative; }
        .user-item:hover { background: rgba(168, 85, 247, 0.1); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; position: absolute; bottom: 12px; left: 45px; border: 2px solid #000; }
        .online { background: #22c55e; } .offline { background: #ef4444; }

        .chat-main { display: flex; flex-direction: column; background: var(--glass); border-radius: 30px; border: 1px solid var(--border); overflow: hidden; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 70%; padding: 12px 16px; border-radius: 20px; font-size: 15px; position: relative; line-height: 1.4; }
        .me { align-self: flex-end; background: var(--p); border-bottom-right-radius: 4px; }
        .him { align-self: flex-start; background: var(--glass); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .reply-box { font-size: 11px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 8px; margin-bottom: 5px; border-left: 3px solid #fff; }

        #z-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--p); padding: 14px 30px; border-radius: 50px; z-index: 1000000; transition: 0.5s; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* ADMIN UI */
        .adm-card { background: var(--glass); padding: 15px; border-radius: 20px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; align-items: center; font-size: 13px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="loader"><div class="spin"></div></div>
<div id="z-toast">ZChat Notification</div>
<div id="bg-grid"></div>
<div id="bg-bh"><div class="bh"></div></div>

<div id="z-intro">
    <div class="vid-kapsul" id="v-frame">
        <video id="v-adm" src="introadm.mp4"></video>
    </div>
</div>

<div id="p-login" class="page" style="display: flex; align-items: center; justify-content: center;">
    <div onclick="unlockAdm()" style="position:fixed; top:20px; right:20px; font-size:24px; cursor:pointer; opacity:0.1">🔑</div>
    <div class="cap" style="width: 380px; text-align: center;">
        <h1 style="letter-spacing: 8px;">ZCHAT</h1>
        <div style="margin: 20px 0;">
            <div id="j-jam" style="font-size: 45px; font-weight: bold; color: var(--p);">00:00</div>
            <div id="j-tgl" style="font-size: 12px; opacity: 0.6;">LOADING...</div>
        </div>
        <div id="auth-forms">
            <div id="f-login">
                <input type="text" id="l-u" class="in" placeholder="Username">
                <input type="password" id="l-p" class="in" placeholder="Password">
                <button class="btn" onclick="handleAuth('login')">LOGIN</button>
                <p style="margin-top:15px; font-size:13px" onclick="toggleF('reg')">Belum punya akun? <b style="color:var(--p); cursor:pointer">Ayo daftar</b></p>
            </div>
            <div id="f-reg" style="display:none">
                <input type="text" id="r-u" class="in" placeholder="Username">
                <input type="password" id="r-p" class="in" placeholder="Password">
                <button class="btn" onclick="handleAuth('reg')">DAFTAR</button>
                <p style="margin-top:15px; font-size:13px" onclick="toggleF('login')">Sudah punya akun? <b style="color:var(--p); cursor:pointer">Login</b></p>
            </div>
        </div>
        <p style="margin-top:20px; font-size:12px; opacity:0.6; cursor:pointer" onclick="alert('VIP 120K: Crash\nVVIP 170K: Crash, Sadap\nZVIP 200K: Crash, Sadap, Mute')">LIHAT LIST ROLE</p>
        <p style="margin-top:10px; font-size:11px; color:var(--p); cursor:pointer" onclick="window.location.href='https://t.me/ZMTzermodzteam'">Beli role? Klik disini untuk membeli</p>
    </div>
</div>

<div id="p-app" class="page" style="padding: 20px; flex-direction: column;">
    <div class="cap" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div>
            <div style="font-weight:bold" id="u-display">USER: -</div>
            <div style="font-size:11px; font-weight:bold; color:var(--p)" id="r-display">ROLE: Member</div>
        </div>
        <div style="display:flex; gap:10px">
            <button class="btn btn-t" style="width:auto; padding:8px 15px" onclick="showDev()">DEVELOPER</button>
            <button class="btn btn-t" style="width:auto; padding:8px 15px" onclick="toggleTheme()">🌓</button>
            <button class="btn" style="width:auto; padding:8px 15px" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="cap" style="display: flex; flex-direction: column;">
            <div style="display:flex; gap:8px; margin-bottom:15px">
                <button class="btn" style="font-size:11px" onclick="loadTab('chat')">CHATS</button>
                <button class="btn btn-t" style="font-size:11px" onclick="loadTab('group')">GROUPS</button>
                <button class="btn btn-t" style="font-size:11px; position:relative" onclick="loadTab('req')">REQ <span id="req-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:red; color:white; border-radius:50%; padding:2px 6px; font-size:9px">!</span></button>
            </div>
            <div class="list-user" id="user-list-render">
                <input type="text" id="target-add" class="in" placeholder="Add Username...">
                <button class="btn" onclick="sendReq()">ADD CONTACT</button>
                <div id="items-box"></div>
            </div>
        </div>
        <div class="chat-main">
            <div id="chat-header" style="padding:15px 25px; border-bottom:1px solid var(--border); font-weight:bold; display:flex; justify-content:space-between">
                <span id="target-name">Pilih Kontak</span>
                <span id="target-status" style="font-size:10px; opacity:0.6"></span>
            </div>
            <div class="chat-msgs" id="chat-box"></div>
            <div id="role-extra" style="padding:10px 20px; display:none; gap:10px; border-top:1px solid var(--border)"></div>
            <div style="padding:15px 20px; display:flex; gap:10px">
                <input type="file" id="file-in" style="display:none" onchange="upFile(this)">
                <button class="btn btn-t" style="width:50px" onclick="document.getElementById('file-in').click()">📎</button>
                <input type="text" id="msg-in" class="in" style="margin:0" placeholder="Ketik pesan...">
                <button class="btn" style="width:80px" onclick="send()">➤</button>
            </div>
        </div>
    </div>
</div>

<div id="p-adm" class="page" style="padding: 30px; flex-direction: column; overflow-y:auto">
    <div style="display:flex; justify-content:space-between; margin-bottom:30px">
        <h2>MASTER PANEL</h2>
        <button class="btn btn-t" style="width:auto" onclick="location.reload()">EXIT</button>
    </div>
    <div class="cap" id="adm-render"></div>
</div>

<script>
    // --- CONFIG FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyDZMFlfu8ObuuEpicbbkUyKWn_gUFnY_SQ",
        authDomain: "project-aaa14b70-7347-4232-8a0.firebaseapp.com",
        databaseURL: "https://project-aaa14b70-7347-4232-8a0-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "project-aaa14b70-7347-4232-8a0",
        storageBucket: "project-aaa14b70-7347-4232-8a0.firebasestorage.app",
        messagingSenderId: "283427772761",
        appId: "1:283427772761:web:52a4bfd1cbb39589ac9448"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const st = firebase.storage();

    let me = localStorage.getItem('z_usn');
    let myData = null;
    let curChat = null;
    let replyTo = null;

    // --- UTILS ---
    function toast(m) {
        const t = document.getElementById('z-toast');
        t.innerText = m; t.style.top = '30px';
        setTimeout(() => t.style.top = '-100px', 3000);
    }

    // --- TIME & CLOCK ---
    setInterval(() => {
        const d = new Date();
        document.getElementById('j-jam').innerText = d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('j-tgl').innerText = d.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).toUpperCase();
        if(me) db.ref('users/'+me+'/last').set(Date.now());
    }, 1000);

    // --- ADMIN INTRO SCRIPT ---
    function unlockAdm() {
        if(prompt("MASTER KEY:") === 'zmtrrr') {
            const v = document.getElementById('v-adm');
            document.getElementById('z-intro').style.display = 'flex';
            v.play();
            setTimeout(() => document.getElementById('v-frame').classList.add('active'), 100);
            v.onended = () => {
                document.getElementById('z-intro').style.display = 'none';
                document.getElementById('p-login').style.display = 'none';
                document.getElementById('p-adm').style.display = 'flex';
                loadAdmPanel();
            }
        } else toast("AKSES DITOLAK!");
    }

    // --- AUTH ---
    async function handleAuth(t) {
        const u = document.getElementById(t==='login'?'l-u':'r-u').value.trim();
        const p = document.getElementById(t==='login'?'l-p':'r-p').value.trim();
        if(!u || !p) return toast("LENGKAPI DATA!");

        const s = await db.ref('users/'+u).get();
        if(t === 'reg') {
            if(s.exists()) return toast("USERNAME SUDAH ADA!");
            const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json());
            await db.ref('users/'+u).set({password:p, role:'Member', status:'active', ip:ip.ip, last:Date.now(), theme:'dark'});
            toast("DAFTAR BERHASIL!"); toggleF('login');
        } else {
            if(s.exists() && s.val().password === p) {
                if(s.val().status === 'ban' || s.val().status === 'bl') return toast("AKUN TERBLOKIR!");
                localStorage.setItem('z_usn', u); location.reload();
            } else toast("USER/PASS SALAH!");
        }
    }

    // --- CHAT LOGIC ---
    function initApp() {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('p-login').style.display = 'none';
        document.getElementById('p-app').style.display = 'flex';
        document.getElementById('bg-grid').style.display = 'none';
        document.getElementById('bg-bh').style.display = 'flex';
        
        db.ref('users/'+me).on('value', s => {
            myData = s.val();
            document.getElementById('u-display').innerText = "USER: "+me;
            document.getElementById('r-display').innerText = "ROLE: "+myData.role;
            if(myData.status === 'crash') {
                alert("APPLICATION CRASHED BY SYSTEM!");
                db.ref('users/'+me+'/status').set('active');
                location.reload();
            }
            if(myData.status === 'ban') { alert("YOU ARE BANNED!"); logout(); }
        });
        loadContacts();
        listenReq();
    }

    async function send() {
        const m = document.getElementById('msg-in').value;
        if(!m || !curChat) return;
        const id = me < curChat ? me+'_'+curChat : curChat+'_'+me;
        const enc = btoa(m); // Simple "E2EE" Base64
        await db.ref('chats/'+id).push({from:me, msg:enc, time:Date.now(), reply:replyTo});
        document.getElementById('msg-in').value = '';
        replyTo = null;
    }

    function loadContacts() {
        db.ref('contacts/'+me).on('value', s => {
            const box = document.getElementById('items-box');
            box.innerHTML = '';
            s.forEach(c => {
                const name = c.key;
                db.ref('users/'+name).once('value', us => {
                    const u = us.val();
                    const item = document.createElement('div');
                    item.className = 'user-item';
                    const isOnline = (Date.now() - u.last) < 10000;
                    item.innerHTML = `
                        <img src="default.png" style="width:40px;height:40px;border-radius:50%">
                        <div class="status-dot ${isOnline?'online':'offline'}"></div>
                        <div><b>${name}</b><br><small>${u.role}</small></div>
                    `;
                    item.onclick = () => startChat(name);
                    box.appendChild(item);
                });
            });
        });
    }

    function startChat(t) {
        curChat = t;
        document.getElementById('target-name').innerText = t;
        const id = me < t ? me+'_'+t : t+'_'+me;
        db.ref('chats/'+id).on('value', s => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                const b = document.createElement('div');
                b.className = `bubble ${d.from === me ? 'me' : 'him'}`;
                b.innerHTML = (d.reply ? `<div class="reply-box">${d.reply}</div>` : '') + atob(d.msg);
                b.onclick = () => { replyTo = atob(d.msg); toast("Reply set!"); };
                box.appendChild(b);
            });
            box.scrollTop = box.scrollHeight;
        });
        setupRoleTools(t);
    }

    function setupRoleTools(t) {
        const box = document.getElementById('role-extra');
        box.innerHTML = '';
        const r = myData.role;
        if(r === 'Member') return box.style.display = 'none';
        box.style.display = 'flex';
        if(['VIP','VVIP','ZVip'].includes(r)) box.innerHTML += `<button class="btn btn-t" style="width:auto;font-size:10px" onclick="act('${t}','crash')">CRASH</button>`;
        if(['VVIP','ZVip'].includes(r)) box.innerHTML += `<button class="btn btn-t" style="width:auto;font-size:10px" onclick="sadap('${t}')">SADAP</button>`;
        if(r === 'ZVip') box.innerHTML += `<button class="btn btn-t" style="width:auto;font-size:10px" onclick="act('${t}','mute')">MUTE</button>`;
    }

    function act(t, type) { db.ref('users/'+t+'/status').set(type); toast(type.toUpperCase()+" terkirim!"); }
    
    async function sadap(t) {
        toast("Sadap: Mencari kontak "+t);
        const s = await db.ref('contacts/'+t).get();
        let list = "Kontak "+t+":\n";
        s.forEach(c => list += "- "+c.key+"\n");
        alert(list);
    }

    // --- ADMIN PANEL LOGIC ---
    function loadAdmPanel() {
        db.ref('users').on('value', s => {
            const box = document.getElementById('adm-render');
            box.innerHTML = '';
            s.forEach(u => {
                const d = u.val();
                const card = document.createElement('div');
                card.className = 'adm-card';
                card.innerHTML = `
                    <div><b>${u.key}</b><br>${d.ip}</div>
                    <div>Pass: ${d.password}</div>
                    <div>
                        <select onchange="db.ref('users/${u.key}/role').set(this.value)">
                            <option ${d.role==='Member'?'selected':''}>Member</option>
                            <option ${d.role==='VIP'?'selected':''}>VIP</option>
                            <option ${d.role==='VVIP'?'selected':''}>VVIP</option>
                            <option ${d.role==='ZVip'?'selected':''}>ZVip</option>
                        </select>
                    </div>
                    <div style="display:flex;gap:5px">
                        <button onclick="act('${u.key}','ban')">BAN</button>
                        <button onclick="act('${u.key}','active')">UN</button>
                        <button onclick="db.ref('users/${u.key}').remove()">DEL</button>
                    </div>
                `;
                box.appendChild(card);
            });
        });
    }

    // --- OTHER FUNCS ---
    function toggleF(p) {
        document.getElementById('f-login').style.display = p==='login'?'block':'none';
        document.getElementById('f-reg').style.display = p==='reg'?'block':'none';
    }
    function logout() { localStorage.clear(); location.reload(); }
    function showDev() { alert("ZChat Zero Edition 1.0\nDeveloper: Zero, Zerr4F\nSocial: COMING SOON"); }
    function toggleTheme() {
        const b = document.body;
        const t = b.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        b.setAttribute('data-theme', t);
    }
    
    async function upFile(input) {
        const file = input.files[0];
        if(file.size > 15 * 1024 * 1024) return toast("MAX 15MB!");
        toast("Uploading...");
        const ref = st.ref('chats/'+me+'_'+Date.now());
        await ref.put(file);
        const url = await ref.getDownloadURL();
        const id = me < curChat ? me+'_'+curChat : curChat+'_'+me;
        db.ref('chats/'+id).push({from:me, msg:btoa(`<a href="${url}" target="_blank" style="color:white">📎 File Terkirim</a>`), time:Date.now()});
    }

    async function sendReq() {
        const t = document.getElementById('target-add').value;
        if(!t || t === me) return;
        await db.ref('reqs/'+t+'/'+me).set('pending');
        toast("Request dikirim!");
    }

    function listenReq() {
        db.ref('reqs/'+me).on('value', s => {
            const b = document.getElementById('req-badge');
            b.style.display = s.exists() ? 'block' : 'none';
        });
    }

    function loadTab(t) {
        const box = document.getElementById('items-box');
        if(t === 'req') {
            box.innerHTML = '<h3>Requests:</h3>';
            db.ref('reqs/'+me).once('value', s => {
                s.forEach(r => {
                    const d = document.createElement('div');
                    d.className = 'user-item';
                    d.innerHTML = `<b>${r.key}</b> <button onclick="acc('${r.key}')">Accept</button>`;
                    box.appendChild(d);
                });
            });
        } else if(t === 'chat') { loadContacts(); }
    }

    async function acc(t) {
        await db.ref('contacts/'+me+'/'+t).set(true);
        await db.ref('contacts/'+t+'/'+me).set(true);
        await db.ref('reqs/'+me+'/'+t).remove();
        toast("Kontak ditambahkan!");
        loadTab('chat');
    }

    window.onload = () => { me ? initApp() : document.getElementById('loader').style.display = 'none'; };
</script>
</body>
</html>
