<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat ZERO Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --blur: blur(20px); }
        body {
            background: #020205; color: white; font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh; overflow: hidden; margin: 0;
        }
        /* Nebula Animation */
        .nebula-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 20% 30%, #1e1b4b 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #4c1d95 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, #020617 0%, #000 100%);
            filter: blur(60px); opacity: 0.7; animation: drift 20s infinite alternate;
        }
        @keyframes drift { from { transform: scale(1); } to { transform: scale(1.1) rotate(2deg); } }
        
        /* UI Kapsul & Glassmorphism */
        .capsule { border-radius: 30px; }
        .glass { background: var(--glass); backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Animasi Klik Tombol */
        .btn-click { transition: transform 0.1s ease, opacity 0.2s; cursor: pointer; }
        .btn-click:active { transform: scale(0.92); }
        .btn-trans { background: rgba(255,255,255,0.05); }
        .btn-trans:hover { background: rgba(255,255,255,0.15); }

        /* Custom Alert */
        #custom-alert {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            z-index: 9999; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #custom-alert.show { top: 30px; }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; height: 100%; }
        .active-tab-btn { color: #06b6d4; border-bottom: 3px solid #06b6d4; opacity: 1 !important; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="nebula-bg"></div>

    <div id="custom-alert" class="glass capsule px-8 py-4 flex items-center gap-4 border-l-4 border-l-cyan-500 shadow-2xl">
        <i class="fas fa-atom text-cyan-400 animate-spin"></i>
        <div>
            <h4 class="font-bold text-sm" id="alert-title">Nebula Alert</h4>
            <p class="text-[11px] text-gray-300" id="alert-msg">Pesan sistem...</p>
        </div>
        <button onclick="hideAlert()" class="ml-4 opacity-50 hover:opacity-100"><i class="fas fa-times"></i></button>
    </div>

    <div id="login-screen" class="h-screen flex items-center justify-center p-6">
        <div class="glass capsule p-10 w-full max-w-md text-center border-white/20">
            <h1 class="text-4xl font-black tracking-tighter mb-1">ZChat <span class="text-cyan-500 text-shadow-glow">ZERO</span></h1>
            <p class="text-[10px] tracking-[5px] text-gray-500 mb-8 uppercase">Versi 2.1.0 Alpha</p>
            
            <div class="space-y-4">
                <input type="text" id="login-usn" placeholder="USERNAME" class="w-full p-4 capsule bg-black/40 border border-white/10 outline-none focus:border-cyan-500 transition text-center uppercase font-bold text-sm tracking-widest">
                <input type="password" id="login-pw" placeholder="PASSWORD" class="w-full p-4 capsule bg-black/40 border border-white/10 outline-none focus:border-cyan-500 transition text-center">
                
                <div class="flex items-center justify-center gap-2 text-xs text-gray-400">
                    <input type="checkbox" id="keep-login" class="accent-cyan-500">
                    <label for="keep-login" class="cursor-pointer">KEEP LOGIN (Save Session)</label>
                </div>

                <button onclick="handleLogin()" class="btn-click w-full p-4 bg-cyan-600 hover:bg-cyan-500 capsule font-black tracking-widest shadow-lg shadow-cyan-500/20">INITIALIZE ACCESS</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="h-screen flex hidden p-4 gap-4 transition-all duration-500">
        <div class="w-full md:w-[400px] flex flex-col gap-4" id="sidebar">
            <div class="glass capsule p-4 flex items-center justify-between border-white/20">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-cyan-600 to-purple-600 shadow-[0_0_15px_rgba(6,182,212,0.3)] border border-white/20"></div>
                    <div>
                        <h2 id="my-name" class="font-bold text-sm">@USER</h2>
                        <span class="text-[8px] text-cyan-400 font-bold uppercase tracking-tighter animate-pulse">Connection: Stable</span>
                    </div>
                </div>
                <button onclick="showAddModal()" class="btn-click btn-trans w-11 h-11 rounded-full flex items-center justify-center text-cyan-400">
                    <i class="fas fa-plus-circle text-xl"></i>
                </button>
            </div>

            <div class="glass capsule flex-1 flex flex-col overflow-hidden border-white/10">
                <div class="flex justify-around p-3 text-[10px] font-black border-b border-white/5 bg-white/5">
                    <button onclick="switchTab('chats', this)" class="tab-btn active-tab-btn py-2 px-3">CHATS</button>
                    <button onclick="switchTab('groups', this)" class="tab-btn py-2 px-3 opacity-50">GROUPS</button>
                    <button onclick="switchTab('status', this)" class="tab-btn py-2 px-3 opacity-50">STATUS</button>
                    <button onclick="switchTab('channels', this)" class="tab-btn py-2 px-3 opacity-50">CHANNELS</button>
                </div>

                <div id="req-box" class="p-4 bg-cyan-500/10 hidden border-b border-cyan-500/20">
                    <p class="text-[9px] font-bold text-cyan-400 mb-2 tracking-widest">PERMINTAAN MASUK:</p>
                    <div id="req-list" class="space-y-2"></div>
                </div>

                <div id="chats" class="tab-content active p-2 overflow-y-auto space-y-1">
                    </div>
                <div id="groups" class="tab-content p-10 text-center flex flex-col items-center justify-center h-full opacity-20">
                    <i class="fas fa-users text-4xl mb-3"></i>
                    <p class="text-[10px] uppercase font-bold tracking-widest">No Active Groups</p>
                </div>
                <div id="status" class="tab-content p-10 text-center flex flex-col items-center justify-center h-full opacity-20">
                    <i class="fas fa-circle-notch text-4xl mb-3"></i>
                    <p class="text-[10px] uppercase font-bold tracking-widest">No Status Updates</p>
                </div>
                <div id="channels" class="tab-content p-10 text-center flex flex-col items-center justify-center h-full opacity-20">
                    <i class="fas fa-broadcast-tower text-4xl mb-3"></i>
                    <p class="text-[10px] uppercase font-bold tracking-widest">Channels Unavailable</p>
                </div>
            </div>
        </div>

        <div class="hidden md:flex flex-1 glass capsule flex flex-col overflow-hidden relative border-white/10" id="chat-container">
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-700 bg-black/10">
                <i class="fas fa-satellite text-7xl mb-6 opacity-5 animate-pulse"></i>
                <p class="tracking-[10px] text-[10px] font-black opacity-20 uppercase">ZChat Secure Terminal</p>
            </div>

            <div id="chat-active" class="hidden flex flex-col h-full z-10">
                <div class="p-4 border-b border-white/10 flex items-center justify-between glass">
                    <div class="flex items-center gap-4">
                        <button onclick="backToSidebar()" class="md:hidden btn-click text-gray-400 mr-2"><i class="fas fa-arrow-left"></i></button>
                        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-gray-800 to-black border border-white/20 flex items-center justify-center">
                            <i class="fas fa-user text-white/20"></i>
                        </div>
                        <div>
                            <span id="chat-with" class="font-bold text-lg block leading-tight">Username</span>
                            <span class="text-[9px] text-cyan-400 font-bold tracking-widest">PROTOCOL ENCRYPTED</span>
                        </div>
                    </div>
                    <div class="flex gap-4 text-gray-500 mr-2">
                        <button class="btn-click hover:text-cyan-400"><i class="fas fa-phone"></i></button>
                        <button class="btn-click hover:text-cyan-400"><i class="fas fa-video"></i></button>
                    </div>
                </div>
                
                <div id="msg-flow" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4 scroll-smooth"></div>

                <div class="p-4 glass flex gap-3 items-center border-t border-white/5">
                    <button class="btn-click w-11 h-11 btn-trans rounded-full flex items-center justify-center text-gray-500"><i class="fas fa-paperclip"></i></button>
                    <input type="text" id="msg-input" placeholder="Type a message..." class="flex-1 bg-black/30 p-4 capsule outline-none border border-white/5 focus:border-cyan-500/50 transition-all text-sm">
                    <button onclick="send()" class="btn-click w-12 h-12 bg-cyan-600 rounded-full flex items-center justify-center shadow-lg shadow-cyan-500/30">
                        <i class="fas fa-paper-plane text-sm"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-add" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-6 z-[1000]">
        <div class="glass capsule p-8 w-full max-w-sm text-center border-white/20">
            <i class="fas fa-user-plus text-4xl text-cyan-500 mb-4"></i>
            <h3 class="text-xl font-black mb-6 uppercase tracking-widest">New Connection</h3>
            <input type="text" id="target-usn" placeholder="@target_username" class="w-full p-4 capsule bg-white/5 border border-white/10 outline-none text-center mb-6 uppercase text-sm font-bold">
            <div class="flex gap-3">
                <button onclick="closeAddModal()" class="flex-1 p-4 btn-trans capsule text-xs font-bold">CANCEL</button>
                <button onclick="addUser()" class="btn-click flex-1 p-4 bg-cyan-600 capsule text-xs font-bold">CONNECT</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            authDomain: "zchat-56639.firebaseapp.com",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639",
            storageBucket: "zchat-56639.firebasestorage.app",
            messagingSenderId: "773931983053",
            appId: "1:773931983053:web:a1c825be9a972e53dcc984",
            measurementId: "G-ZDMK1DWV6S"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myUsn = "";
        let currentChat = "";

        // --- AUTH & LOGIN LOGIC ---
        const savedSession = localStorage.getItem('zchat_zero_usn');
        if(savedSession) {
            myUsn = savedSession;
            launchApp();
        }

        function handleLogin() {
            const u = document.getElementById('login-usn').value.trim();
            const p = document.getElementById('login-pw').value;
            if(!u || !p) return showAlert("ACCESS DENIED", "Please provide credentials.");
            
            myUsn = u;
            if(document.getElementById('keep-login').checked) localStorage.setItem('zchat_zero_usn', u);
            
            // Register ke folder 'users' biar sinkron sama temen lo
            db.ref('users/' + u).set({ username: u, online: true, lastSeen: Date.now() });
            launchApp();
        }

        function launchApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('my-name').innerText = "@" + myUsn.toUpperCase();
            loadRequests();
            loadContacts();
        }

        // --- TAB NAVIGATION ---
        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab-btn'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active-tab-btn');
        }

        // --- SINKRONISASI KONTAK & REQUEST ---
        function showAddModal() { document.getElementById('modal-add').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('modal-add').classList.add('hidden'); }

        function addUser() {
            const target = document.getElementById('target-usn').value.trim();
            if(!target || target === myUsn) return;

            db.ref('users/' + target).once('value', snap => {
                if(snap.exists()) {
                    db.ref(`requests/${target}/${myUsn}`).set({ from: myUsn, time: Date.now() });
                    showAlert("LINK SENT", "Connection request sent to " + target);
                    closeAddModal();
                } else {
                    showAlert("USER NOT FOUND!", "Username '" + target + "' is not registered.");
                }
            });
        }

        function loadRequests() {
            db.ref(`requests/${myUsn}`).on('value', snap => {
                const box = document.getElementById('req-box');
                const list = document.getElementById('req-list');
                list.innerHTML = "";
                if(snap.exists()) {
                    box.classList.remove('hidden');
                    snap.forEach(c => {
                        const from = c.key;
                        const div = document.createElement('div');
                        div.className = "flex items-center justify-between glass p-2 px-4 capsule border-white/20";
                        div.innerHTML = `
                            <span class="text-xs font-bold text-white tracking-widest uppercase">${from}</span>
                            <div class="flex gap-2">
                                <button onclick="confirmChat('${from}', true)" class="w-8 h-8 bg-cyan-600 rounded-full text-[10px] btn-click"><i class="fas fa-check"></i></button>
                                <button onclick="confirmChat('${from}', false)" class="w-8 h-8 bg-red-600 rounded-full text-[10px] btn-click"><i class="fas fa-times"></i></button>
                            </div>`;
                        list.appendChild(div);
                    });
                } else box.classList.add('hidden');
            });
        }

        function confirmChat(user, accept) {
            if(accept) {
                db.ref(`contacts/${myUsn}/${user}`).set(true);
                db.ref(`contacts/${user}/${myUsn}`).set(true);
            }
            db.ref(`requests/${myUsn}/${user}`).remove();
        }

        function loadContacts() {
            db.ref(`contacts/${myUsn}`).on('value', snap => {
                const container = document.getElementById('chats');
                container.innerHTML = "";
                if(!snap.exists()) {
                    container.innerHTML = `<div class="p-10 text-center opacity-10 text-xs">NO CONNECTIONS YET</div>`;
                    return;
                }
                snap.forEach(c => {
                    const name = c.key;
                    const item = document.createElement('div');
                    item.className = "btn-click glass capsule p-4 flex items-center gap-4 btn-trans cursor-pointer border-white/5 relative z-20";
                    item.innerHTML = `
                        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-600 to-blue-800 flex items-center justify-center font-black text-sm uppercase">${name[0]}</div>
                        <div class="flex-1 overflow-hidden">
                            <h4 class="font-bold text-sm truncate uppercase tracking-tighter">${name}</h4>
                            <p class="text-[9px] text-cyan-400 opacity-60 truncate font-bold uppercase tracking-tighter">Secure Terminal Active</p>
                        </div>
                    `;
                    item.onclick = () => openChat(name);
                    container.appendChild(item);
                });
            });
        }

        // --- CHAT LOGIC ---
        function openChat(target) {
            currentChat = target;
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('hidden');
                document.getElementById('chat-container').classList.remove('hidden');
                document.getElementById('chat-container').classList.add('flex');
            }
            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('chat-active').classList.remove('hidden');
            document.getElementById('chat-with').innerText = target.toUpperCase();
            
            const chatID = [myUsn, target].sort().join("_");
            db.ref(`chats/${chatID}`).off();
            db.ref(`chats/${chatID}`).on('value', snap => {
                const flow = document.getElementById('msg-flow');
                flow.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    const isMe = m.sender === myUsn;
                    flow.innerHTML += `
                        <div class="max-w-[80%] p-3 px-5 capsule text-sm ${isMe ? 'self-end bg-cyan-600 shadow-lg' : 'self-start glass border-white/10 text-white/90'}">
                            ${m.text}
                            <span class="text-[8px] opacity-40 block text-right mt-1 font-bold">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>`;
                });
                flow.scrollTop = flow.scrollHeight;
            });
        }

        function send() {
            const input = document.getElementById('msg-input');
            if(!input.value || !currentChat) return;
            const chatID = [myUsn, currentChat].sort().join("_");
            db.ref(`chats/${chatID}`).push({ sender: myUsn, text: input.value, time: Date.now() });
            input.value = "";
        }

        // --- UI HELPERS ---
        function backToSidebar() {
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('chat-container').classList.add('hidden');
        }

        function showAlert(title, msg) {
            const a = document.getElementById('custom-alert');
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            a.classList.add('show');
            setTimeout(hideAlert, 4000);
        }
        function hideAlert() { document.getElementById('custom-alert').classList.remove('show'); }
    </script>
</body>
</html>
