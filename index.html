<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat Zero Edition</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>
    <style>
        :root { --p: #a855f7; --g: #bf00ff; --glass: rgba(255, 255, 255, 0.1); }
        * { font-family: 'SF Pro Display', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; overflow: hidden; height: 100vh; }
        
        /* LOADING */
        #z-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spin { width: 40px; height: 40px; border: 4px solid var(--p); border-top-color: transparent; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }

        /* BG EFFECT */
        .grid { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(var(--p) 1px, transparent 1px), linear-gradient(90deg, var(--p) 1px, transparent 1px); background-size: 45px 45px; opacity: 0.15; animation: gm 10s linear infinite; }
        @keyframes gm { from { transform: translateY(0); } to { transform: translateY(45px); } }
        .bh-v { position: fixed; inset: 0; z-index: -2; display: none; align-items: center; justify-content: center; }
        .bh { width: 280px; height: 280px; background: #000; border-radius: 50%; box-shadow: 0 0 80px 20px var(--g), inset 0 0 60px #000; animation: bp 4s infinite alternate; }
        @keyframes bp { from { transform: scale(1); } to { transform: scale(1.1); box-shadow: 0 0 120px 40px var(--g); } }

        /* CAPSULE UI */
        .cap { background: var(--glass); backdrop-filter: blur(20px); border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); padding: 25px; }
        .in { width: 100%; border-radius: 50px; padding: 12px 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: #fff; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; border-radius: 50px; padding: 12px; border: none; background: var(--p); color: #fff; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px var(--p); margin-bottom: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-t { background: rgba(255,255,255,0.05); box-shadow: none; border: 1px solid rgba(255,255,255,0.1); }

        /* ADMIN INTRO */
        #adm-gate { position: fixed; inset: 0; z-index: 9000; display: none; background: #000; }
        .gate-c { position: absolute; inset: 0; background: #000; clip-path: circle(0% at 50% 50%); transition: 1.5s; }
        #adm-gate.active .gate-c { clip-path: circle(150% at 50% 50%); }

        /* APP LAYOUT */
        #z-app { display: none; height: 100vh; flex-direction: column; padding: 15px; }
        .z-body { flex: 1; display: grid; grid-template-columns: 320px 1fr; gap: 15px; overflow: hidden; }
        .chat-w { display: flex; flex-direction: column; overflow: hidden; }
        .m-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 18px; border-radius: 25px; max-width: 80%; font-size: 15px; line-height: 1.4; }
        .bubble.me { align-self: flex-end; background: var(--p); }
        .bubble.him { align-self: flex-start; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div id="z-loader"><div class="spin"></div><p style="margin-top:15px">ZChat Zero Edition</p></div>

<div id="adm-gate">
    <video id="v-intro" style="width:100%;height:100%;object-fit:cover" src="introadm.mp4"></video>
    <div class="gate-c"></div>
</div>

<div class="grid" id="bg-g"></div>
<div class="bh-v" id="bg-b"><div class="bh"></div></div>

<div id="z-auth" style="display:flex; height:100vh; align-items:center; justify-content:center">
    <div class="cap" style="width:360px; text-align:center">
        <h1 style="margin-bottom:10px">ZChat Zero</h1>
        <div id="z-clock" style="margin-bottom:20px">
            <div id="z-time" style="font-size:30px; font-weight:bold">00:00:00</div>
            <div id="z-date" style="font-size:12px; opacity:0.6">Day, Date</div>
        </div>

        <div id="l-box">
            <input type="text" id="lu" class="in" placeholder="Username">
            <input type="password" id="lp" class="in" placeholder="Password">
            <button class="btn" onclick="auth('login')">MASUK</button>
            <p style="font-size:12px">Belum punya akun? <span style="color:var(--p);cursor:pointer" onclick="sw('r')">Ayo daftar</span></p>
            <p style="font-size:12px; margin:8px 0"><span style="cursor:pointer" onclick="window.location.href='https://t.me/ZMTzermodzteam'">Beli role? Klik disini</span></p>
            <button class="btn btn-t" onclick="roleList()">LIHAT LIST ROLE</button>
        </div>

        <div id="r-box" style="display:none">
            <input type="text" id="ru" class="in" placeholder="Buat Username">
            <input type="password" id="rp" class="in" placeholder="Buat Password">
            <button class="btn" onclick="auth('reg')">DAFTAR</button>
            <p style="font-size:12px; cursor:pointer" onclick="sw('l')">Kembali Login</p>
        </div>
    </div>
</div>

<div id="z-app">
    <div class="cap" style="padding:10px 20px; display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
        <div style="display:flex; align-items:center; gap:15px">
            <img id="m-pfp" src="default.png" style="width:45px;height:45px;border-radius:50%;cursor:pointer" onclick="upPfp()">
            <div style="text-align:left">
                <div id="m-usn" style="font-weight:bold; font-size:14px">USERNAME: -</div>
                <div id="m-role" style="font-size:11px; color:var(--p)">ROLE: Member</div>
            </div>
        </div>
        <div style="display:flex; gap:8px">
            <button class="btn" style="width:auto; padding:8px 15px; margin:0" onclick="goAdm()">ADMIN</button>
            <button class="btn btn-t" style="width:auto; padding:8px 15px; margin:0" onclick="goDev()">DEV</button>
        </div>
    </div>

    <div class="z-body">
        <div class="cap chat-w" style="padding:15px">
            <div style="display:flex; gap:5px; margin-bottom:15px">
                <button class="btn" style="font-size:11px" onclick="t('c')">CHATS</button>
                <button class="btn btn-t" style="font-size:11px" onclick="t('q')">REQ <span id="qc">0</span></button>
            </div>
            <div id="c-list" class="m-area">
                <input type="text" id="f-add" class="in" placeholder="Username Teman...">
                <button class="btn" onclick="addF()">Add Kontak</button>
                <hr style="opacity:0.1; margin:10px 0">
                <div id="fix-l"></div>
            </div>
            <div id="q-list" class="m-area" style="display:none"></div>
        </div>

        <div class="cap chat-w" style="padding:15px">
            <div id="c-target" style="border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px; font-weight:bold">Pilih Chat</div>
            <div class="m-area" id="m-render"></div>
            <div id="r-tools" style="display:none; gap:10px; padding:10px 0"></div>
            <div style="display:flex; gap:10px" id="i-box">
                <button class="btn btn-t" style="width:50px;margin:0" onclick="upF()">📎</button>
                <input type="text" id="m-in" class="in" style="margin:0" placeholder="Ketik pesan...">
                <button class="btn" style="width:70px;margin:0" onclick="send()">Kirim</button>
            </div>
        </div>
    </div>
</div>

<script>
const config = {
  apiKey: "AIzaSyDZMFlfu8ObuuEpicbbkUyKWn_gUFnY_SQ",
  authDomain: "project-aaa14b70-7347-4232-8a0.firebaseapp.com",
  databaseURL: "https://project-aaa14b70-7347-4232-8a0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "project-aaa14b70-7347-4232-8a0",
  storageBucket: "project-aaa14b70-7347-4232-8a0.firebasestorage.app",
  messagingSenderId: "283427772761",
  appId: "1:283427772761:web:52a4bfd1cbb39589ac9448"
};
firebase.initializeApp(config);
const db = firebase.database();
let me = localStorage.getItem('z_s') || null;
let myR = "Member";

// CLOCK
setInterval(() => {
    const d = new Date();
    document.getElementById('z-time').innerText = d.toLocaleTimeString('id-ID');
    document.getElementById('z-date').innerText = d.toLocaleDateString('id-ID',{weekday:'long', day:'numeric', month:'long', year:'numeric'});
}, 1000);

// AUTH
async function auth(t) {
    const u = t==='login'?document.getElementById('lu').value:document.getElementById('ru').value;
    const p = t==='login'?document.getElementById('lp').value:document.getElementById('rp').value;
    if(t==='reg') {
        const s = await db.ref('users/'+u).get();
        if(s.exists()) return alert("USERNAME TELAH DIGUNAKAN!");
        const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json());
        await db.ref('users/'+u).set({password:p, role:'Member', status:'active', ip:ip.ip});
        alert("Daftar Berhasil!"); sw('l'); document.getElementById('lu').value = u;
    } else {
        const s = await db.ref('users/'+u).get();
        if(s.exists() && s.val().password === p) {
            if(s.val().status === 'ban') return alert("NOTIF: LU KENA BAN PERMANEN!");
            localStorage.setItem('z_s', u); me = u; start(s.val());
        } else alert("Salah!");
    }
}

function start(d) {
    document.getElementById('z-auth').style.display = 'none';
    document.getElementById('z-app').style.display = 'flex';
    document.getElementById('bg-g').style.display = 'none';
    document.getElementById('bg-b').style.display = 'flex';
    document.getElementById('m-usn').innerText = "USERNAME: "+me;
    document.getElementById('m-role').innerText = "ROLE: "+d.role;
    myR = d.role;
    
    db.ref('users/'+me).on('value', s => {
        const v = s.val();
        if(v.status==='crash') { alert("NOTIF: LU KENA CRASH ADMIN!"); db.ref('users/'+me+'/status').set('active'); localStorage.clear(); location.reload(); }
        if(v.status==='ban') { alert("NOTIF: LU KENA BAN!"); location.reload(); }
        if(v.status==='bl') alert("NOTIF: LU KENA BLACKLIST!");
        if(v.status==='mute') { document.getElementById('i-box').style.opacity='0.3'; document.getElementById('m-in').disabled=true; }
    });
    loadRoleMenu();
}

function loadRoleMenu() {
    const tools = document.getElementById('r-tools');
    tools.innerHTML = '';
    if(myR === "VIP" || myR === "VVIP" || myR === "ZVIP") {
        tools.innerHTML += '<button class="btn" style="width:auto;font-size:10px" onclick="doC()">CRASH</button>';
        tools.style.display = 'flex';
    }
    if(myR === "VVIP" || myR === "ZVIP") tools.innerHTML += '<button class="btn" style="width:auto;font-size:10px" onclick="doS()">SADAP</button>';
    if(myR === "ZVIP") tools.innerHTML += '<button class="btn" style="width:auto;font-size:10px" onclick="doM()">MUTE</button>';
}

function goAdm() {
    const k = prompt("Key:");
    if(k==='zmtrrr') {
        const g = document.getElementById('adm-gate');
        g.style.display = 'block';
        document.getElementById('v-intro').play();
        setTimeout(() => {
            g.classList.add('active');
            setTimeout(() => { alert("Welcome Admin. Check Firebase for IP/Pass."); g.style.display='none'; }, 2000);
        }, 3500);
    }
}

function roleList() {
    alert("VIP 120K: Crash\nVVIP 170K: Crash, Sadap\nZVIP 200K: Crash, Sadap, Mute");
}

function goDev() {
    alert("ZChat Zero Edition\nVersion: 1.0\nDeveloper: Zero & Zerr4F\nSocial: COMING SOON");
}

function sw(p) {
    document.getElementById('l-box').style.display = p==='l'?'block':'none';
    document.getElementById('r-box').style.display = p==='r'?'block':'none';
}

window.onload = () => {
    setTimeout(() => document.getElementById('z-loader').style.display='none', 2000);
    if(me) db.ref('users/'+me).once('value', s => start(s.val()));
};
</script>
</body>
</html>
