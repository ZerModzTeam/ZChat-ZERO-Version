<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZCHAT ZERO - VOID EDITION</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>

    <style>
        /* CSS RESET & THEME VOID */
        :root {
            --p: #a855f7; --g: #6b21ff; --bg: #000000; --text: #ffffff;
            --glass: rgba(20, 20, 20, 0.8); --border: rgba(255, 255, 255, 0.08);
            --neon: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }

        body {
            background: var(--bg); color: var(--text);
            height: 100vh; width: 100vw; overflow: hidden;
            user-select: none;
        }

        /* LOADING ANIMATION (NO GOOGLE) */
        #z-loader {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .void-spin {
            width: 60px; height: 60px; border: 2px solid transparent;
            border-top: 2px solid var(--p); border-radius: 50%;
            animation: void-rotate 0.8s linear infinite;
        }
        @keyframes void-rotate { to { transform: rotate(360deg); } }

        /* STARFIELD ENGINE */
        canvas#void-stars { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

        /* COMPONENTS */
        .cap { background: var(--glass); backdrop-filter: blur(25px); border: 1.2px solid var(--border); border-radius: 24px; }
        .in { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            padding: 16px 20px; border-radius: 14px; color: #fff; font-size: 16px; transition: 0.3s;
        }
        .in:focus { border-color: var(--p); box-shadow: var(--neon); }
        .btn {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: linear-gradient(135deg, var(--p), var(--g));
            color: #fff; font-weight: 800; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.2s;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); }

        /* UI LAYOUT */
        .page { display: none; height: 100vh; width: 100%; position: relative; animation: slideUp 0.4s cubic-bezier(0,0,0.2,1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .app-container {
            display: grid; grid-template-columns: 340px 1fr; gap: 20px;
            height: calc(100vh - 40px); margin: 20px;
        }

        /* SIDEBAR */
        .sidebar { display: flex; flex-direction: column; padding: 25px; overflow: hidden; }
        .list-area { flex: 1; overflow-y: auto; margin-top: 20px; scrollbar-width: none; }
        .item-card {
            padding: 15px; border-radius: 18px; margin-bottom: 10px;
            cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .item-card:hover { background: rgba(255,255,255,0.05); border-color: var(--border); }
        .active-item { background: rgba(168, 85, 247, 0.15) !important; border-color: var(--p) !important; }

        /* CHAT INTERFACE */
        .chat-view { display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .chat-header {
            padding: 20px 30px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .msg-scroll { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 14px; }
        
        .msg-b { 
            max-width: 70%; padding: 14px 18px; border-radius: 20px; font-size: 15px;
            line-height: 1.5; word-wrap: break-word; position: relative;
        }
        .me { align-self: flex-end; background: var(--p); color: #fff; border-bottom-right-radius: 4px; box-shadow: var(--neon); }
        .him { align-self: flex-start; background: rgba(255,255,255,0.07); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        /* ADMIN PANEL GOD MODE */
        #p-admin { background: #000; padding: 50px; overflow-y: auto; z-index: 10000; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .user-box { background: #111; padding: 20px; border-radius: 20px; border: 1px solid var(--border); }
        
        /* TOAST */
        #z-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 12px 30px; border-radius: 50px;
            font-weight: 900; z-index: 1000000; transition: 0.5s; box-shadow: 0 10px 30px rgba(168,85,247,0.4);
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .offline { background: #ff4444; }
    </style>
</head>
<body>

<canvas id="void-stars"></canvas>
<div id="z-toast">SYSTEM MESSAGE</div>
<div id="z-loader"><div class="void-spin"></div><h1 style="margin-top:20px; letter-spacing:10px">VOID</h1></div>

<div id="p-auth" class="page" style="display:flex; align-items:center; justify-content:center">
    <div class="cap" style="width:380px; padding:40px; text-align:center">
        <h1 style="letter-spacing:15px; font-size:32px; margin-bottom:10px">ZERO</h1>
        <p id="t-time" style="font-size:45px; font-weight:900; color:var(--p); margin-bottom:30px">00:00</p>
        
        <div id="box-l">
            <input type="text" id="l-u" class="in" placeholder="Username">
            <input type="password" id="l-p" class="in" placeholder="Password">
            <button class="btn" onclick="hAuth('login')">INITIALIZE ACCESS</button>
            <p style="margin-top:20px; font-size:13px; opacity:0.5" onclick="sw(1)">Request Entry Account? <span style="color:var(--p)">Register</span></p>
        </div>
        
        <div id="box-r" style="display:none">
            <input type="text" id="r-u" class="in" placeholder="New Username">
            <input type="password" id="r-p" class="in" placeholder="New Password">
            <button class="btn" onclick="hAuth('reg')">CREATE ENTITY</button>
            <p style="margin-top:20px; font-size:13px; opacity:0.5" onclick="sw(0)">Already have access? <span style="color:var(--p)">Login</span></p>
        </div>
        <div style="margin-top:40px; opacity:0.1; cursor:pointer" onclick="goGod()">GOD_MODE_PROMPT</div>
    </div>
</div>

<div id="p-app" class="page">
    <div class="app-container">
        <aside class="sidebar cap">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h2 style="letter-spacing:3px">ZCHAT</h2>
                <div style="width:12px; height:12px; background:#00ff88; border-radius:50%"></div>
            </div>
            
            <div style="display:flex; gap:8px; margin-bottom:20px">
                <button class="btn btn-ghost" style="padding:10px; flex:1; font-size:12px" onclick="setT('chat')">CHATS</button>
                <button class="btn btn-ghost" style="padding:10px; flex:1; font-size:12px" onclick="setT('grp')">GROUPS</button>
            </div>

            <div id="side-search">
                <input type="text" id="search-u" class="in" style="padding:12px" placeholder="Search Identity...">
                <button class="btn" style="margin-top:10px; padding:10px; font-size:12px" onclick="addF()">ADD TO VOID</button>
            </div>

            <div id="list-render" class="list-area"></div>
            
            <button class="btn btn-ghost" style="margin-top:20px" onclick="logout()">DISCONNECT</button>
        </aside>

        <main class="chat-view cap">
            <div class="chat-header">
                <div>
                    <h3 id="c-target">VOID_TERMINAL</h3>
                    <small id="c-status" style="opacity:0.4">Status: Offline</small>
                </div>
                <div id="adm-tools"></div>
            </div>

            <div id="m-scroll" class="msg-scroll">
                <div style="text-align:center; margin-top:150px; opacity:0.1">
                    <h1 style="font-size:80px">0</h1>
                    <p>END-TO-END ENCRYPTED SYSTEM</p>
                </div>
            </div>

            <div style="padding:25px; display:flex; gap:15px; background:rgba(0,0,0,0.2)">
                <input type="file" id="f-file" style="display:none" onchange="hMedia(this)">
                <button class="btn btn-ghost" style="width:60px" onclick="document.getElementById('f-file').click()">+</button>
                <input type="text" id="m-in" class="in" style="margin:0" placeholder="Write to the void...">
                <button class="btn" style="width:100px" onclick="send()">SEND</button>
            </div>
        </main>
    </div>
</div>

<div id="p-god" class="page" style="flex-direction:column">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px; padding:40px">
        <h1>GOD_MODE_CONSOLE</h1>
        <button class="btn btn-ghost" style="width:auto; padding:10px 30px" onclick="location.reload()">EXIT_VOID</button>
    </div>
    <div class="admin-grid" id="god-user-list" style="padding:0 40px"></div>
</div>

<script>
// --- LOGIC START (800+ LINE INTENT) ---
const firebaseConfig = {
    apiKey: "AIzaSyDZMFlfu8ObuuEpicbbkUyKWn_gUFnY_SQ",
    authDomain: "project-aaa14b70-7347-4232-8a0.firebaseapp.com",
    databaseURL: "https://project-aaa14b70-7347-4232-8a0-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "project-aaa14b70-7347-4232-8a0",
    storageBucket: "project-aaa14b70-7347-4232-8a0.firebasestorage.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const st = firebase.storage();

let me = localStorage.getItem('z_usn');
let myD = null;
let activeC = null;
let curT = 'chat';

// UI ENGINE
const canvas = document.getElementById('void-stars');
const ctx = canvas.getContext('2d');
let stars = [];
function initS() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    stars = []; for(let i=0; i<150; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, v:Math.random()*0.5});
}
function drawS() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#fff";
    stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y += s.v; if(s.y > canvas.height) s.y = 0; });
    requestAnimationFrame(drawS);
}
window.onresize = initS; initS(); drawS();

// UTILS
function toast(m) { const t = document.getElementById('z-toast'); t.innerText = m; t.style.top = '40px'; setTimeout(() => t.style.top = '-100px', 2500); }
function sw(r) { document.getElementById('box-l').style.display=r?'none':'block'; document.getElementById('box-r').style.display=r?'block':'none'; }
function logout() { localStorage.clear(); location.reload(); }

// BOOTSTRAP
setInterval(() => {
    document.getElementById('t-time').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if(me) db.ref('users/'+me+'/lastOnline').set(Date.now());
}, 1000);

window.onload = () => {
    setTimeout(() => {
        document.getElementById('z-loader').style.display = 'none';
        if(me) {
            db.ref('users/'+me).on('value', s => {
                if(!s.exists()) return logout();
                myD = s.val(); if(myD.status === 'ban') logout();
                document.getElementById('p-app').style.display = 'block';
                setT('chat'); listenGodActions();
            });
        } else { document.getElementById('p-auth').style.display = 'flex'; }
    }, 2000);
};

// AUTH
async function hAuth(t) {
    const u = document.getElementById(t==='login'?'l-u':'r-u').value.trim().toLowerCase();
    const p = document.getElementById(t==='login'?'l-p':'r-p').value.trim();
    if(!u || !p) return toast("MISSING_DATA");
    const s = await db.ref('users/'+u).get();
    if(t === 'reg') {
        if(s.exists()) return toast("ENTITY_EXISTS");
        await db.ref('users/'+u).set({password: p, role: 'Member', status: 'active', lastOnline: Date.now()});
        toast("SUCCESS_REGISTER"); sw(0);
    } else {
        if(s.exists() && s.val().password === p) { localStorage.setItem('z_usn', u); location.reload(); }
        else toast("INVALID_ACCESS");
    }
}

// APP ENGINE
function setT(t) {
    curT = t; const b = document.getElementById('list-render'); b.innerHTML = '';
    if(t==='chat') loadF(); else loadG();
}

function loadF() {
    db.ref('contacts/'+me).on('value', s => {
        const b = document.getElementById('list-render'); b.innerHTML = '';
        if(!s.exists()) b.innerHTML = '<p style="text-align:center;opacity:0.2">Empty Void</p>';
        s.forEach(c => {
            db.ref('users/'+c.key).once('value', us => {
                const ud = us.val(); const isOn = (Date.now() - ud.lastOnline) < 15000;
                const div = document.createElement('div'); div.className = 'item-card';
                div.innerHTML = `<span class="status-dot ${isOn?'online':'offline'}"></span><b>${c.key.toUpperCase()}</b><br><small style="opacity:0.4;margin-left:16px">${ud.role}</small>`;
                div.onclick = () => openC(c.key, 'private'); b.appendChild(div);
            });
        });
    });
}

function openC(id, type) {
    activeC = {id, type};
    document.getElementById('c-target').innerText = id.toUpperCase();
    document.querySelectorAll('.item-card').forEach(i => i.classList.remove('active-item'));
    
    const cid = type === 'private' ? (me < id ? me+'_'+id : id+'_'+me) : 'grp_'+id;
    db.ref('chats/'+cid).off();
    db.ref('chats/'+cid).on('value', s => {
        const b = document.getElementById('m-scroll'); b.innerHTML = '';
        s.forEach(m => {
            const d = m.val(); const bl = document.createElement('div');
            bl.className = `msg-b ${d.f === me ? 'me' : 'him'}`;
            try { bl.innerHTML = (type==='grp'?`<small style="font-weight:900;color:var(--p)">${d.f}</small><br>`:'') + atob(d.m); } catch(e) { bl.innerText = "DECRYPT_ERROR"; }
            b.appendChild(bl);
        });
        b.scrollTop = b.scrollHeight;
    });
}

async function send() {
    const val = document.getElementById('m-in').value.trim(); if(!val || !activeC) return;
    const cid = activeC.type === 'private' ? (me < activeC.id ? me+'_'+activeC.id : activeC.id+'_'+me) : 'grp_'+activeC.id;
    await db.ref('chats/'+cid).push({f: me, m: btoa(val), t: Date.now()});
    document.getElementById('m-in').value = '';
}

async function hMedia(input) {
    const file = input.files[0]; if(!file || file.size > 15*1024*1024) return toast("MAX_15MB");
    toast("TRANSMITTING_DATA...");
    const ref = st.ref(`void/${Date.now()}_${file.name}`);
    await ref.put(file); const url = await ref.getDownloadURL();
    const msg = btoa(`<a href="${url}" target="_blank" style="color:#fff;text-decoration:underline">ATTACHMENT: ${file.name}</a>`);
    const cid = activeC.type === 'private' ? (me < activeC.id ? me+'_'+activeC.id : activeC.id+'_'+me) : 'grp_'+activeC.id;
    await db.ref('chats/'+cid).push({f: me, m: msg, t: Date.now()});
}

async function addF() {
    const t = document.getElementById('search-u').value.trim().toLowerCase();
    if(!t || t === me) return;
    const s = await db.ref('users/'+t).get();
    if(!s.exists()) return toast("NOT_FOUND");
    await db.ref('contacts/'+me+'/'+t).set(true);
    await db.ref('contacts/'+t+'/'+me).set(true);
    toast("LINK_ESTABLISHED");
}

// GOD MODE LOGIC
function goGod() {
    const k = prompt("ENTER_VOID_KEY:");
    if(k === 'zmtrrr') {
        document.getElementById('p-auth').style.display = 'none';
        document.getElementById('p-app').style.display = 'none';
        document.getElementById('p-god').style.display = 'flex';
        renderGod();
    }
}

function renderGod() {
    db.ref('users').on('value', s => {
        const b = document.getElementById('god-user-list'); b.innerHTML = '';
        s.forEach(u => {
            const d = u.val(); const card = document.createElement('div'); card.className = 'user-box';
            card.innerHTML = `<h3>${u.key}</h3><p>Key: ${d.password}</p><p>Role: ${d.role}</p>
            <div style="display:flex;gap:10px;margin-top:15px">
                <button class="btn" style="padding:8px" onclick="db.ref('users/${u.key}/status').set('freeze')">FREEZE</button>
                <button class="btn btn-ghost" style="padding:8px;color:red" onclick="db.ref('users/${u.key}').remove()">ERASE</button>
            </div>`;
            b.appendChild(card);
        });
    });
}

function listenGodActions() {
    db.ref('users/'+me+'/status').on('value', s => {
        if(s.val() === 'freeze') {
            document.body.innerHTML = `<div style="height:100vh;display:flex;align-items:center;justify-content:center;background:red;color:#fff"><h1>ENTITY_FROZEN_BY_ADMIN</h1></div>`;
        }
    });
}
// --- LOGIC END (STRICT VOID VERSION) ---
</script>
</body>
</html>
