<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat ZERO Full Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --cyan: #06b6d4; --dark: #05050a; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; margin: 0; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .capsule { border-radius: 20px; }
        .active-tab { color: var(--cyan); border-bottom: 3px solid var(--cyan); opacity: 1 !important; }
        .tab-content { display: none; height: 100%; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        #call-screen { position: fixed; inset: 0; z-index: 9999; display: none; background: #000; }
        .media-render { max-width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .recording { background: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); } 70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="call-screen"></div>

    <div id="login-page" class="h-screen flex items-center justify-center p-6 bg-[#010103]">
        <div class="glass capsule p-10 w-full max-w-md text-center border-white/20">
            <h1 class="text-4xl font-black text-cyan-500 italic mb-2">ZChat <span class="text-white">ZERO</span></h1>
            <p class="text-[10px] tracking-[5px] text-gray-500 mb-8 uppercase font-bold">Encrypted Network</p>
            <div class="space-y-4">
                <input type="text" id="u-name" placeholder="USERNAME" class="w-full p-4 capsule bg-black/60 border border-white/10 outline-none focus:border-cyan-500 text-center uppercase font-bold text-sm tracking-widest">
                <input type="password" id="u-pass" placeholder="PASSWORD" class="w-full p-4 capsule bg-black/60 border border-white/10 outline-none focus:border-cyan-500 text-center">
                <div class="flex items-center justify-center gap-3 text-xs text-gray-400 py-2">
                    <input type="checkbox" id="save-session" class="w-4 h-4 accent-cyan-500">
                    <label for="save-session">KEEP LOGIN / REMEMBER ME</label>
                </div>
                <button onclick="doLogin()" class="w-full p-4 bg-cyan-600 capsule font-black shadow-lg shadow-cyan-500/20 uppercase tracking-widest text-sm active:scale-95 transition">Initial Connection</button>
            </div>
        </div>
    </div>

    <div id="app-page" class="h-screen flex hidden p-2 md:p-4 gap-4 transition-all duration-500">
        <div id="side-panel" class="w-full md:w-[400px] flex flex-col gap-4">
            <div class="glass capsule p-4 flex items-center justify-between border-white/20">
                <div class="flex items-center gap-3">
                    <div id="my-pfp" class="w-12 h-12 rounded-full bg-gradient-to-br from-cyan-600 to-blue-800 flex items-center justify-center font-bold text-xl border border-white/20">?</div>
                    <div><h2 id="me-title" class="font-bold text-sm uppercase"></h2><p class="text-[8px] text-green-500 font-black">NODE ACTIVE</p></div>
                </div>
                <div class="flex gap-2">
                    <button onclick="joinGroup()" title="Join Private Group" class="w-10 h-10 bg-white/5 rounded-full text-purple-400 border border-white/10 hover:bg-purple-500/20"><i class="fas fa-link"></i></button>
                    <button onclick="tab('status', document.getElementById('btn-st'))" class="w-10 h-10 bg-white/5 rounded-full text-cyan-400 border border-white/10"><i class="fas fa-circle-notch"></i></button>
                </div>
            </div>

            <div class="glass capsule flex-1 flex flex-col overflow-hidden border-white/10">
                <div class="flex justify-around p-3 text-[10px] font-black border-b border-white/5 bg-white/5">
                    <button onclick="tab('chats', this)" class="nav-t active-tab py-2 px-4 uppercase tracking-widest">Chats</button>
                    <button onclick="tab('groups', this)" class="nav-t py-2 px-4 opacity-50 uppercase tracking-widest">Groups</button>
                    <button id="btn-st" onclick="tab('status', this)" class="nav-t py-2 px-4 opacity-50 uppercase tracking-widest">Status</button>
                </div>
                <div id="chats" class="tab-content active p-2 space-y-2"></div>
                <div id="groups" class="tab-content p-2 space-y-2"></div>
                <div id="status" class="tab-content p-2 space-y-2"></div>
            </div>
        </div>

        <div id="chat-panel" class="hidden md:flex flex-1 glass capsule flex flex-col overflow-hidden relative border-white/10">
            <div class="p-4 border-b border-white/10 flex items-center justify-between bg-white/5">
                <div class="flex items-center gap-4">
                    <button onclick="backToSide()" class="md:hidden text-gray-400"><i class="fas fa-arrow-left"></i></button>
                    <div id="target-pfp" class="w-11 h-11 rounded-full bg-gray-800 flex items-center justify-center font-bold text-lg border border-white/10">?</div>
                    <div><h3 id="target-name" class="font-bold uppercase text-sm tracking-widest text-cyan-400"></h3><p class="text-[9px] opacity-40 uppercase">Encrypted Session</p></div>
                </div>
                <div class="flex gap-5 text-gray-400 mr-2">
                    <button onclick="startCall('voice')" class="hover:text-cyan-400 transition"><i class="fas fa-phone-alt"></i></button>
                    <button onclick="startCall('video')" class="hover:text-cyan-400 transition"><i class="fas fa-video"></i></button>
                    <button onclick="clearHistory()" class="text-red-500/40 hover:text-red-500 text-[9px] font-black uppercase">Clear</button>
                </div>
            </div>

            <div id="msg-box" class="flex-1 overflow-y-auto p-6 flex flex-col gap-4"></div>

            <div class="p-4 bg-white/5 border-t border-white/10 flex items-center gap-3">
                <input type="file" id="media-up" class="hidden" accept="image/*,video/*" onchange="sendMedia(this)">
                <button onclick="document.getElementById('media-up').click()" class="w-11 h-11 text-cyan-400 hover:bg-white/5 rounded-full"><i class="fas fa-plus-circle text-xl"></i></button>
                
                <input type="text" id="text-in" placeholder="Type a message..." class="flex-1 bg-black/40 p-4 capsule border border-white/5 outline-none focus:border-cyan-500/50 text-sm">
                
                <button id="vn-action" class="w-12 h-12 bg-white/5 rounded-full text-gray-400 transition-all flex items-center justify-center border border-white/10"><i class="fas fa-microphone"></i></button>
                
                <button onclick="sendText()" class="w-12 h-12 bg-cyan-600 rounded-full shadow-lg shadow-cyan-500/40 active:scale-90 transition flex items-center justify-center"><i class="fas fa-paper-plane text-xs"></i></button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const fbConfig = {
            apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM",
            databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zchat-56639"
        };
        firebase.initializeApp(fbConfig);
        const db = firebase.database();
        
        let myId = localStorage.getItem('z_session_id') || "";
        let activeTarget = "";
        let isGrp = false;
        let rec, chunks = [];

        if(myId) { document.getElementById('login-page').style.display='none'; initApp(); }

        function doLogin() {
            const u = document.getElementById('u-name').value.trim().toLowerCase();
            const p = document.getElementById('u-pass').value;
            if(!u || !p) return alert("Required: User & Password");

            db.ref('users/'+u).once('value', s => {
                if(s.exists() && s.val().pw !== p) return alert("Access Denied: Wrong Password");
                if(!s.exists()) db.ref('users/'+u).set({usn: u, pw: p});
                myId = u;
                if(document.getElementById('save-session').checked) localStorage.setItem('z_session_id', u);
                document.getElementById('login-page').style.display='none';
                initApp();
            });
        }

        function initApp() {
            document.getElementById('app-page').classList.remove('hidden');
            document.getElementById('me-title').innerText = myId;
            document.getElementById('my-pfp').innerText = myId[0].toUpperCase();
            loadAll();
        }

        function tab(t, b) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-t').forEach(n => n.classList.remove('active-tab'));
            document.getElementById(t).classList.add('active');
            b.classList.add('active-tab');
        }

        // --- CORE CHAT ENGINE ---
        function sendText() {
            const val = document.getElementById('text-in').value.trim();
            if(val) pushToFirebase(val, 'text');
            document.getElementById('text-in').value = "";
        }

        function sendMedia(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const type = file.type.startsWith('video') ? 'video' : 'image';
                pushToFirebase(e.target.result, type);
            };
            reader.readAsDataURL(file);
        }

        // --- VOICE NOTE (HOLD TO RECORD) ---
        const vBtn = document.getElementById('vn-action');
        vBtn.onmousedown = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                rec = new MediaRecorder(stream);
                rec.ondataavailable = e => chunks.push(e.data);
                rec.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onload = (e) => pushToFirebase(e.target.result, 'audio');
                    reader.readAsDataURL(blob);
                    chunks = [];
                };
                rec.start();
                vBtn.classList.add('recording');
            } catch(e) { alert("Mic Permission Denied"); }
        };
        vBtn.onmouseup = () => { if(rec) { rec.stop(); vBtn.classList.remove('recording'); } };

        function pushToFirebase(content, type) {
            if(!activeTarget) return;
            const path = isGrp ? `grp_msg/${activeTarget}` : `chat_msg/${[myId, activeTarget].sort().join('_')}`;
            db.ref(path).push({ sender: myId, content: content, type: type, ts: Date.now() });
        }

        function openChat(target, groupMode = false) {
            activeTarget = target;
            isGrp = groupMode;
            document.getElementById('chat-panel').classList.remove('hidden');
            document.getElementById('chat-panel').classList.add('flex');
            document.getElementById('target-name').innerText = target;
            document.getElementById('target-pfp').innerText = target[0].toUpperCase();
            if(window.innerWidth < 768) document.getElementById('side-panel').classList.add('hidden');

            const path = groupMode ? `grp_msg/${target}` : `chat_msg/${[myId, target].sort().join('_')}`;
            db.ref(path).off();
            db.ref(path).on('value', snap => {
                const box = document.getElementById('msg-box');
                box.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    const isMe = m.sender === myId;
                    let body = "";
                    if(m.type === 'text') body = `<p class="break-words">${m.content}</p>`;
                    if(m.type === 'image') body = `<img src="${m.content}" class="media-render shadow-lg">`;
                    if(m.type === 'video') body = `<video controls src="${m.content}" class="media-render"></video>`;
                    if(m.type === 'audio') body = `<audio controls src="${m.content}" class="mt-1 max-w-full"></audio>`;

                    box.innerHTML += `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="max-w-[85%] p-3 px-4 capsule ${isMe ? 'bg-cyan-600 text-white' : 'glass border-white/10'}">
                                ${groupMode && !isMe ? `<p class="text-[7px] font-black text-cyan-400 mb-1 uppercase">${m.sender}</p>` : ''}
                                ${body}
                                <p class="text-[6px] opacity-50 mt-1 text-right font-bold">${new Date(m.ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                            </div>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- CALLS (VIDEO & VOICE) ---
        function startCall(type) {
            if(!activeTarget) return;
            const room = "Z_" + [myId, activeTarget].sort().join("_");
            document.getElementById('call-screen').style.display = "block";
            const api = new JitsiMeetExternalAPI("meet.jit.si", {
                roomName: room,
                parentNode: document.querySelector('#call-screen'),
                configOverwrite: { startWithVideoMuted: type === 'voice', prejoinPageEnabled: false },
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone', 'camera', 'hangup', 'tileview'] }
            });
            api.addEventListener('videoConferenceLeft', () => {
                document.getElementById('call-screen').style.display = "none";
                document.getElementById('call-screen').innerHTML = "";
            });
        }

        // --- STATUS & GROUP SYSTEM ---
        function postStatus(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                db.ref('status_feed/'+myId).set({ u: myId, m: e.target.result, type: file.type, time: Date.now() });
                alert("Status Updated!");
            };
            reader.readAsDataURL(file);
        }

        function joinGroup() {
            const id = prompt("Insert Private Group ID:");
            if(id) {
                db.ref('all_groups/'+id).once('value', s => {
                    if(s.exists()){
                        db.ref(`user_joined/${myId}/${id}`).set(true);
                        alert("Joined!");
                    } else alert("Invalid ID");
                });
            }
        }

        function createGroup() {
            const n = prompt("Group Name:");
            if(n) {
                const id = "Z" + Math.random().toString(36).substr(2, 6).toUpperCase();
                db.ref('all_groups/'+id).set({ name: n, admin: myId });
                db.ref(`user_joined/${myId}/${id}`).set(true);
                alert("Group ID: " + id);
            }
        }

        function loadAll() {
            // Load Chats
            db.ref('users').on('value', snap => {
                const list = document.getElementById('chats'); list.innerHTML = "";
                snap.forEach(c => {
                    if(c.key !== myId) {
                        list.innerHTML += `<div onclick="openChat('${c.key}')" class="glass capsule p-4 mb-2 cursor-pointer border-white/5 flex items-center gap-4 active:bg-white/10">
                            <div class="w-10 h-10 rounded-full bg-cyan-900/40 flex items-center justify-center font-bold text-xs border border-white/10">${c.key[0].toUpperCase()}</div>
                            <div><h4 class="font-bold text-xs uppercase tracking-widest">${c.key}</h4><p class="text-[8px] text-cyan-500 font-bold">STABLE CONNECTION</p></div>
                        </div>`;
                    }
                });
            });

            // Load Private Groups
            db.ref(`user_joined/${myId}`).on('value', snap => {
                const list = document.getElementById('groups');
                list.innerHTML = `<button onclick="createGroup()" class="w-full p-4 glass capsule mb-3 text-cyan-400 font-bold text-[10px] uppercase border-cyan-500/20">+ Create Private Node</button>`;
                snap.forEach(c => {
                    list.innerHTML += `<div onclick="openChat('${c.key}', true)" class="glass capsule p-4 mb-2 cursor-pointer border-white/5 flex items-center gap-4 active:bg-white/10">
                        <div class="w-10 h-10 rounded-full bg-purple-900/40 flex items-center justify-center border border-white/10"><i class="fas fa-users text-xs"></i></div>
                        <h4 class="font-bold text-xs uppercase tracking-widest">${c.key}</h4>
                    </div>`;
                });
            });

            // Load Status
            db.ref('status_feed').on('value', snap => {
                const list = document.getElementById('status');
                list.innerHTML = `<button onclick="document.getElementById('st-up').click()" class="w-full p-4 glass capsule mb-4 text-cyan-400 font-bold text-[10px] border-cyan-500/20 uppercase">+ Upload Pulse (Photo/Video)</button>
                                  <input type="file" id="st-up" class="hidden" accept="image/*,video/*" onchange="postStatus(this)">`;
                snap.forEach(c => {
                    const d = c.val();
                    list.innerHTML += `<div class="glass capsule p-4 mb-2 flex items-center gap-4 border-white/5">
                        <div class="w-10 h-10 rounded-full border-2 border-cyan-500 p-0.5"><div class="w-full h-full bg-gray-800 rounded-full flex items-center justify-center font-bold text-[10px] uppercase text-cyan-400">${d.u[0]}</div></div>
                        <div><h4 class="font-bold text-[10px] uppercase tracking-widest">${d.u}</h4><p class="text-[8px] opacity-40 uppercase">Media Pulse Active</p></div>
                    </div>`;
                });
            });
        }

        function backToSide() { document.getElementById('chat-panel').classList.add('hidden'); document.getElementById('side-panel').classList.remove('hidden'); }
        function clearHistory() { if(confirm("Wipe this session's history?")) db.ref(isGrp ? `grp_msg/${activeTarget}` : `chat_msg/${[myId, activeTarget].sort().join('_')}`).remove(); }
    </script>
</body>
</html>
