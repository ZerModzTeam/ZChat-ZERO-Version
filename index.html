<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Zero Edition - Official God Mode</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>

    <style>
        :root { 
            --p: #a855f7; --g: #bf00ff; --bg: #050505; --text: #fff; 
            --glass: rgba(255, 255, 255, 0.04); --border: rgba(255,255,255,0.08);
            --p-trans: rgba(168, 85, 247, 0.5);
        }
        [data-theme="light"] {
            --bg: #ffffff; --text: #1d1d1f; --glass: rgba(0, 0, 0, 0.05); --border: rgba(0,0,0,0.1);
        }

        * { font-family: 'SF Pro Display', sans-serif; box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; transition: background 0.5s; }

        canvas#stars { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        #z-loader { position: fixed; inset: 0; background: #000; z-index: 100000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .z-spin { width: 50px; height: 50px; border: 4px solid var(--glass); border-top: 4px solid var(--p); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #z-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--p); padding: 15px 40px; border-radius: 50px; z-index: 1000000; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: bold; border: 1.5px solid rgba(255,255,255,0.2); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        #z-intro { position: fixed; inset: 0; z-index: 99999; background: #000; display: none; align-items: center; justify-content: center; }
        .vid-kapsul { width: 85%; height: 80%; border-radius: 65px; border: 5px solid var(--p); overflow: hidden; transform: scale(0.1); opacity: 0; transition: 0.9s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 100px var(--g); }
        .vid-kapsul.open { transform: scale(1); opacity: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .cap { background: var(--glass); backdrop-filter: blur(40px); border-radius: 35px; border: 1.5px solid var(--border); transition: 0.3s; }
        .in { width: 100%; border-radius: 50px; padding: 18px 25px; border: 1.5px solid var(--border); background: rgba(0,0,0,0.4); color: #fff; margin-bottom: 12px; font-size: 15px; outline: none; }
        .in:focus { border-color: var(--p); box-shadow: 0 0 20px var(--p-trans); }
        .btn { width: 100%; border-radius: 50px; padding: 18px; border: none; background: linear-gradient(45deg, var(--p), var(--g)); color: #fff; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; }
        .btn:active { transform: scale(0.93); }
        .btn-t { background: var(--glass); border: 1.5px solid var(--border); color: var(--text); }

        .page { display: none; height: 100vh; animation: pageIn 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes pageIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .iphone-clock { margin-bottom: 30px; text-align: center; }
        #t-time { font-size: 60px; font-weight: 900; background: linear-gradient(to bottom, #fff, var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -2px; }
        #t-date { font-size: 13px; opacity: 0.5; font-weight: bold; letter-spacing: 1px; }

        .app-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; height: calc(100vh - 130px); padding: 0 20px; }
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .chat-room { display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .msg-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .bubble { max-width: 75%; padding: 14px 20px; border-radius: 25px; font-size: 15px; position: relative; line-height: 1.5; word-wrap: break-word; }
        .me { align-self: flex-end; background: var(--p); border-bottom-right-radius: 5px; color: #fff; box-shadow: 0 5px 15px var(--p-trans); }
        .him { align-self: flex-start; background: var(--glass); border-bottom-left-radius: 5px; border: 1.5px solid var(--border); }
        
        .badge { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 10px; text-transform: uppercase; margin-top: 4px; display: inline-block; }
        .b-member { background: rgba(255,255,255,0.1); }
        .b-vip { background: #eab308; color: #000; }
        .b-vvip { background: #3b82f6; }
        .b-zvip { background: var(--g); box-shadow: 0 0 15px var(--g); }

        #p-admin { padding: 40px; overflow-y: auto; }
        .user-card { background: var(--glass); padding: 20px; border-radius: 30px; border: 1.5px solid var(--border); margin-bottom: 15px; display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; align-items: center; gap: 15px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }
    </style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="z-loader"><div class="z-spin"></div><h2 style="margin-top:20px; letter-spacing:5px; color:var(--p)">ZCHAT</h2></div>
<div id="z-toast">Notification</div>

<div id="z-intro">
    <div class="vid-kapsul" id="v-frame">
        <video id="v-adm" src="introadm.mp4" playsinline></video>
    </div>
</div>

<div id="p-auth" class="page" style="display: flex; align-items: center; justify-content: center;">
    <div onclick="unlockMaster()" style="position:fixed; top:30px; right:30px; opacity:0.05; cursor:pointer; font-size:30px">🔑</div>
    <div class="cap" style="width: 420px; padding: 45px; text-align: center;">
        <h1 style="letter-spacing: 12px; font-weight: 900; margin-bottom: 10px;">ZERO</h1>
        <div class="iphone-clock">
            <div id="t-time">00:00</div>
            <div id="t-date">WEDNESDAY, 4 MARCH 2026</div>
        </div>
        <div id="box-login">
            <input type="text" id="l-u" class="in" placeholder="Username">
            <input type="password" id="l-p" class="in" placeholder="Password">
            <button class="btn" onclick="auth('login')">Masuk Ke ZChat</button>
            <p style="margin-top:20px; font-size:14px">Belum punya akun? <span onclick="swAuth('reg')" style="color:var(--p); cursor:pointer; font-weight:900">Ayo daftar</span></p>
        </div>
        <div id="box-reg" style="display:none">
            <input type="text" id="r-u" class="in" placeholder="Buat Username">
            <input type="password" id="r-p" class="in" placeholder="Buat Password">
            <button class="btn" onclick="auth('reg')">Daftar Akun</button>
            <p style="margin-top:20px; font-size:14px">Sudah punya akun? <span onclick="swAuth('login')" style="color:var(--p); cursor:pointer; font-weight:900">Login</span></p>
        </div>
        <div style="margin-top:30px; border-top:1.5px solid var(--border); padding-top:20px">
            <p style="font-size:12px; opacity:0.6; cursor:pointer" onclick="showRoles()">LIHAT LIST ROLE & FITUR</p>
            <p style="font-size:12px; color:var(--p); margin-top:8px; cursor:pointer; font-weight:bold" onclick="window.location.href='https://t.me/ZMTzermodzteam'">Beli role? Klik disini</p>
        </div>
    </div>
</div>

<div id="p-app" class="page" style="padding: 25px; flex-direction: column;">
    <header class="cap" style="display:flex; justify-content:space-between; align-items:center; padding:15px 40px; margin-bottom:25px">
        <div style="display:flex; align-items:center; gap:15px">
            <img id="my-pfp" src="default.png" style="width:55px; height:55px; border-radius:50%; border:2.5px solid var(--p); cursor:pointer; object-fit: cover;" onclick="openProfile()">
            <div>
                <div id="my-usn-disp" style="font-weight:900; font-size:18px; text-transform:uppercase">USER: -</div>
                <div id="my-role-disp" class="badge b-member">ROLE: Member</div>
            </div>
        </div>
        <div style="display:flex; gap:12px">
            <button class="btn btn-t" style="width:auto; padding:10px 25px" onclick="openDev()">DEVELOPER</button>
            <button class="btn btn-t" style="width:auto; padding:10px 20px" onclick="toggleTheme()">🌓</button>
            <button class="btn" style="width:auto; padding:10px 25px" onclick="logout()">LOGOUT</button>
        </div>
    </header>

    <div class="app-layout">
        <div class="sidebar">
            <div class="cap" style="padding: 25px; flex:1; display:flex; flex-direction:column">
                <div style="display:flex; gap:10px; margin-bottom:20px">
                    <button class="btn" style="font-size:11px" onclick="setTab('chat')">CHATS</button>
                    <button class="btn btn-t" style="font-size:11px" onclick="setTab('group')">GROUPS</button>
                    <button class="btn btn-t" style="font-size:11px; position:relative" onclick="setTab('req')">
                        REQ <span id="req-cnt" style="display:none; position:absolute; top:-5px; right:-5px; background:red; padding:2px 6px; border-radius:50%; font-size:9px">0</span>
                    </button>
                </div>
                <div id="search-box">
                    <input type="text" id="add-target" class="in" placeholder="Username Teman...">
                    <button class="btn" style="font-size:12px" onclick="sendRequest()">ADD CONTACT</button>
                </div>
                <div id="list-render" style="margin-top:20px; overflow-y:auto; flex:1"></div>
            </div>
        </div>

        <div class="chat-room cap">
            <div style="padding:20px 35px; border-bottom:1.5px solid var(--border); display:flex; justify-content:space-between; align-items:center">
                <div>
                    <span id="chat-target-name" style="font-weight:900; font-size:18px">ZCHAT ZERO</span>
                    <div id="chat-target-status" style="font-size:11px; opacity:0.5">Pilih kontak untuk chat</div>
                </div>
                <div id="role-powers" style="display:none; gap:10px"></div>
            </div>
            <div id="chat-msgs" class="msg-box"></div>
            <div id="reply-preview" style="display:none; padding:10px 30px; background:rgba(255,255,255,0.05); border-top:1px solid var(--border)">
                <small>Membalas: <span id="reply-text"></span></small>
                <span style="float:right; cursor:pointer" onclick="cancelReply()">✕</span>
            </div>
            <div style="padding:25px; display:flex; gap:15px; align-items:center">
                <input type="file" id="up-file" style="display:none" onchange="handleFileUpload(this)">
                <button class="btn btn-t" style="width:60px; height:60px; border-radius:50%" onclick="document.getElementById('up-file').click()">📎</button>
                <input type="text" id="m-input" class="in" style="margin:0" placeholder="Ketik pesan...">
                <button class="btn" style="width:100px" onclick="sendMessage()">Kirim</button>
            </div>
        </div>
    </div>
</div>

<div id="p-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px">
        <h1 style="letter-spacing:5px">MASTER CONTROL</h1>
        <button class="btn btn-t" style="width:auto; padding:10px 30px" onclick="location.reload()">EXIT ADMIN</button>
    </div>
    <div class="cap" style="padding:30px">
        <div id="admin-actions" style="margin-bottom: 20px; display: flex; gap: 10px;"></div>
        <h3 style="margin-bottom:20px">DATABASE PENGGUNA</h3>
        <div id="admin-users-box"></div>
    </div>
</div>

<script>
// --- CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyDZMFlfu8ObuuEpicbbkUyKWn_gUFnY_SQ",
    authDomain: "project-aaa14b70-7347-4232-8a0.firebaseapp.com",
    databaseURL: "https://project-aaa14b70-7347-4232-8a0-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "project-aaa14b70-7347-4232-8a0",
    storageBucket: "project-aaa14b70-7347-4232-8a0.firebasestorage.app",
    messagingSenderId: "283427772761",
    appId: "1:283427772761:web:52a4bfd1cbb39589ac9448"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const st = firebase.storage();

let me = localStorage.getItem('z_usn');
let myData = null;
let currentChat = null;
let replyData = null;
let currentTab = 'chat';

// --- STARFIELD ---
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
function initStars() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    stars = [];
    for(let i=0; i<150; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5, d: Math.random()*0.3 + 0.1});
}
function drawStars() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#fff";
    stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y += s.d; if(s.y > canvas.height) s.y = 0; });
    requestAnimationFrame(drawStars);
}
window.addEventListener('resize', initStars); initStars(); drawStars();

// --- CORE UTILS ---
function toast(m) { const t = document.getElementById('z-toast'); t.innerText = m; t.style.top = '40px'; setTimeout(() => t.style.top = '-100px', 3000); }
function logout() { localStorage.clear(); location.reload(); }
function swAuth(p) { document.getElementById('box-login').style.display = p==='login'?'block':'none'; document.getElementById('box-reg').style.display = p==='reg'?'block':'none'; }

setInterval(() => {
    const d = new Date();
    document.getElementById('t-time').innerText = d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('t-date').innerText = d.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'}).toUpperCase();
    if(me) db.ref('users/'+me+'/lastOnline').set(Date.now());
}, 1000);

// --- AUTH ---
async function auth(type) {
    const u = document.getElementById(type==='login'?'l-u':'r-u').value.trim().toLowerCase();
    const p = document.getElementById(type==='login'?'l-p':'r-p').value.trim();
    if(!u || !p) return toast("ISI SEMUA DATA!");
    const s = await db.ref('users/'+u).get();
    if(type === 'reg') {
        if(s.exists()) return toast("USER SUDAH ADA!");
        const ipReq = await fetch('https://api.ipify.org?format=json').then(r=>r.json());
        await db.ref('users/'+u).set({password: p, role: 'Member', status: 'active', ip: ipReq.ip, lastOnline: Date.now(), pfp: 'default.png', theme: 'dark'});
        toast("DAFTAR BERHASIL!"); swAuth('login');
    } else {
        if(s.exists() && s.val().password === p) {
            if(s.val().status === 'ban') return toast("AKUN TERBLOKIR!");
            localStorage.setItem('z_usn', u); location.reload();
        } else toast("USER/PASS SALAH!");
    }
}

// --- INITIALIZE ---
window.onload = () => {
    if(me) {
        db.ref('users/'+me).on('value', s => {
            if(!s.exists()) return logout();
            myData = s.val();
            if(myData.status === 'ban') logout();
            document.getElementById('z-loader').style.display = 'none';
            document.getElementById('p-app').style.display = 'flex';
            document.getElementById('my-usn-disp').innerText = "USER: " + me;
            document.getElementById('my-role-disp').innerText = "ROLE: " + myData.role;
            document.getElementById('my-role-disp').className = "badge b-" + myData.role.toLowerCase();
            document.getElementById('my-pfp').src = myData.pfp || 'default.png';
            setTab('chat'); listenToRequests();
        });
    } else {
        document.getElementById('z-loader').style.display = 'none';
        document.getElementById('p-auth').style.display = 'flex';
    }
};

// --- APP LOGIC ---
function setTab(t) {
    currentTab = t; const box = document.getElementById('list-render'); box.innerHTML = '';
    const search = document.getElementById('search-box');
    if(t === 'chat') { search.style.display = 'block'; loadContacts(); }
    else if(t === 'group') { 
        search.innerHTML = `<input type="text" id="grp-code" class="in" style="margin-bottom:5px" placeholder="Kode Grup..."><div style="display:flex; gap:10px"><button class="btn" style="font-size:10px" onclick="joinGroup()">JOIN</button><button class="btn btn-t" style="font-size:10px" onclick="createGroup()">CREATE</button></div>`;
        loadGroups();
    }
    else if(t === 'req') { search.style.display = 'none'; loadRequests(); }
}

function loadContacts() {
    db.ref('contacts/'+me).on('value', s => {
        const box = document.getElementById('list-render'); box.innerHTML = '';
        if(!s.exists()) return box.innerHTML = '<p style="opacity:0.5;text-align:center">No friends yet.</p>';
        s.forEach(c => {
            db.ref('users/'+c.key).once('value', us => {
                const u = us.val(); const isOnline = (Date.now() - u.lastOnline) < 10000;
                const item = document.createElement('div');
                item.className = 'cap'; item.style = 'padding:15px; margin-bottom:10px; display:flex; align-items:center; gap:12px; cursor:pointer';
                item.innerHTML = `<div style="position:relative"><img src="${u.pfp}" style="width:40px;height:40px;border-radius:50%;object-fit:cover"><div style="width:12px;height:12px;border-radius:50%;background:${isOnline?'#22c55e':'#ef4444'};position:absolute;bottom:0;right:0;border:2px solid #000"></div></div><div><div style="font-weight:900; font-size:14px">${c.key}</div><div style="font-size:10px; opacity:0.6">${isOnline?'Online':'Offline'}</div></div>`;
                item.onclick = () => openChat(c.key, 'private'); box.appendChild(item);
            });
        });
    });
}

function openChat(target, type) {
    currentChat = { id: target, type: type };
    document.getElementById('chat-target-name').innerText = target;
    document.getElementById('chat-target-status').innerText = type === 'private' ? 'E2E Encrypted' : 'Group Chat';
    
    const powerBox = document.getElementById('role-powers'); powerBox.innerHTML = '';
    if(type === 'private' && myData.role !== 'Member') {
        powerBox.style.display = 'flex';
        if(['VIP','VVIP','ZVip'].includes(myData.role)) powerBox.innerHTML += `<button class="btn btn-t" style="width:auto; padding:5px 10px; font-size:9px" onclick="roleAction('${target}','crash')">💥 CRASH</button>`;
        if(['VVIP','ZVip'].includes(myData.role)) powerBox.innerHTML += `<button class="btn btn-t" style="width:auto; padding:5px 10px; font-size:9px" onclick="sadapTarget('${target}')">👁️ SADAP</button>`;
    }

    const chatId = type === 'private' ? (me < target ? me+'_'+target : target+'_'+me) : target;
    db.ref('chats/'+chatId).off();
    db.ref('chats/'+chatId).on('value', s => {
        const box = document.getElementById('chat-msgs'); box.innerHTML = '';
        s.forEach(m => {
            const d = m.val(); const b = document.createElement('div');
            b.className = `bubble ${d.from === me ? 'me' : 'him'}`;
            let msgContent = atob(d.msg);
            b.innerHTML = `${d.reply ? `<div style="background:rgba(0,0,0,0.2); padding:5px; border-radius:10px; font-size:10px; border-left:3px solid #fff; margin-bottom:5px">"${d.reply}"</div>` : ''}<div style="font-size:10px; opacity:0.5; margin-bottom:3px">${d.from}</div>${msgContent}<div style="font-size:9px; opacity:0.4; text-align:right; margin-top:5px">${new Date(d.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
            b.onclick = () => { replyData = msgContent; document.getElementById('reply-preview').style.display='block'; document.getElementById('reply-text').innerText = msgContent; };
            box.appendChild(b);
        });
        box.scrollTop = box.scrollHeight;
    });
}

async function sendMessage() {
    const text = document.getElementById('m-input').value.trim();
    if(!text || !currentChat || myData.status === 'mute') return;
    const chatId = currentChat.type === 'private' ? (me < currentChat.id ? me+'_'+currentChat.id : currentChat.id+'_'+me) : currentChat.id;
    await db.ref('chats/'+chatId).push({ from: me, msg: btoa(text), time: Date.now(), reply: replyData });
    document.getElementById('m-input').value = ''; cancelReply();
}

function cancelReply() { replyData = null; document.getElementById('reply-preview').style.display='none'; }

// --- FILE UPLOAD ---
async function handleFileUpload(input) {
    const file = input.files[0]; if(!file || !currentChat || file.size > 15*1024*1024) return toast("MAX 15MB!");
    toast("Uploading...");
    const ref = st.ref(`media/${Date.now()}_${file.name}`); await ref.put(file);
    const url = await ref.getDownloadURL();
    const chatId = currentChat.type === 'private' ? (me < currentChat.id ? me+'_'+currentChat.id : currentChat.id+'_'+me) : currentChat.id;
    const msg = btoa(`<a href="${url}" target="_blank" style="color:#fff">📁 Media: ${file.name}</a>`);
    await db.ref('chats/'+chatId).push({ from: me, msg: msg, time: Date.now() });
}

// --- ADMIN & ROLES ---
function unlockMaster() {
    const key = prompt("MASTER KEY:");
    if(key === 'zmtrrr') {
        const intro = document.getElementById('z-intro'); const video = document.getElementById('v-adm');
        intro.style.display = 'flex'; video.play();
        setTimeout(() => document.getElementById('v-frame').classList.add('open'), 100);
        video.onended = () => { 
            intro.style.display = 'none'; document.getElementById('p-app').style.display = 'none'; 
            document.getElementById('p-admin').style.display = 'block'; renderAdminPanel();
        };
    }
}

function renderAdminPanel() {
    db.ref('users').on('value', s => {
        const box = document.getElementById('admin-users-box'); box.innerHTML = '';
        let online = 0;
        s.forEach(u => {
            const d = u.val(); if((Date.now()-d.lastOnline)<10000) online++;
            const card = document.createElement('div'); card.className = 'user-card';
            card.innerHTML = `<div><b>${u.key}</b><br><small>${d.ip||'0.0.0.0'}</small></div><div>PW: ${d.password}</div><div><select class="in" style="margin:0;padding:5px" onchange="db.ref('users/${u.key}/role').set(this.value)"><option ${d.role==='Member'?'selected':''}>Member</option><option ${d.role==='VIP'?'selected':''}>VIP</option><option ${d.role==='VVIP'?'selected':''}>VVIP</option><option ${d.role==='ZVip'?'selected':''}>ZVip</option></select></div><div style="display:flex;gap:5px"><button class="btn" style="padding:5px" onclick="roleAction('${u.key}','ban')">BAN</button><button class="btn btn-t" style="padding:5px" onclick="roleAction('${u.key}','active')">UN</button></div>`;
            box.appendChild(card);
        });
        document.querySelector('#p-admin h1').innerHTML = `MASTER CONTROL <small style="font-size:12px;color:var(--p)">(${online} Online)</small>`;
        if(!document.getElementById('spy-btn')) {
            const btn = document.createElement('button'); btn.id='spy-btn'; btn.className='btn'; btn.style='width:auto;padding:10px;margin-bottom:15px;background:red';
            btn.innerText="🕵️ SPY MODE"; btn.onclick=adminSpyMessage; document.getElementById('admin-actions').appendChild(btn);
        }
    });
}

async function adminSpyMessage() {
    const u1 = prompt("User 1:"), u2 = prompt("User 2:"); if(!u1 || !u2) return;
    const cid = u1 < u2 ? u1+'_'+u2 : u2+'_'+u1;
    db.ref('chats/'+cid).once('value', s => {
        let history = `LOG: ${u1} & ${u2}\n\n`;
        s.forEach(m => { history += `[${m.val().from}]: ${atob(m.val().msg)}\n`; });
        const w = window.open("", "_blank", "width=400,height=600");
        w.document.write(`<body style="background:#000;color:#0f0;font-family:monospace;padding:20px"><h2>SPY LOG</h2><pre>${history}</pre></body>`);
    });
}

}

}

async function sadapTarget(t) {

// --- REQUESTS ---
async function sendRequest() {
    const t = document.getElementById('add-target').value.trim().toLowerCase();
    if(!t || t===me) return toast("Invalid!");
    const c = await db.ref('users/'+t).get(); if(!c.exists()) return toast("Not Found!");
    await db.ref('requests/'+t+'/'+me).set({status:'p', time:Date.now()});
    toast("Sent!"); document.getElementById('add-target').value='';
}
function listenToRequests() {
    db.ref('requests/'+me).on('value', s => {
        const c = s.numChildren(); document.getElementById('req-cnt').style.display = c>0?'block':'none';
        document.getElementById('req-cnt').innerText = c;
    });
}
function loadRequests() {
    db.ref('requests/'+me).on('value', s => {
        const box = document.getElementById('list-render'); box.innerHTML = '<h3>Requests</h3><br>';
        s.forEach(r => {
            const d = document.createElement('div'); d.className='cap'; d.style='padding:15px;margin-bottom:10px;display:flex;justify-content:space-between';
            d.innerHTML = `<b>${r.key}</b><div><button class="btn" style="width:auto;padding:5px 10px" onclick="acceptReq('${r.key}')">OK</button></div>`;
            box.appendChild(d);
        });
    });
}
async function acceptReq(t) {
    await db.ref('contacts/'+me+'/'+t).set(true); await db.ref('contacts/'+t+'/'+me).set(true);
    await db.ref('requests/'+me+'/'+t).remove(); setTab('chat');
}

// --- GROUPS ---
async function createGroup() {
    const c = document.getElementById('grp-code').value.trim(); if(!c) return;
    await db.ref('groups/'+c).set({admin:me, members:{[me]:true}}); toast("Created!"); loadGroups();
}
async function joinGroup() {
    const c = document.getElementById('grp-code').value.trim();
    const s = await db.ref('groups/'+c).get(); if(!s.exists()) return toast("404!");
    await db.ref('groups/'+c+'/members/'+me).set(true); loadGroups();
}
function loadGroups() {
    db.ref('groups').on('value', s => {
        const box = document.getElementById('list-render'); box.innerHTML = '<h3>Groups</h3><br>';
        s.forEach(g => {
            if(g.val().members && g.val().members[me]) {
                const item = document.createElement('div'); item.className='cap'; item.style='padding:15px;margin-bottom:10px;cursor:pointer';
                item.innerHTML = `<b>👥 ${g.key}</b>`; item.onclick = () => openChat(g.key, 'group'); box.appendChild(item);
            }
        });
    });
}
