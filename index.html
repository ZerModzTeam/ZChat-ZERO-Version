<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat ZERO - Revolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://meet.jit.si/external_api.js"></script>
    <style>
        :root { --bg: #05050a; --card: rgba(255,255,255,0.05); --text: #ffffff; --border: rgba(255,255,255,0.1); --cyan: #06b6d4; --input-bg: #0a0a14; }
        .light-theme { --bg: #ffffff; --card: #f8fafc; --text: #0f172a; --border: #e2e8f0; --cyan: #0891b2; --input-bg: #f1f5f9; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100dvh; margin: 0; overflow: hidden; transition: 0.3s; }
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); }
        .capsule { border-radius: 24px; }
        
        /* Fix Input Bar Tenggelam */
        .app-container { display: flex; flex-direction: column; height: 100dvh; }
        .chat-layout { display: flex; flex-direction: column; height: 100%; position: relative; }
        #flow-box { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; display: flex; flex-direction: column; gap: 12px; }
        .input-area { position: absolute; bottom: 0; left: 0; right: 0; background: var(--bg); padding: 15px; z-index: 100; border-top: 1px solid var(--border); }

        #z-notif { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); z-index: 10000; transition: 0.4s; width: 90%; max-width: 400px; }
        #z-notif.active { top: 20px; }
        .nav-active { color: var(--cyan); border-bottom: 3px solid var(--cyan); opacity: 1 !important; }
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: block; }
        #call-screen { position: fixed; inset: 0; z-index: 9999; display: none; background: #000; }
        .pfp-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--cyan); }
    </style>
</head>
<body>
    <div id="call-screen"></div>

    <div id="z-notif" class="glass capsule p-4 flex items-center gap-3 shadow-2xl border-l-4 border-cyan-500 text-sm font-bold uppercase">
        <i class="fas fa-shield-check text-cyan-500"></i> <span id="notif-text"></span>
    </div>

    <div class="fixed top-4 right-4 z-[1000] flex gap-2">
        <button onclick="toggleTheme()" class="w-10 h-10 glass capsule flex items-center justify-center text-cyan-500 shadow-lg">
            <i id="t-icon" class="fas fa-moon"></i>
        </button>
        <button id="pfp-btn" onclick="openProfile()" class="hidden w-10 h-10 glass capsule overflow-hidden border border-cyan-500/50">
            <img id="my-ava-top" src="" class="w-full h-full object-cover">
        </button>
    </div>

    <div id="auth-screen" class="h-screen flex items-center justify-center p-6 bg-[#020205]">
        <div id="l-box" class="glass capsule p-8 w-full max-w-sm text-center">
            <h1 class="text-3xl font-black text-cyan-500 italic mb-6">ZChat <span class="text-white">ZERO</span></h1>
            <div class="space-y-4">
                <input type="text" id="l-u" placeholder="USERNAME" class="w-full p-4 capsule bg-black/40 border border-white/10 outline-none text-center font-bold text-white">
                <input type="password" id="l-p" placeholder="PASSWORD" class="w-full p-4 capsule bg-black/40 border border-white/10 outline-none text-center text-white">
                <label class="text-[10px] opacity-50 flex items-center justify-center gap-2 text-white">
                    <input type="checkbox" id="k-l" class="accent-cyan-500"> KEEP LOGIN
                </label>
                <button onclick="login()" class="w-full p-4 bg-cyan-600 capsule font-black uppercase text-xs text-white">Access Node</button>
                <p class="text-[10px] opacity-50 text-white">Belum punya akun? <span onclick="switchA(true)" class="text-cyan-500 cursor-pointer">Daftar</span></p>
            </div>
        </div>
        <div id="r-box" class="hidden glass capsule p-8 w-full max-w-sm text-center">
            <h1 class="text-2xl font-black mb-6 text-white uppercase">Register Node</h1>
            <div class="space-y-4">
                <input type="text" id="r-u" placeholder="NEW USERNAME" class="w-full p-4 capsule bg-black/40 border border-white/10 outline-none text-center text-white">
                <input type="password" id="r-p" placeholder="NEW PASSWORD" class="w-full p-4 capsule bg-black/40 border border-white/10 outline-none text-center text-white">
                <button onclick="register()" class="w-full p-4 bg-fuchsia-600 capsule font-black uppercase text-xs text-white">Daftar Sekarang</button>
                <button onclick="switchA(false)" class="text-[10px] opacity-50 text-white">Kembali ke Login</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden h-screen flex flex-col md:flex-row p-2 md:p-4 gap-4">
        <div id="side" class="w-full md:w-96 flex flex-col gap-4">
            <div class="glass capsule p-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-cyan-600 flex items-center justify-center overflow-hidden border border-white/10">
                        <img id="my-ava-side" src="" class="w-full h-full object-cover">
                    </div>
                    <span id="my-id" class="font-bold text-xs uppercase"></span>
                </div>
                <button onclick="showAddManual()" class="w-10 h-10 glass rounded-full text-cyan-400"><i class="fas fa-user-plus"></i></button>
            </div>

            <div class="glass capsule flex-1 flex flex-col overflow-hidden">
                <div class="flex justify-around p-3 border-b border-white/5 text-[10px] font-black uppercase">
                    <button onclick="tab('t-chat', this)" class="t-btn nav-active py-2 px-4">Chats</button>
                    <button onclick="tab('t-req', this)" class="t-btn opacity-40 py-2 px-4">Requests <span id="req-count" class="text-cyan-500 font-black"></span></button>
                </div>
                <div id="t-chat" class="tab-content active p-2 overflow-y-auto"></div>
                <div id="t-req" class="tab-content p-2 overflow-y-auto"></div>
            </div>
        </div>

        <div id="main-chat" class="hidden md:flex flex-1 glass capsule chat-layout">
            <div class="p-4 border-b border-white/10 flex items-center justify-between bg-white/5">
                <div class="flex items-center gap-3">
                    <button onclick="closeChat()" class="md:hidden"><i class="fas fa-arrow-left"></i></button>
                    <div id="h-av-box" class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center overflow-hidden border border-white/10">
                        <img id="h-av-img" src="" class="w-full h-full object-cover">
                    </div>
                    <div><h3 id="h-name" class="font-bold text-xs uppercase"></h3><p class="text-[8px] text-cyan-500">PROTOCOL ENCRYPTED</p></div>
                </div>
                <div class="flex gap-4">
                    <button onclick="call('voice')"><i class="fas fa-phone"></i></button>
                    <button onclick="call('video')"><i class="fas fa-video"></i></button>
                </div>
            </div>

            <div id="flow-box"></div>

            <div class="input-area">
                <div class="flex items-center gap-2">
                    <input type="file" id="f-in" class="hidden" onchange="upFile(this)">
                    <button onclick="document.getElementById('f-in').click()" class="p-2 text-cyan-400"><i class="fas fa-paperclip"></i></button>
                    <input type="text" id="m-in" placeholder="Type message..." class="flex-1 bg-black/20 p-3 capsule border border-white/10 outline-none text-sm text-current">
                    <button id="v-trig" class="w-10 h-10 glass rounded-full flex items-center justify-center"><i class="fas fa-microphone"></i></button>
                    <button onclick="send()" class="w-10 h-10 bg-cyan-600 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-paper-plane text-xs text-white"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="m-profile" class="fixed inset-0 bg-black/90 hidden z-[2000] flex items-center justify-center p-6">
        <div class="glass capsule p-8 w-full max-w-sm text-center">
            <h3 class="font-bold mb-6 uppercase text-sm tracking-widest">Update Profile</h3>
            <div class="relative inline-block mb-6">
                <img id="pfp-preview-img" src="https://i.ibb.co/4pGm9Yh/default-ava.png" class="pfp-preview">
                <label for="pfp-input" class="absolute bottom-0 right-0 bg-cyan-600 w-8 h-8 rounded-full flex items-center justify-center cursor-pointer border-2 border-black">
                    <i class="fas fa-camera text-[10px]"></i>
                </label>
                <input type="file" id="pfp-input" class="hidden" accept="image/*" onchange="previewPFP(this)">
            </div>
            <div class="space-y-3">
                <button onclick="savePFP()" class="w-full p-4 bg-cyan-600 capsule font-black text-xs uppercase">Simpan Perubahan</button>
                <button onclick="document.getElementById('m-profile').style.display='none'" class="w-full p-4 glass capsule text-xs uppercase opacity-50">Tutup</button>
            </div>
        </div>
    </div>

    <div id="m-add" class="fixed inset-0 bg-black/80 hidden z-[200] flex items-center justify-center p-6">
        <div class="glass capsule p-8 w-full max-w-xs text-center">
            <h3 class="font-bold mb-4 uppercase text-xs">Tambah Teman Manual</h3>
            <input type="text" id="target-id" class="w-full p-4 capsule bg-black/40 border border-white/10 mb-4 outline-none text-center uppercase text-white" placeholder="USERNAME TARGET">
            <div class="flex gap-2">
                <button onclick="document.getElementById('m-add').style.display='none'" class="flex-1 p-3 glass capsule text-[10px]">BATAL</button>
                <button onclick="sendRequest()" class="flex-1 p-3 bg-cyan-600 capsule text-[10px] font-bold">KIRIM REQUEST</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const config = { apiKey: "AIzaSyD-1wEkNvg1pGy-klwSRcNbsAQRZYvJevM", databaseURL: "https://zchat-56639-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "zchat-56639" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let me = localStorage.getItem('z_u') || "";
        let to = "";
        let myPFP = "https://i.ibb.co/4pGm9Yh/default-ava.png";
        let rec, chunks = [];

        if(me) { document.getElementById('auth-screen').style.display='none'; launch(); }

        function alertZ(m) {
            const n = document.getElementById('z-notif');
            document.getElementById('notif-text').innerText = m;
            n.classList.add('active');
            setTimeout(() => n.classList.remove('active'), 3000);
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const i = document.getElementById('t-icon');
            i.className = document.body.classList.contains('light-theme') ? 'fas fa-sun' : 'fas fa-moon';
        }

        function switchA(r) {
            document.getElementById('l-box').classList.toggle('hidden', r);
            document.getElementById('r-box').classList.toggle('hidden', !r);
        }

        // --- PROFILE SYSTEM ---
        function openProfile() {
            document.getElementById('m-profile').style.display = 'flex';
            document.getElementById('pfp-preview-img').src = myPFP;
        }

        function previewPFP(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => document.getElementById('pfp-preview-img').src = e.target.result;
                reader.readAsDataURL(input.files[0]);
            }
        }

        function savePFP() {
            const base64 = document.getElementById('pfp-preview-img').src;
            db.ref('users/'+me).update({ pfp: base64 }, () => {
                alertZ("Profil diperbarui!");
                document.getElementById('m-profile').style.display = 'none';
                myPFP = base64;
                updatePFPDoms();
            });
        }

        function updatePFPDoms() {
            document.getElementById('my-ava-top').src = myPFP;
            document.getElementById('my-ava-side').src = myPFP;
        }

        // --- AUTH & CORE ---
        function register() {
            const u = document.getElementById('r-u').value.trim().toLowerCase();
            const p = document.getElementById('r-p').value;
            if(!u || !p) return alertZ("Isi data!");
            db.ref('users/'+u).once('value', s => {
                if(s.exists()) return alertZ("User sudah ada!");
                db.ref('users/'+u).set({u, p, pfp: "https://i.ibb.co/4pGm9Yh/default-ava.png"}, () => {
                    alertZ("Pendaftaran berhasil silahkan login");
                    document.getElementById('l-u').value = u;
                    document.getElementById('l-p').value = p;
                    switchA(false);
                });
            });
        }

        function login() {
            const u = document.getElementById('l-u').value.trim().toLowerCase();
            const p = document.getElementById('l-p').value;
            db.ref('users/'+u).once('value', s => {
                if(!s.exists() || s.val().p !== p) return alertZ("Data salah!");
                me = u;
                if(document.getElementById('k-l').checked) localStorage.setItem('z_u', u);
                document.getElementById('auth-screen').style.display='none';
                launch();
            });
        }

        function launch() {
            document.getElementById('app-screen').classList.replace('hidden', 'flex');
            document.getElementById('pfp-btn').classList.remove('hidden');
            document.getElementById('my-id').innerText = me;
            db.ref('users/'+me).on('value', s => {
                if(s.exists() && s.val().pfp) { myPFP = s.val().pfp; updatePFPDoms(); }
            });
            loadLists();
        }

        function showAddManual() { document.getElementById('m-add').style.display = 'flex'; }

        function sendRequest() {
            const target = document.getElementById('target-id').value.trim().toLowerCase();
            if(!target || target === me) return alertZ("Username tidak valid!");
            db.ref('users/'+target).once('value', s => {
                if(!s.exists()) return alertZ("USER TIDAK ADA!");
                db.ref(`requests/${target}/${me}`).set({ status: 'pending' });
                alertZ("Request terkirim!");
                document.getElementById('m-add').style.display = 'none';
            });
        }

        function loadLists() {
            // Requests (Persetujuan)
            db.ref(`requests/${me}`).on('value', snap => {
                const list = document.getElementById('t-req'); list.innerHTML = "";
                let count = 0;
                snap.forEach(c => {
                    if(c.val().status === 'pending') {
                        count++;
                        list.innerHTML += `<div class="glass capsule p-4 mb-2 flex items-center justify-between border-white/5">
                            <span class="font-bold text-[10px] uppercase">${c.key}</span>
                            <button onclick="accept('${c.key}')" class="bg-cyan-600 px-4 py-1 rounded-full text-[10px] font-black">TERIMA</button>
                        </div>`;
                    }
                });
                document.getElementById('req-count').innerText = count > 0 ? `(${count})` : "";
            });

            // Friends (Hanya yang sudah disetujui)
            db.ref(`friends/${me}`).on('value', snap => {
                const list = document.getElementById('t-chat'); list.innerHTML = "";
                snap.forEach(c => {
                    db.ref('users/'+c.key).once('value', uSnap => {
                        const uData = uSnap.val();
                        list.innerHTML += `<div onclick="openChat('${c.key}', '${uData.pfp}')" class="glass capsule p-4 mb-2 flex items-center gap-3 cursor-pointer hover:bg-white/10 transition">
                            <div class="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center overflow-hidden border border-white/10">
                                <img src="${uData.pfp}" class="w-full h-full object-cover">
                            </div>
                            <span class="font-bold text-xs uppercase">${c.key}</span>
                        </div>`;
                    });
                });
            });
        }

        function accept(user) {
            db.ref(`friends/${me}/${user}`).set(true);
            db.ref(`friends/${user}/${me}`).set(true);
            db.ref(`requests/${me}/${user}`).update({ status: 'accepted' });
            alertZ("Berhasil Terhubung!");
        }

        function openChat(target, pfp) {
            to = target;
            document.getElementById('main-chat').classList.replace('hidden', 'flex');
            document.getElementById('h-name').innerText = target;
            document.getElementById('h-av-img').src = pfp;
            if(window.innerWidth < 768) document.getElementById('side').classList.add('hidden');
            
            const path = `msgs/${[me, to].sort().join('_')}`;
            db.ref(path).off();
            db.ref(path).on('value', snap => {
                const box = document.getElementById('flow-box'); box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    const isMe = m.s === me;
                    let body = m.t === 'text' ? `<p class="text-sm">${m.c}</p>` :
                               m.t === 'audio' ? `<audio controls src="${m.c}" class="max-w-full"></audio>` :
                               m.t === 'image' ? `<img src="${m.c}" class="rounded-lg max-w-full shadow-lg border border-white/10">` : 
                               `<p class="text-[10px] opacity-50 italic">File sent: ${m.c.substring(0,20)}...</p>`;

                    box.innerHTML += `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                        <div class="p-3 px-4 capsule max-w-[85%] ${isMe ? 'bg-cyan-600 text-white' : 'glass'} shadow-md">
                            ${body}
                            <p class="text-[6px] opacity-40 mt-1 text-right">${new Date(m.d).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                        </div>
                    </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function send() {
            const v = document.getElementById('m-in').value.trim();
            if(v) push(v, 'text');
            document.getElementById('m-in').value = "";
        }

        function push(c, t) {
            if(!to) return;
            const path = `msgs/${[me, to].sort().join('_')}`;
            db.ref(path).push({ s: me, c: c, t: t, d: Date.now() });
        }

        // --- CALLS (NO PIN) ---
        function call(type) {
            const room = "ZChat_" + [me, to].sort().join("_");
            document.getElementById('call-screen').style.display = "block";
            const api = new JitsiMeetExternalAPI("meet.jit.si", {
                roomName: room,
                parentNode: document.querySelector('#call-screen'),
                configOverwrite: { prejoinPageEnabled: false, startWithVideoMuted: type === 'voice' },
                interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone', 'camera', 'hangup'] }
            });
            api.addEventListener('videoConferenceLeft', () => {
                document.getElementById('call-screen').style.display = "none";
                document.getElementById('call-screen').innerHTML = "";
            });
        }

        function closeChat() { document.getElementById('main-chat').classList.add('hidden'); document.getElementById('side').classList.remove('hidden'); }
    </script>
</body>
</html>
