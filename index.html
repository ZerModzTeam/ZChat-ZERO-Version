<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZChat Zero - God Edition</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>
    <style>
        :root { --p: #a855f7; --g: #bf00ff; --bg: #050505; --text: #fff; --glass: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.1); }
        [data-theme="light"] { --bg: #f5f5f7; --text: #1d1d1f; --glass: rgba(0,0,0,0.05); --border: rgba(0,0,0,0.1); }
        * { font-family: 'SF Pro Display', sans-serif; box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; outline: none; transition: background 0.3s, color 0.3s; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
        canvas#stars { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        #z-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--p); padding: 15px 35px; border-radius: 50px; z-index: 100000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: 900; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #z-loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s; }
        .spin { width: 60px; height: 60px; border: 5px solid var(--glass); border-top: 5px solid var(--p); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
        .cap { background: var(--glass); backdrop-filter: blur(30px); border-radius: 30px; border: 1.5px solid var(--border); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .in { width: 100%; border-radius: 15px; padding: 15px 20px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: #fff; margin-bottom: 12px; font-size: 15px; }
        .btn { width: 100%; border-radius: 15px; padding: 15px; border: none; background: linear-gradient(45deg, var(--p), var(--g)); color: #fff; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 20px rgba(168, 85, 247, 0.4); }
        .btn:active { transform: scale(0.96); }
        .btn-t { background: var(--glass); border: 1px solid var(--border); color: var(--text); box-shadow: none; }
        .page { display: none; height: 100vh; width: 100%; animation: f 0.5s ease; position: relative; z-index: 10; }
        @keyframes f { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .app-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; height: calc(100vh - 140px); padding: 0 25px; }
        .sidebar { display: flex; flex-direction: column; overflow: hidden; padding: 20px; }
        .main-chat { display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .msg-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 75%; padding: 14px 20px; border-radius: 22px; font-size: 15px; position: relative; animation: p 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes p { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .me { align-self: flex-end; background: var(--p); color: #fff; border-bottom-right-radius: 4px; }
        .him { align-self: flex-start; background: var(--glass); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .offline { background: #ef4444; }
        #p-admin { padding: 40px; overflow-y: auto; background: #000; z-index: 9999; }
        .u-card { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 15px; display: grid; grid-template-columns: 1fr 1fr 1fr auto; align-items: center; gap: 15px; }
        .badge { font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; background: var(--p); }
    </style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="z-toast">Notification</div>
<div id="z-loader"><div class="spin"></div><h2 style="margin-top:20px; letter-spacing:8px; color:var(--p)">ZCHAT</h2></div>

<div id="p-auth" class="page" style="display:flex; align-items:center; justify-content:center">
    <div class="cap" style="width:400px; padding:45px; text-align:center">
        <h1 style="letter-spacing:15px; margin-bottom:10px">ZERO</h1>
        <p id="t-clock" style="font-size:50px; font-weight:900; margin-bottom:25px; background:linear-gradient(to bottom, #fff, var(--p)); -webkit-background-clip:text; -webkit-text-fill-color:transparent">00:00</p>
        <div id="box-login">
            <input type="text" id="l-u" class="in" placeholder="Username">
            <input type="password" id="l-p" class="in" placeholder="Password">
            <button class="btn" onclick="handleAuth('login')">Access ZChat</button>
            <p style="margin-top:20px; font-size:13px; opacity:0.6">New here? <span onclick="swAuth('reg')" style="color:var(--p); cursor:pointer; font-weight:bold">Create Account</span></p>
        </div>
        <div id="box-reg" style="display:none">
            <input type="text" id="r-u" class="in" placeholder="Choose Username">
            <input type="password" id="r-p" class="in" placeholder="Set Password">
            <button class="btn" onclick="handleAuth('reg')">Register Now</button>
            <p style="margin-top:20px; font-size:13px; opacity:0.6">Back to <span onclick="swAuth('login')" style="color:var(--p); cursor:pointer; font-weight:bold">Login</span></p>
        </div>
        <div style="margin-top:30px; border-top:1px solid var(--border); padding-top:20px">
            <small onclick="triggerAdmin()" style="opacity:0.2; cursor:pointer">System God Mode</small>
        </div>
    </div>
</div>

<div id="p-app" class="page" style="flex-direction:column; padding:25px">
    <header class="cap" style="display:flex; justify-content:space-between; align-items:center; padding:15px 40px; margin-bottom:25px">
        <div style="display:flex; align-items:center; gap:18px">
            <div id="my-pfp-container" style="position:relative; cursor:pointer" onclick="changePfp()">
                <div id="pfp-fallback" style="width:55px; height:55px; border-radius:50%; background:var(--p); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:20px">Z</div>
                <img id="my-pfp-img" style="width:55px; height:55px; border-radius:50%; object-fit:cover; border:2px solid var(--p); display:none">
            </div>
            <div>
                <div id="disp-usn" style="font-weight:900; font-size:20px; text-transform:uppercase">User</div>
                <span id="disp-role" class="badge">Member</span>
            </div>
        </div>
        <div style="display:flex; gap:12px">
            <button class="btn btn-t" style="width:auto; padding:10px 20px" onclick="toggleTheme()">🌓</button>
            <button class="btn" style="width:auto; padding:10px 25px" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="app-grid">
        <aside class="sidebar cap">
            <div style="display:flex; gap:10px; margin-bottom:20px">
                <button class="btn" style="padding:12px; font-size:11px" onclick="setTab('chat')">CHATS</button>
                <button class="btn btn-t" style="padding:12px; font-size:11px" onclick="setTab('group')">GROUPS</button>
            </div>
            <div id="side-ctrl">
                <input type="text" id="target-find" class="in" placeholder="Search user...">
                <button class="btn" style="padding:12px; font-size:12px" onclick="addFriend()">ADD FRIEND</button>
            </div>
            <div id="list-render" style="flex:1; overflow-y:auto; margin-top:20px; display:flex; flex-direction:column; gap:10px"></div>
        </aside>

        <main class="main-chat cap">
            <div id="chat-header" style="padding:20px 35px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.1)">
                <div>
                    <b id="chat-name" style="font-size:18px">ZChat Zero</b>
                    <div id="chat-stat" style="font-size:11px; opacity:0.5">Select a conversation</div>
                </div>
                <div id="chat-actions"></div>
            </div>
            <div id="chat-msgs" class="msg-box"></div>
            <div id="chat-input-area" style="padding:25px; display:flex; gap:15px; background:rgba(0,0,0,0.1); border-top:1px solid var(--border)">
                <input type="file" id="f-media" style="display:none" onchange="handleMedia(this)">
                <button class="btn btn-t" style="width:60px; height:55px; font-size:22px" onclick="document.getElementById('f-media').click()">📎</button>
                <input type="text" id="m-input" class="in" style="margin:0; flex:1" placeholder="Type a message...">
                <button class="btn" style="width:100px" onclick="sendMsg()">SEND</button>
            </div>
        </main>
    </div>
</div>

<div id="p-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px">
        <h1 style="letter-spacing:5px">GOD CONTROL PANEL</h1>
        <button class="btn btn-t" style="width:auto; padding:10px 30px" onclick="location.reload()">Back to Earth</button>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 2fr; gap:30px">
        <div class="cap" style="padding:25px">
            <h3>GLOBAL ACTIONS</h3><br>
            <button class="btn" style="margin-bottom:10px" onclick="spyGlobal()">🕵️ GLOBAL SPY MODE</button>
            <button class="btn btn-t" style="margin-bottom:10px" onclick="broadcastMsg()">📢 BROADCAST SYSTEM</button>
            <button class="btn btn-t" style="background:red; color:#fff" onclick="nukeChats()">☢️ NUKE ALL CHATS</button>
        </div>
        <div class="cap" style="padding:25px">
            <h3>DATABASE USERS</h3><br>
            <div id="admin-user-list"></div>
        </div>
    </div>
</div>

<script>
// --- CORE CONFIG ---
const firebaseConfig = {
    apiKey: "AIzaSyDZMFlfu8ObuuEpicbbkUyKWn_gUFnY_SQ",
    authDomain: "project-aaa14b70-7347-4232-8a0.firebaseapp.com",
    databaseURL: "https://project-aaa14b70-7347-4232-8a0-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "project-aaa14b70-7347-4232-8a0",
    storageBucket: "project-aaa14b70-7347-4232-8a0.firebasestorage.app",
    messagingSenderId: "283427772761",
    appId: "1:283427772761:web:52a4bfd1cbb39589ac9448"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const st = firebase.storage();

// --- STATE ---
let me = localStorage.getItem('z_usn');
let myData = null;
let currentChat = null;
let currentTab = 'chat';

// --- UTILS ---
function toast(m) { const t = document.getElementById('z-toast'); t.innerText=m; t.style.top='30px'; setTimeout(()=>t.style.top='-100px',3000); }
function swAuth(x) { document.getElementById('box-login').style.display=x==='login'?'block':'none'; document.getElementById('box-reg').style.display=x==='reg'?'block':'none'; }
function logout() { localStorage.clear(); location.reload(); }
function toggleTheme() { const b=document.body; const t=b.getAttribute('data-theme')==='light'?'dark':'light'; b.setAttribute('data-theme',t); }

// --- BACKGROUND STARFIELD ---
const cvs=document.getElementById('stars'); const cx=cvs.getContext('2d');
let stars=[]; function initStars() { cvs.width=window.innerWidth; cvs.height=window.innerHeight; stars=[]; for(let i=0;i<120;i++)stars.push({x:Math.random()*cvs.width,y:Math.random()*cvs.height,s:Math.random()*2,d:Math.random()*0.5}); }
function drawStars() { cx.clearRect(0,0,cvs.width,cvs.height); cx.fillStyle="#fff"; stars.forEach(s=>{cx.beginPath();cx.arc(s.x,s.y,s.s,0,Math.PI*2);cx.fill();s.y+=s.d;if(s.y>cvs.height)s.y=0;}); requestAnimationFrame(drawStars); }
window.onresize=initStars; initStars(); drawStars();

// --- CLOCK ---
setInterval(()=>{ document.getElementById('t-clock').innerText=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); if(me)db.ref('users/'+me+'/lastOnline').set(Date.now()); },1000);

// --- APP INITIALIZE ---
window.onload = () => {
    const lTimeout = setTimeout(() => { if(!myData) { document.getElementById('z-loader').style.display='none'; if(!me) document.getElementById('p-auth').style.display='flex'; } }, 3500);
    if(me) {
        db.ref('users/'+me).on('value', s => {
            if(!s.exists()) return logout();
            myData = s.val(); if(myData.status === 'ban') { alert("YOU ARE BANNED!"); logout(); }
            clearTimeout(lTimeout);
            document.getElementById('z-loader').style.display='none';
            document.getElementById('p-app').style.display='flex';
            document.getElementById('disp-usn').innerText = me;
            document.getElementById('disp-role').innerText = myData.role;
            if(myData.pfp) { document.getElementById('pfp-fallback').style.display='none'; document.getElementById('my-pfp-img').src=myData.pfp; document.getElementById('my-pfp-img').style.display='block'; }
            setTab('chat'); listenSystemActions();
        });
    } else { clearTimeout(lTimeout); document.getElementById('z-loader').style.display='none'; document.getElementById('p-auth').style.display='flex'; }
};

// --- AUTH LOGIC ---
async function handleAuth(t) {
    const u=document.getElementById(t==='login'?'l-u':'r-u').value.trim().toLowerCase();
    const p=document.getElementById(t==='login'?'l-p':'r-p').value.trim();
    if(!u||!p) return toast("Empty fields!");
    const s = await db.ref('users/'+u).get();
    if(t==='reg') {
        if(s.exists()) return toast("User already exists!");
        await db.ref('users/'+u).set({password:p, role:'Member', status:'active', lastOnline:Date.now(), pfp:''});
        toast("Success! Please Login."); swAuth('login');
    } else {
        if(s.exists() && s.val().password === p) { localStorage.setItem('z_usn', u); location.reload(); }
        else toast("Invalid credentials!");
    }
}

// --- TAB & LIST LOGIC ---
function setTab(t) {
    currentTab = t;
    const box = document.getElementById('list-render'); box.innerHTML='';
    const ctrl = document.getElementById('side-ctrl');
    if(t==='chat') {
        ctrl.innerHTML = `<input type="text" id="target-find" class="in" placeholder="Search user..."><button class="btn" onclick="addFriend()">ADD FRIEND</button>`;
        loadFriends();
    } else {
        ctrl.innerHTML = `<input type="text" id="grp-code" class="in" placeholder="Group Code..."><button class="btn" onclick="joinGroup()">JOIN / CREATE</button>`;
        loadGroups();
    }
}

function loadFriends() {
    db.ref('contacts/'+me).on('value', s => {
        const box = document.getElementById('list-render'); box.innerHTML='';
        if(!s.exists()) box.innerHTML = '<p align="center" style="opacity:0.3; margin-top:20px">No friends yet.</p>';
        s.forEach(c => {
            db.ref('users/'+c.key).once('value', us => {
                const u = us.val(); const isOn = (Date.now() - u.lastOnline) < 10000;
                const div = document.createElement('div'); div.className='cap'; div.style='padding:15px; display:flex; align-items:center; gap:12px; cursor:pointer';
                div.innerHTML = `<div class="status-dot ${isOn?'online':'offline'}"></div>
                <div><b style="text-transform:uppercase">${c.key}</b><br><small style="opacity:0.5">${isOn?'Online':'Offline'}</small></div>`;
                div.onclick = () => openChat(c.key, 'private'); box.appendChild(div);
            });
        });
    });
}

// --- CHAT ENGINE (E2EE) ---
function openChat(id, type) {
    currentChat = { id, type };
    document.getElementById('chat-name').innerText = id.toUpperCase();
    document.getElementById('chat-stat').innerText = type==='private'?'End-to-End Encrypted':'Group Session';
    const cid = type==='private' ? (me<id?me+'_'+id:id+'_'+me) : 'grp_'+id;
    db.ref('chats/'+cid).off();
    db.ref('chats/'+cid).on('value', s => {
        const box = document.getElementById('chat-msgs'); box.innerHTML='';
        s.forEach(m => {
            const d = m.val(); const b = document.createElement('div');
            b.className = `bubble ${d.from===me?'me':'him'}`;
            try { b.innerHTML = (type==='group'?`<small style="font-weight:900; color:var(--g)">${d.from}</small><br>`:'') + atob(d.msg); } catch(e) { b.innerText="Encrypted Message"; }
            box.appendChild(b);
        });
        box.scrollTop = box.scrollHeight;
    });
}

async function sendMsg() {
    const txt = document.getElementById('m-input').value.trim(); if(!txt||!currentChat) return;
    const cid = currentChat.type==='private' ? (me<currentChat.id?me+'_'+currentChat.id:currentChat.id+'_'+me) : 'grp_'+currentChat.id;
    await db.ref('chats/'+cid).push({ from:me, msg:btoa(txt), time:Date.now() });
    document.getElementById('m-input').value='';
}

async function handleMedia(input) {
    const file = input.files[0]; if(!file||file.size > 15*1024*1024) return toast("Max 15MB!");
    toast("Uploading...");
    const ref = st.ref(`zmedia/${Date.now()}_${file.name}`);
    await ref.put(file); const url = await ref.getDownloadURL();
    const msg = btoa(`<a href="${url}" target="_blank" style="color:#fff">📂 File: ${file.name}</a>`);
    const cid = currentChat.type==='private' ? (me<currentChat.id?me+'_'+currentChat.id:currentChat.id+'_'+me) : 'grp_'+currentChat.id;
    await db.ref('chats/'+cid).push({ from:me, msg:msg, time:Date.now() });
}

// --- SOCIAL ---
async function addFriend() {
    const t = document.getElementById('target-find').value.trim().toLowerCase();
    if(!t||t===me) return; const s=await db.ref('users/'+t).get(); if(!s.exists()) return toast("User not found!");
    await db.ref('contacts/'+me+'/'+t).set(true); await db.ref('contacts/'+t+'/'+me).set(true);
    toast("Friend Added!");
}

async function joinGroup() {
    const c = document.getElementById('grp-code').value.trim().toLowerCase(); if(!c) return;
    await db.ref('groups/'+c+'/members/'+me).set(true); setTab('group'); toast("Joined Group!");
}

function loadGroups() {
    db.ref('groups').on('value', s => {
        const box = document.getElementById('list-render'); box.innerHTML='';
        s.forEach(g => { if(g.val().members && g.val().members[me]) {
            const div = document.createElement('div'); div.className='cap'; div.style='padding:15px; margin-bottom:10px; cursor:pointer; text-align:center';
            div.innerHTML = `<b>👥 ${g.key.toUpperCase()}</b>`; div.onclick=()=>openChat(g.key,'group'); box.appendChild(div);
        }});
    });
}

// --- GOD MODE LOGIC ---
function triggerAdmin() { if(prompt("God Key:")==='zmtrrr') { document.getElementById('p-auth').style.display='none'; document.getElementById('p-app').style.display='none'; document.getElementById('p-admin').style.display='block'; renderAdminPanel(); } }

function renderAdminPanel() {
    db.ref('users').on('value', s => {
        const box = document.getElementById('admin-user-list'); box.innerHTML='';
        s.forEach(u => {
            const d = u.val(); const div = document.createElement('div'); div.className='u-card';
            div.innerHTML = `<div><b>${u.key}</b><br><small>${d.password}</small></div>
            <div>${d.role}</div><div>${d.status}</div>
            <div style="display:flex; gap:5px">
                <button class="btn" style="padding:5px; background:red" onclick="db.ref('users/${u.key}/status').set('crash')">Crash</button>
                <button class="btn" style="padding:5px; background:orange" onclick="db.ref('users/${u.key}/status').set('ban')">Ban</button>
                <button class="btn btn-t" style="padding:5px" onclick="db.ref('users/${u.key}/status').set('active')">Fix</button>
            </div>`;
            box.appendChild(div);
        });
    });
}

async function spyGlobal() {
    const u1=prompt("User 1:"), u2=prompt("User 2:"); if(!u1||!u2) return;
    const cid = u1<u2?u1+'_'+u2:u2+'_'+u1;
    const s = await db.ref('chats/'+cid).get(); let log="--- LOG SPY ---\n";
    s.forEach(m=>{ log += `[${m.val().from}]: ${atob(m.val().msg)}\n`; });
    alert(log || "Empty chat history.");
}

function listenSystemActions() {
    db.ref('users/'+me+'/status').on('value', s => {
        if(s.val()==='crash') { document.body.innerHTML = `<div style="background:red; color:white; height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; text-align:center"><h1>SYSTEM CRASHED BY GOD</h1><p>Your access is revoked.</p><button onclick="location.reload()">Try Recovery</button></div>`; }
    });
}

function changePfp() { const u=prompt("Image URL:"); if(u) db.ref('users/'+me+'/pfp').set(u); }
</script>
</body>
</html>
