<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat Zero Edition - Full Power</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>

    <style>
        :root { 
            --p: #a855f7; 
            --g: #bf00ff; 
            --glass: rgba(255, 255, 255, 0.08);
            --bg: #000;
        }

        /* RESET TOTAL & ANTI GOOGLE */
        * { 
            font-family: 'SF Pro Display', 'Apple Color Emoji', sans-serif; 
            box-sizing: border-box; margin: 0; padding: 0; outline: none; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }

        body { background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }

        /* ANIMASI UI */
        .anim-slide { animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        .anim-fade { animation: fadeIn 0.4s ease-in forwards; }
        @keyframes slideIn { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* VIDEO INTRO DENGAN BORDER KAPSUL IPHONE */
        #admin-intro-overlay {
            position: fixed; inset: 0; z-index: 99999; 
            background: #000; display: none; align-items: center; justify-content: center;
        }
        .vid-frame {
            width: 85vw; height: 85vh; border-radius: 50px; 
            border: 6px solid rgba(255,255,255,0.15); overflow: hidden;
            box-shadow: 0 0 40px var(--g); transform: scale(0.9); opacity: 0;
            transition: 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .vid-frame.active { transform: scale(1); opacity: 1; }
        #v-adm { width: 100%; height: 100%; object-fit: cover; }

        /* UI COMPONENTS */
        .cap { background: var(--glass); backdrop-filter: blur(30px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); padding: 25px; }
        .in { width: 100%; border-radius: 50px; padding: 16px 25px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: #fff; margin-bottom: 15px; font-size: 16px; transition: 0.3s; }
        .in:focus { border-color: var(--p); box-shadow: 0 0 15px var(--p); }
        .btn { width: 100%; border-radius: 50px; padding: 16px; border: none; background: var(--p); color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3); }
        .btn:active { transform: scale(0.94); }

        /* NOTIF TOAST */
        #z-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--p); padding: 15px 35px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100000; transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); font-weight: bold; }

        /* BACKGROUND EFFECTS */
        .grid { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(var(--p) 1px, transparent 1px), linear-gradient(90deg, var(--p) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.1; animation: gridMove 15s linear infinite; }
        @keyframes gridMove { from { transform: translateY(0); } to { transform: translateY(50px); } }
        
        .bh-wrapper { position: fixed; inset: 0; z-index: -2; display: none; align-items: center; justify-content: center; }
        .bh-core { width: 300px; height: 300px; background: #000; border-radius: 50%; box-shadow: 0 0 100px 20px var(--g), inset 0 0 80px #000; animation: bhPulse 4s infinite alternate; }
        @keyframes bhPulse { from { transform: scale(1); } to { transform: scale(1.15); box-shadow: 0 0 140px 40px var(--g); } }

        /* ADMIN PANEL LAYOUT */
        #admin-panel { position: fixed; inset: 0; z-index: 88888; background: #000; display: none; flex-direction: column; padding: 30px; overflow-y: auto; }
        .user-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 30px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }

        /* MAIN APP LAYOUT */
        #main-app { display: none; height: 100vh; flex-direction: column; padding: 20px; }
        .app-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; flex: 1; overflow: hidden; }
    </style>
</head>
<body>

<div id="z-toast">ZChat Message</div>

<div id="admin-intro-overlay">
    <div class="vid-frame" id="vid-frame">
        <video id="v-adm" src="introadm.mp4" playsinline></video>
    </div>
</div>

<div class="grid" id="bg-grid"></div>
<div class="bh-wrapper" id="bg-bh"><div class="bh-core"></div></div>

<div id="login-page" class="anim-fade" style="display:flex; height:100vh; align-items:center; justify-content:center">
    <div onclick="unlockMaster()" style="position:fixed; top:25px; right:25px; width:50px; height:50px; border-radius:50%; background:var(--glass); display:flex; align-items:center; justify-content:center; cursor:pointer; border:1px solid rgba(255,255,255,0.1); font-size:20px;">🔑</div>

    <div class="cap anim-slide" style="width:400px; text-align:center">
        <h1 style="letter-spacing:6px; margin-bottom:5px;">ZCHAT</h1>
        <p style="font-size:10px; opacity:0.5; margin-bottom:25px; letter-spacing:2px;">ZERO EDITION V1.0</p>
        
        <div id="iphone-clock" style="margin-bottom:30px">
            <div id="time-display" style="font-size:45px; font-weight:bold; color:var(--p)">00:00</div>
            <div id="date-display" style="font-size:12px; opacity:0.6; text-transform:uppercase; letter-spacing:1px">Loading...</div>
        </div>

        <div id="auth-form">
            <input type="text" id="usn" class="in" placeholder="Username">
            <input type="password" id="pass" class="in" placeholder="Password">
            <button class="btn" onclick="handleAuth('login')">MASUK KE ZCHAT</button>
            <p style="font-size:13px; margin-top:15px">Belum join? <span style="color:var(--p); cursor:pointer; font-weight:bold" onclick="toggleAuth('reg')">Daftar Akun</span></p>
            <p style="font-size:12px; margin-top:10px; opacity:0.5" onclick="openRoleList()">Lihat List Role & Harga</p>
        </div>
    </div>
</div>

<div id="admin-panel" class="anim-fade">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px">
        <h1 style="letter-spacing:2px">MASTER PANEL</h1>
        <button class="btn" style="width:auto; padding:10px 25px" onclick="location.reload()">LOGOUT ADMIN</button>
    </div>
    
    <div class="cap anim-slide">
        <h3 style="margin-bottom:20px">DATABASE USER (REALTIME)</h3>
        <div id="admin-user-list">
            </div>
    </div>
</div>

<div id="main-app" class="anim-fade">
    <div class="cap" style="padding:12px 30px; display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <div style="display:flex; align-items:center; gap:15px">
            <div id="my-pfp" style="width:50px; height:50px; border-radius:50%; background:var(--p); border:2px solid #fff"></div>
            <div style="text-align:left">
                <div id="display-usn" style="font-weight:bold; font-size:16px">USER: -</div>
                <div id="display-role" style="font-size:11px; color:var(--p); font-weight:bold">ROLE: MEMBER</div>
            </div>
        </div>
        <button class="btn" style="width:auto; padding:10px 20px" onclick="logout()">LOGOUT</button>
    </div>

    <div class="app-grid">
        <div class="cap anim-slide">
            <div style="display:flex; gap:10px; margin-bottom:20px">
                <button class="btn" onclick="showTab('chat')">CHATS</button>
                <button class="btn" style="background:rgba(255,255,255,0.05)" onclick="showTab('req')">REQ</button>
            </div>
            <div id="contact-list" style="overflow-y:auto; flex:1">
                <input type="text" id="search-f" class="in" placeholder="Tambah Username...">
                <button class="btn" style="margin-bottom:20px" onclick="addFriend()">ADD FRIEND</button>
                <div id="render-contacts"></div>
            </div>
        </div>

        <div class="cap anim-slide" style="display:flex; flex-direction:column">
            <div id="chat-header" style="padding-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:15px; font-weight:bold">PILIH PESAN</div>
            <div id="msg-area" style="flex:1; overflow-y:auto; padding-bottom:15px"></div>
            <div style="display:flex; gap:10px">
                <button class="btn" style="width:60px; background:rgba(255,255,255,0.05)">📎</button>
                <input type="text" id="msg-in" class="in" style="margin:0" placeholder="Ketik pesan gaya iPhone...">
                <button class="btn" style="width:80px" onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE INITIALIZATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyDZMFlfu8ObuuEpicbbkUyKWn_gUFnY_SQ",
        authDomain: "project-aaa14b70-7347-4232-8a0.firebaseapp.com",
        databaseURL: "https://project-aaa14b70-7347-4232-8a0-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "project-aaa14b70-7347-4232-8a0",
        storageBucket: "project-aaa14b70-7347-4232-8a0.firebasestorage.app",
        messagingSenderId: "283427772761",
        appId: "1:283427772761:web:52a4bfd1cbb39589ac9448"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- GLOBAL STATE ---
    let myUsn = localStorage.getItem('z_usn') || null;

    // --- CUSTOM TOAST (ANTI-GOOGLE) ---
    function toast(txt) {
        const t = document.getElementById('z-toast');
        t.innerText = txt;
        t.style.top = '40px';
        setTimeout(() => t.style.top = '-100px', 3000);
    }

    // --- MASTER ACCESS LOGIC ---
    function unlockMaster() {
        const k = prompt("ENTER MASTER KEY:");
        if(k === 'zmtrrr') {
            const overlay = document.getElementById('admin-intro-overlay');
            const frame = document.getElementById('vid-frame');
            const video = document.getElementById('v-adm');

            overlay.style.display = 'flex';
            setTimeout(() => {
                frame.classList.add('active');
                video.play();
            }, 200);

            video.onended = () => {
                frame.classList.remove('active');
                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('admin-panel').style.display = 'flex';
                    toast("WELCOME MASTER ZERO");
                }, 800);
            };
        } else {
            toast("KUNCI SALAH!");
        }
    }

    // --- CLOCK REALTIME ---
    setInterval(() => {
        const n = new Date();
        document.getElementById('time-display').innerText = n.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('date-display').innerText = n.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
    }, 1000);

    // --- AUTH LOGIC ---
    async function handleAuth(type) {
        const u = document.getElementById('usn').value;
        const p = document.getElementById('pass').value;
        if(!u || !p) return toast("LENGKAPI DATA!");

        const s = await db.ref('users/'+u).get();
        if(type === 'login') {
            if(s.exists() && s.val().password === p) {
                if(s.val().status === 'ban') return toast("AKUN DI BAN!");
                localStorage.setItem('z_usn', u);
                location.reload();
            } else toast("USER/PASS SALAH!");
        }
    }

    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        if(myUsn) {
            db.ref('users/'+myUsn).once('value', s => {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('bg-grid').style.display = 'none';
                document.getElementById('bg-bh').style.display = 'flex';
                document.getElementById('display-usn').innerText = "USER: " + myUsn;
                document.getElementById('display-role').innerText = "ROLE: " + s.val().role;
            });
        }
    };
</script>
</body>
</html>
