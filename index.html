<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZChat Zero Edition</title>
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-storage-compat.js"></script>

    <style>
        :root { --p: #a855f7; --g: #bf00ff; --glass: rgba(255, 255, 255, 0.08); }
        
        /* Reset Bau Google */
        * { 
            font-family: 'SF Pro Display', sans-serif; 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            outline: none; 
            -webkit-tap-highlight-color: transparent; /* Ilangin biru-biru pas diklik */
            user-select: none;
        }

        body { background: #000; color: #fff; overflow: hidden; height: 100vh; }

        /* Custom Notif (Pengganti Alert Google) */
        #z-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: var(--p); padding: 15px 30px; border-radius: 50px;
            box-shadow: 0 0 20px var(--g); z-index: 10000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* BG EFFECT */
        .grid { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(var(--p) 1px, transparent 1px), linear-gradient(90deg, var(--p) 1px, transparent 1px); background-size: 45px 45px; opacity: 0.15; animation: gm 10s linear infinite; }
        @keyframes gm { from { transform: translateY(0); } to { transform: translateY(45px); } }
        
        .bh-v { position: fixed; inset: 0; z-index: -2; display: none; align-items: center; justify-content: center; }
        .blackhole { width: 280px; height: 280px; background: #000; border-radius: 50%; box-shadow: 0 0 80px 20px var(--g), inset 0 0 60px #000; animation: bp 4s infinite alternate; }
        @keyframes bp { from { transform: scale(1); } to { transform: scale(1.1); box-shadow: 0 0 120px 40px var(--g); } }

        /* CAPSULE UI */
        .cap { background: var(--glass); backdrop-filter: blur(25px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .in { width: 100%; border-radius: 50px; padding: 15px 25px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: #fff; margin-bottom: 12px; font-size: 16px; }
        .btn { width: 100%; border-radius: 50px; padding: 15px; border: none; background: var(--p); color: #fff; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); margin-bottom: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.92); opacity: 0.8; }
        .btn-t { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); box-shadow: none; }

        /* MODAL LIST ROLE (Custom UI) */
        #role-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9000;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .role-box { width: 320px; text-align: left; position: relative; }
        .role-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 25px; margin-bottom: 10px; border-left: 4px solid var(--p); }

        /* LOGIN ADMIN (Floating) */
        #admin-login-ui {
            position: fixed; top: 20px; right: 20px; z-index: 8000;
            width: 50px; height: 50px; background: var(--glass); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
        }
        #admin-panel-box {
            position: fixed; inset: 0; background: #000; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* INTRO ADMIN */
        #adm-gate { position: fixed; inset: 0; z-index: 10000; display: none; background: #000; }
        .gate-c { position: absolute; inset: 0; background: #000; clip-path: circle(0% at 50% 50%); transition: 1.5s cubic-bezier(0.7, 0, 0.3, 1); }
        #adm-gate.active .gate-c { clip-path: circle(150% at 50% 50%); }

        /* LAYOUT CHAT */
        #z-app { display: none; height: 100vh; flex-direction: column; padding: 15px; }
        .z-body { flex: 1; display: grid; grid-template-columns: 320px 1fr; gap: 15px; overflow: hidden; }
    </style>
</head>
<body>

<div id="z-toast">Pesan Disini</div>

<div id="role-modal" onclick="closeRole()">
    <div class="cap role-box" onclick="event.stopPropagation()">
        <h2 style="margin-bottom: 20px; text-align: center;">List Role ZChat</h2>
        <div class="role-item">
            <b style="color:var(--p)">VIP - 120K</b><br>
            <small>Fitur: Crash / Uncrash</small>
        </div>
        <div class="role-item">
            <b style="color:var(--p)">VVIP - 170K</b><br>
            <small>Fitur: Crash, Sadap Pesan*</small>
        </div>
        <div class="role-item">
            <b style="color:var(--p)">ZVIP - 200K</b><br>
            <small>Fitur: Crash, Sadap*, Mute Teman</small>
        </div>
        <button class="btn" onclick="closeRole()" style="margin-top: 10px;">TUTUP</button>
    </div>
</div>

<div id="admin-panel-box">
    <div class="cap" style="width: 300px; text-align: center;">
        <h3 style="margin-bottom: 20px;">ADMIN ACCESS</h3>
        <input type="password" id="admin-key" class="in" placeholder="Masukkan Kunci...">
        <button class="btn" onclick="checkAdmin()">UNLOCK</button>
        <button class="btn btn-t" onclick="closeAdminBox()">BATAL</button>
    </div>
</div>

<div id="adm-gate">
    <video id="v-intro" style="width:100%;height:100%;object-fit:cover" src="introadm.mp4"></video>
    <div class="gate-c"></div>
</div>

<div class="grid" id="bg-g"></div>
<div class="bh-v" id="bg-b"><div class="blackhole"></div></div>

<div id="z-auth" style="display:flex; height:100vh; align-items:center; justify-content:center">
    <div id="admin-login-ui" onclick="openAdminBox()">🔑</div>
    <div class="cap" style="width:360px; text-align:center">
        <h1 style="margin-bottom:10px; letter-spacing: 2px;">ZChat Zero</h1>
        <div id="z-clock" style="margin-bottom:25px">
            <div id="z-time" style="font-size:35px; font-weight:bold; color: var(--p);">00:00:00</div>
            <div id="z-date" style="font-size:12px; opacity:0.6; text-transform: uppercase;">WEDNESDAY, 4 MARCH 2026</div>
        </div>

        <div id="l-box">
            <input type="text" id="lu" class="in" placeholder="Username">
            <input type="password" id="lp" class="in" placeholder="Password">
            <button class="btn" onclick="auth('login')">MASUK</button>
            <p style="font-size:12px; margin-top: 10px;">Belum punya akun? <span style="color:var(--p);cursor:pointer; font-weight: bold;" onclick="sw('r')">Ayo daftar</span></p>
            <p style="font-size:12px; margin:12px 0"><span style="cursor:pointer; opacity: 0.7;" onclick="window.location.href='https://t.me/ZMTzermodzteam'">Beli role? Klik disini</span></p>
            <button class="btn btn-t" onclick="openRole()">LIHAT LIST ROLE</button>
        </div>

        <div id="r-box" style="display:none">
            <input type="text" id="ru" class="in" placeholder="Username Baru">
            <input type="password" id="rp" class="in" placeholder="Password Baru">
            <button class="btn" onclick="auth('reg')">DAFTAR SEKARANG</button>
            <p style="font-size:12px; cursor:pointer; opacity: 0.7;" onclick="sw('l')">Kembali ke Login</p>
        </div>
    </div>
</div>

<div id="z-app">
    </div>

<script>
const config = {
  apiKey: "AIzaSyDZMFlfu8ObuuEpicbbkUyKWn_gUFnY_SQ",
  authDomain: "project-aaa14b70-7347-4232-8a0.firebaseapp.com",
  databaseURL: "https://project-aaa14b70-7347-4232-8a0-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "project-aaa14b70-7347-4232-8a0",
  storageBucket: "project-aaa14b70-7347-4232-8a0.firebasestorage.app",
  messagingSenderId: "283427772761",
  appId: "1:283427772761:web:52a4bfd1cbb39589ac9448"
};
firebase.initializeApp(config);
const db = firebase.database();

// Toast Custom (Gantiin Alert)
function toast(msg) {
    const t = document.getElementById('z-toast');
    t.innerText = msg;
    t.style.top = '30px';
    setTimeout(() => { t.style.top = '-100px'; }, 3000);
}

// Jam Realtime
setInterval(() => {
    const d = new Date();
    document.getElementById('z-time').innerText = d.toLocaleTimeString('id-ID');
    document.getElementById('z-date').innerText = d.toLocaleDateString('id-ID',{weekday:'long', day:'numeric', month:'long', year:'numeric'});
}, 1000);

// Role Modal
function openRole() { document.getElementById('role-modal').style.display = 'flex'; }
function closeRole() { document.getElementById('role-modal').style.display = 'none'; }

// Admin Box
function openAdminBox() { document.getElementById('admin-panel-box').style.display = 'flex'; }
function closeAdminBox() { document.getElementById('admin-panel-box').style.display = 'none'; }

function checkAdmin() {
    const key = document.getElementById('admin-key').value;
    if(key === 'zmtrrr') {
        closeAdminBox();
        const g = document.getElementById('adm-gate');
        g.style.display = 'block';
        document.getElementById('v-intro').play();
        setTimeout(() => {
            g.classList.add('active');
            setTimeout(() => { 
                toast("WELCOME MASTER ZERO");
                g.style.display='none'; 
                // Di sini lu buka panel admin lu
            }, 2000);
        }, 3500);
    } else {
        toast("KUNCI SALAH!");
    }
}

// Auth Logic
async function auth(t) {
    const u = t==='login'?document.getElementById('lu').value:document.getElementById('ru').value;
    const p = t==='login'?document.getElementById('lp').value:document.getElementById('rp').value;
    
    if(!u || !p) return toast("ISI SEMUA DATA!");

    if(t==='reg') {
        const s = await db.ref('users/'+u).get();
        if(s.exists()) return toast("USER TELAH DIGUNAKAN!");
        const ip = await fetch('https://api.ipify.org?format=json').then(r=>r.json());
        await db.ref('users/'+u).set({password:p, role:'Member', status:'active', ip:ip.ip});
        toast("DAFTAR BERHASIL!"); sw('l');
    } else {
        const s = await db.ref('users/'+u).get();
        if(s.exists() && s.val().password === p) {
            localStorage.setItem('z_s', u);
            toast("LOGIN BERHASIL!");
            location.reload(); // Re-render buat masuk main app
        } else toast("USER/PASS SALAH!");
    }
}

function sw(p) {
    document.getElementById('l-box').style.display = p==='l'?'block':'none';
    document.getElementById('r-box').style.display = p==='r'?'block':'none';
}
</script>
</body>
</html>
